      "custom_tooltip": "<b>Calibrate with adversarial admissibility review</b><br>Conduct a structured adversarial stress test focused on suppression/taint failure modes using the scored evidence paths. Validate that the thresholds correlate with plausibly survivable admissibility routes and adjust scoring inputs, mappings, or thresholds where experts identify systematic mis-scoring. Record every change to maintain defensibility.<br><b>Resources needed:</b><br><ul><li>Litigation admissibility counsel (expert reviewer)</li><li>RICO case-law attorney</li><li>Forensic/chain-of-custody expert</li><li>Lead prosecutor (approval authority)</li><li>Red-team facilitator</li></ul>",

      "custom_tooltip": "<b>Produce evidence prioritization decision log</b><br>Create a version-controlled decision log that records why each candidate was included, deprioritized, or excluded, including links to predicate acts and evidence-path independence/corroboration assumptions. Establish reprioritization rules (what triggers moving candidates up or down) and ensure each change is explainable for later privilege disputes, suppression motions, and proof-matrix updates.<br><b>Resources needed:</b><br><ul><li>Case management coordinator</li><li>RICO proof-mapping case strategist</li><li>Forensic accounting lead</li><li>Legal/discovery counsel</li><li>Evidence-status system admin</li></ul>",

      "custom_tooltip": "<b>Define taint-filtered access controls</b><br>Specify the clean-room workflow boundaries for privileged and work-product materials: who may view what, under which approvals, at which stages (triage, review, linkage, export, investigative use). Include role definitions, prohibited cross-access rules, and a contamination prevention model that supports later admissibility defensibility.<br><b>Resources needed:</b><br><ul><li>Privilege/Taint protocol coordinator</li><li>Lead prosecutor approval authority</li><li>Federal privilege/taint counsel</li><li>Forensic eDiscovery lead</li><li>Case-management system admin</li><li>Security lead</li></ul>",

      "text": "Run pilot transfer and contamination test",
      "custom_tooltip": "<b>Run pilot transfer and contamination test</b><br>Execute an end-to-end pilot: perform a metadata-preserving export of a limited subset, run clean-room privilege filtering, and attempt controlled \u2018leak\u2019 or cross-environment access tests (within authorized scope) to verify that privileged materials never cross into investigative use. Produce a pilot report documenting results, any workflow gaps, and required corrective actions.<br><b>Resources needed:</b><br><ul><li>Forensic eDiscovery lead</li><li>Clean-room workflow analysts</li><li>Security lead</li><li>Privilege/taint counsel reviewer</li><li>QA/documentation specialist</li></ul>",

      "custom_tooltip": "<b>Finalize escalation rules and SOP</b><br>Define escalation triggers and decision rules for exceptions (e.g., mixed-privilege documents, tagging uncertainty, batch disputes, suspected cross-contamination). Provide a timeboxed escalation ladder to special-master or court-ready processes as appropriate, and publish a version-controlled SOP so future batches follow the same workflow.<br><b>Resources needed:</b><br><ul><li>Privilege/Taint protocol coordinator</li><li>Lead prosecutor</li><li>Federal privilege/taint counsel</li><li>Special-master escalation lead</li><li>Case-management process owner</li></ul>",

      "id": "a0452c84-70ac-4883-ad77-18f8a29a6e66",
      "text": "Select evidence path expansion targets",
      "custom_tooltip": "<b>Select evidence path expansion targets</b><br>Identify which RICO predicates and sub-facts require additional evidence-paths and determine the highest-priority gaps. Use the current proof map and independence/corroboration status to choose targets for the next batch of evidence-path work, then define minimum deliverables for each target (e.g., at least three independent paths, with preliminary admissibility route classification and corroboration tier).<br><b>Resources needed:</b><br><ul><li>Lead RICO proof-mapping strategist</li><li>Forensic accounting support</li><li>Investigators familiar with source development</li><li>Evidence log/case-management coordinator</li></ul>",

    {
      "id": "2d3dc0b1-2d09-4179-a0c2-9eb813cbaa01",
      "text": "Build complete independent evidence paths",
      "custom_tooltip": "<b>Build complete independent evidence paths</b><br>For each targeted predicate/sub-fact, create an evidence-path inventory describing at least three independent routes from allegation to element proof. For every route, document expected source type(s), linkage to the event timeline, independence rationale, corroboration tier (unconfirmed/partial/high-confidence), and initial admissibility route (admissible/likely/sanitized/substitute/in-camera-only) in a shared evidence inventory.<br><b>Resources needed:</b><br><ul><li>RICO proof-mapping lead</li><li>Evidence analysts</li><li>Forensic accounting support</li><li>Prosecution team legal reviewer</li><li>Case-management system administrator</li></ul>",

      "id": "5f15395e-6887-4cf8-803b-2d1fda815ef4",
      "text": "Validate existence, linkage, and independence",
      "custom_tooltip": "<b>Validate existence, linkage, and independence</b><br>Run rapid verification sprints to confirm that each evidence-path node exists (or has an achievable acquisition plan), links to the alleged event, and satisfies independence rules. Apply a standardized independence rubric (common-source tests, temporal/spatial separation, origin-of-information flags) and require sign-off for independence and corroboration tier changes before the paths are treated as eligible for gating.<br><b>Resources needed:</b><br><ul><li>Evidence verification lead</li><li>Investigators</li><li>Privilege/taint workflow coordinator</li><li>Forensic accounting support</li><li>Legal reviewer for independence standards</li></ul>",

      "id": "1c95ad6d-e9f7-458e-bce9-2daa34600ae9",
      "text": "Produce updateable evidence inventory package",
      "custom_tooltip": "<b>Produce updateable evidence inventory package</b><br>Package the resulting evidence-path inventory into an operational, updateable format that downstream workstreams can use. Deliver: (a) an evidence-path table with standardized columns, (b) an element-to-evidence crosswalk indicating coverage per element/predicate, and (c) an evidence-status change-log so future updates (new sources, independence reclassification, or admissibility route changes) can be made without rework of the full proof map.<br><b>Resources needed:</b><br><ul><li>Case-management coordinator</li><li>RICO proof-mapping lead</li><li>Data/operations support for spreadsheets or system exports</li><li>Legal reviewer for completeness gates</li></ul>",

      "text": "Implement taint-filter clean-room workflow",
      "custom_tooltip": "<b>Implement taint-filter clean-room workflow</b><br>Design and execute a clean-room workflow that prevents privileged content cross-contamination while still enabling investigative analysis. Define who can view what, the triage and routing rules for privilege-tagged material, and the point at which investigative use is allowed. Run a pilot on a small batch end-to-end to confirm role-based access controls, segregation tagging behavior, and auditability before scaling to production batches.<br><b>Resources needed:</b><br><ul><li>Privilege filter and taint-protocol coordinator</li><li>Forensic eDiscovery lead</li><li>Security/IT access-control specialist</li><li>Analysts with clean-room access</li></ul>",

      "text": "Define privilege-log schema and SLAs",
      "custom_tooltip": "<b>Define privilege-log schema and SLAs</b><br>Create a privilege log schema with required document-level identifiers, bases for each privilege claim, segregation rationale, and completeness checks. Establish review SLAs and decision rules for how objections are handled (including daily triage expectations). Validate the schema with pilot samples and ensure the workflow can reach agreed completeness thresholds without generating excessive motion-driven rework.<br><b>Resources needed:</b><br><ul><li>Privilege review counsel or privilege-log lead</li><li>eDiscovery paralegal or analyst for logging</li><li>Litigation discovery supervisor</li><li>Forensic evidence management coordinator</li></ul>",

      "custom_tooltip": "<b>Set batch SLAs and escalation triggers</b><br>Establish batching strategy and end-to-end review SLAs that fit the staged pre-charge timeline. Monitor objection rate and batch-delay indicators, and define a quantifiable escalation ladder (including when to request special-master involvement). Perform a brief tabletop rehearsal of early-stage objection spikes to confirm the escalation rules keep production moving and avoid cascading delays.<br><b>Resources needed:</b><br><ul><li>Discovery operations lead</li><li>Privilege filter and taint-protocol coordinator</li><li>Special-master liaison (procedural owner)</li><li>Lead prosecutor or delegated sign-off authority</li></ul>",

      "custom_tooltip": "<b>Pilot end-to-end taint separation</b><br>Run a limited pilot using representative record streams to test the full end-to-end process: export intake, tagging/segregation, clean-room access boundaries, hashing/manifest verification, analyst workflow steps, and audit logging. Confirm that privileged-tagged items do not cross into investigative workspaces and that chain-of-custody and access logs are complete and defensible. Output a pilot report with gaps, fixes, and an updated SOP version.<br><b>Resources needed:</b><br><ul><li>Forensic eDiscovery/records workflow lead</li><li>Privilege filter team</li><li>Forensic analysts</li><li>Security/audit-log specialist</li><li>Privilege/taint counsel reviewer</li></ul>",

      "id": "1316c6f7-cb5b-4a8f-b9de-75bd6e993c99",
      "text": "Define segregation tagging and rules",
      "custom_tooltip": "<b>Define segregation tagging and rules</b><br>Create and operationalize a standardized segregation/tagging taxonomy and decision rules for mixed-privilege collections. Define required tag states, escalation triggers (e.g., ambiguous privilege, potential taint uncertainty), and rules for reclassification/versioning. Ensure tagging outputs map to downstream evidence status updates used by the central case-management system.<br><b>Resources needed:</b><br><ul><li>Privilege filter and taint-protocol coordinator</li><li>eDiscovery metadata analyst</li><li>Lead prosecutor sign-off</li><li>Federal privilege/taint counsel</li></ul>",

      "custom_tooltip": "<b>Set review SLAs and escalation triggers</b><br>Establish batching strategy for initial production, review turnaround SLAs, objection-rate monitoring metrics, and a special-master escalation trigger ladder. Include timeboxed decision rules for pausing/reprioritizing batches and a defined escalation path to maintain the 3\u20136 month pre-charge timeline.<br><b>Resources needed:</b><br><ul><li>Review operations lead</li><li>Forensic accounting/eDiscovery team leads</li><li>Special-master escalation owner</li><li>Privilege/taint counsel</li><li>Project manager</li></ul>",

    {
      "id": "bbef9019-ab0f-433c-97d5-784177555812",
      "text": "Define interagency command RACI",
      "custom_tooltip": "<b>Define interagency command RACI</b><br>Create the interagency command structure spanning FBI, DOJ, and local prosecutors, including RACI (Responsible, Accountable, Consulted, Informed) for all major actions. Specify owners and alternates for subpoena routing, protective order requests, classified-handling interlocks, grand jury sequencing (where applicable), and evidence release decisions. Deliver a signed command charter section that establishes governance scope and escalation entry points.<br><b>Resources needed:</b><br><ul><li>Lead interagency coordinator</li><li>Federal liaison officer (DOJ)</li><li>FBI task-force supervisor liaison</li><li>Local lead prosecutor</li><li>Legal counsel for multi-jurisdiction coordination</li><li>Case-management workflow owner</li></ul>",

    {
      "id": "b2765d8f-ad54-4bcf-9601-e8eac42d9305",
      "text": "Set approval SLAs and decision gates",
      "custom_tooltip": "<b>Set approval SLAs and decision gates</b><br>Define time-bound approval SLAs for key request types: subpoenas (including expansions), protective orders, classified handling requests, and any grand jury sequencing steps that affect discovery posture. Include required submission contents (minimum legal justification, evidence category tags, security/clearance prerequisites), routing paths, and acceptance criteria. Produce a decision-gate table mapping each high-risk action to an approval owner, SLA, and fallback/backstop authority to prevent deadlocks.<br><b>Resources needed:</b><br><ul><li>DOJ supervisory prosecutor</li><li>FBI legal counsel liaison</li><li>Local prosecutor designee</li><li>Discovery counsel</li><li>Classification/security counsel</li><li>Program manager for SLA governance</li></ul>",

    {
      "id": "286890ab-aab6-4a10-ad08-e288c71c4cb3",
      "text": "Build evidence sharing matrix",
      "custom_tooltip": "<b>Build evidence sharing matrix</b><br>Create an evidence-sharing matrix covering at least eight evidence categories and defining what may be shared, when it may be shared, and under what secrecy/security boundaries. For each category, specify clearance/need-to-know prerequisites, documentation requirements, handling restrictions, and release conditions tied to the proof/charging timeline. Validate the matrix via scenario tests to ensure every evidence category has a defined release condition, owner, and process for interagency handoffs.<br><b>Resources needed:</b><br><ul><li>Evidence custodian lead</li><li>Classified evidence coordinator (cleared)</li><li>Forensic evidence lead</li><li>Discovery/eDiscovery lead</li><li>Security/classification officer</li><li>Interagency legal reviewer</li></ul>",

    {
      "id": "e99f81f0-d8f2-4a5c-a48d-7e399bf09767",
      "text": "Run tabletop red-team validation",
      "custom_tooltip": "<b>Run tabletop red-team validation</b><br>Conduct at least two structured tabletop red-team sessions using realistic scenarios (subpoena expansion request, protective order negotiation, classified-handling interlock, and evidence sharing dispute). Stress-test the charter, SLAs, evidence-sharing rules, and escalation ladder for delay/fragmentation and for ambiguity around ownership and secrecy boundaries. Capture issues into an action log with assigned owners and update the signed deliverables with version control.<br><b>Resources needed:</b><br><ul><li>Trial prosecutor (scenario facilitator)</li><li>DOJ/FBI liaisons</li><li>Local prosecutor representatives</li><li>Classified evidence counsel/custodian</li><li>Appellate-admissibility advisor</li><li>Workshop facilitator/project coordinator</li></ul>",

      "text": "Pilot taint-filtered workflow test",
      "custom_tooltip": "<b>Pilot taint-filtered workflow test</b><br>Run a controlled pilot using a representative subset of Wayne Enterprises records to verify end-to-end feasibility: clean-room routing, privilege tagging/separation, metadata-preserving exports, hashing/manifest generation, analyst access controls, and evidence-status updates. Confirm that investigative reviewers can work without accessing privileged materials and that chain-of-custody audit events are captured with completeness and consistency suitable for later court scrutiny.<br><b>Resources needed:</b><br><ul><li>Forensic eDiscovery lead</li><li>Privilege filter/taint-protocol coordinator</li><li>eDiscovery tool administrator</li><li>Forensic accounting support</li><li>Security lead</li><li>Lead prosecutor sign-off</li></ul>",

      "id": "07024370-bdae-4216-a836-b3566c4e874f",
      "text": "Define export manifest and hashing rules",
      "custom_tooltip": "<b>Define export manifest and hashing rules</b><br>Specify the metadata-preserving export configuration (native vs converted format rules, Bates conventions, required manifest fields) and implement SHA-256 hashing for items plus an export manifest that can be validated post-export. Produce a short validation procedure for investigators to re-verify hash/manifest integrity after batch export and transfer into the secure evidence store.<br><b>Resources needed:</b><br><ul><li>eDiscovery engineer</li><li>Forensic eDiscovery lead</li><li>Security lead</li><li>Forensic accounting support</li><li>Case-management system administrator</li></ul>",

    {
      "id": "cd45648b-f03e-4675-bc0f-23c7862fb1d6",
      "text": "Finalize privilege-log schema and QA",
      "custom_tooltip": "<b>Finalize privilege-log schema and QA</b><br>Create the privilege-log schema fields and completeness criteria, then execute a QA review on the pilot set to ensure required information exists at document-level granularity (IDs, privilege basis, segregation rationale, and objection-ready descriptors). Define a completeness gate (e.g., minimum percent of privilege-tagged items with required fields) that must be met before subsequent production batches are authorized.<br><b>Resources needed:</b><br><ul><li>Privilege counsel support (or privilege review supervisor)</li><li>Privilege filter/taint-protocol coordinator</li><li>eDiscovery document review lead</li><li>Lead prosecutor sign-off</li></ul>",

      "id": "70f58d96-cdf2-42ce-b8f1-60665521ea8f",
      "text": "Set objection SLAs and escalation ladder",
      "custom_tooltip": "<b>Set objection SLAs and escalation ladder</b><br>Define review SLAs (daily triage, turnaround targets, batch sizing assumptions), objection-rate monitoring rules, and the escalation triggers for special-master requests. Produce operational playbooks for: how objections are categorized, how batches are paused or re-routed, who requests escalation, and the timeboxed decision points to prevent timeline drift.<br><b>Resources needed:</b><br><ul><li>Privilege filter/taint-protocol coordinator</li><li>Forensic eDiscovery lead</li><li>Lead prosecutor liaison</li><li>Litigation counsel (privilege/taint) advisor</li><li>Case-management system administrator</li></ul>",

    {
      "id": "79fa5b52-7053-43e3-9a5b-3a41f34ab739",
      "text": "Produce pilot production validation package",
      "custom_tooltip": "<b>Produce pilot production validation package</b><br>Deliver a pilot package that includes: (a) two production batches from the pilot (or two representative streams per the pilot scope), (b) validated metadata manifests with hashing evidence, (c) privilege logs meeting the agreed schema completeness checklist, and (d) a documented escalation decision rule with measured performance against SLAs. Obtain sign-off from corporate eDiscovery/privilege counsel and internal prosecution leadership, and lock the process as v1 for the next production phase.<br><b>Resources needed:</b><br><ul><li>Lead prosecutor sign-off</li><li>Forensic eDiscovery lead</li><li>Privilege filter/taint-protocol coordinator</li><li>Corporate eDiscovery/privilege counsel (reviewer)</li><li>Security lead</li></ul>",

    {
      "id": "498c1e69-58e1-42c3-977e-e9ae9945a828",
      "text": "Classified evidence register intake",
      "custom_tooltip": "<b>Classified evidence register intake</b><br>Create a secure intake and inventory register for all classified military technology evidence candidates. Capture ownership, custodian/location, case-file references, classification/sensitivity tier, initial relevance to RICO elements, and constraints on access. Define how new items are added and how outdated entries are corrected using version-controlled fields and audit logs. Deliverable is a master candidate list ready for element mapping and downstream sanitization/substitution workflows.<br><b>Resources needed:</b><br><ul><li>Classified evidence safety manager</li><li>Cleared evidence custodian</li><li>Classification/security liaison</li><li>Lead prosecutor liaison</li><li>Document/data manager with secure access</li><li>Secure case tool administrator</li></ul>",

    {
      "id": "c8d90eb0-1be1-40c9-bf66-201f95bec694",
      "text": "Map classified items to RICO elements",
      "custom_tooltip": "<b>Map classified items to RICO elements</b><br>For every inventory entry, map the intended proof value to specific RICO elements/predicate targets (element-to-proof mapping). Record what each item is intended to prove, the minimum necessary factual subpoints, and whether those subpoints are eligible for sanitization versus substitution. Include traceability back to the RICO proof map so element mapping can be cross-checked for coverage and redundancy. Deliverable is an element mapping table for 100% of candidate classified items.<br><b>Resources needed:</b><br><ul><li>RICO proof-mapping and charging design lead</li><li>RICO case-law attorney (cleared/authorized as needed)</li><li>Classified evidence safety manager</li><li>Forensic/financial liaison (as element mapping requires)</li><li>RICO element documentation lead</li></ul>",
      "start_date": "2026-07-12",

      "meta": "498c1e69-58e1-42c3-977e-e9ae9945a828 FS",

    },
    {
      "id": "df074332-2de8-4455-a49a-cef85226f950",
      "text": "Set sensitivity tiers and access boundaries",
      "custom_tooltip": "<b>Set sensitivity tiers and access boundaries</b><br>Determine and document sensitivity tiers and handling constraints for each candidate item, including permitted reviewers, storage location, transmission rules, and required court/protective context for use. Create a routing guide that specifies who can view raw material, who can draft sanitized summaries, and who can build substitute-proof packages. Deliverable is a tiered access/routing matrix that enforces cleared-only workflow and prevents cross-contamination.<br><b>Resources needed:</b><br><ul><li>Security/classification officer</li><li>Cleared protective-order counsel (cleared/authorized as needed)</li><li>Secure evidence custodian</li><li>Workflow and permissions administrator</li></ul>",

    },
    {
      "id": "cafad032-ebff-4538-b29c-4c6c8bb36d36",
      "text": "Validate inventory completeness via SLA",
      "custom_tooltip": "<b>Validate inventory completeness via SLA</b><br>Run a time-boxed validation pass to confirm completeness and correctness of the classified evidence inventory: check that required metadata fields are populated (classification tier, custodian reference, RICO element mapping status, constraints), confirm chain-of-custody pointers exist, and reconcile any discrepancies with custodians. Establish an evidence-intake SLA for late-arriving items and a decision rule for when the inventory is treated as complete for sanitization/substitution planning. Deliverable is a signed inventory-completeness checkpoint record.<br><b>Resources needed:</b><br><ul><li>Classified evidence safety manager</li><li>Cleared evidence custodian(s)</li><li>Lead prosecutor liaison</li><li>Case-management/data quality reviewer</li><li>Security/audit log reviewer</li></ul>",

      "text": "Define sanitized exhibit boundaries and required witness/expert foundation for each sanitized summary",

    {
      "id": "df03d8e4-680a-46c6-9a16-41e69fe46d1e",
      "text": "Inventory classified evidence candidates",
      "custom_tooltip": "<b>Inventory classified evidence candidates</b><br>Assemble an initial, organized register of all candidate classified military-technology evidence. Capture for each item: category, sensitivity tier, custody/owner, intended RICO element mapping, and what proof value depends on classified specifics. Define an intake/retrieval process with clear ownership and an SLA for custodian turnaround. Output a complete first-pass inventory ready for element mapping and later sanitized/substitute design.<br><b>Resources needed:</b><br><ul><li>Classified evidence safety lead</li><li>Cleared evidence custodian</li><li>Classified evidence handler</li><li>RICO proof-mapping lead</li><li>Security/classification advisor</li><li>Secure document register administrator</li></ul>",

    {
      "id": "5ed81b61-1025-4e8b-889c-78c15937db22",
      "text": "Set sanitized exhibit boundaries",
      "custom_tooltip": "<b>Set sanitized exhibit boundaries</b><br>Define what information may be safely summarized versus what must be withheld. Create a standardized boundary checklist covering characterization limits, prohibited detail types, permissible generalizations, and required basis statements. For each candidate classified item, produce a mapping of: (a) element sub-facts intended to be proven, (b) which sub-facts can be supported via sanitized summary, and (c) what will require substitute proof. Include foundation requirements for witnesses and experts (what each must know to testify credibly to the sanitized summary). Output: a clear per-item sanitized coverage plan.<br><b>Resources needed:</b><br><ul><li>Cleared trial counsel or classified evidence counsel</li><li>Classified evidence safety lead</li><li>RICO proof-mapping lead</li><li>Subject-matter expert(s)</li><li>Protective-order counsel</li><li>Cleared document review team</li></ul>",

      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "df03d8e4-680a-46c6-9a16-41e69fe46d1e FS",

    },
    {
      "id": "6e3518a8-9769-4268-8590-0fad25c9fb32",
      "text": "Draft substitute-proof equivalency packages",
      "custom_tooltip": "<b>Draft substitute-proof equivalency packages</b><br>Design substitute-proof packages intended to preserve evidentiary value when classified particulars cannot be disclosed. For each candidate item, define: element coverage goals, non-sensitive corroborating sources allowed, required chain-of-custody documentation, metadata/manifest requirements, and expert testimony foundation to connect substitutes to the original classified proof. Build equivalency checkboxes and a quality gate so substitute packages are rejected or escalated when coverage is insufficient. Output: draft substitute package templates mapped to each classified candidate.<br><b>Resources needed:</b><br><ul><li>Equivalency threshold/rubric lead</li><li>Forensic accounting/records support (as applicable)</li><li>Cleared evidence custodian</li><li>Classified evidence handling staff</li><li>Subject-matter expert(s)</li><li>Chain-of-custody/log specialist</li><li>Trial counsel</li></ul>",
      "start_date": "2026-07-22",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "5ed81b61-1025-4e8b-889c-78c15937db22 FS",
      "parent": "68a7b93e-bcab-4c34-ae88-5556574c18d0"
    },
    {
      "id": "a0eb736b-841c-4ed4-b6eb-26a3306a42cb",
      "text": "Create protective order request templates",
      "custom_tooltip": "<b>Create protective order request templates</b><br>Prepare protective-order and limited in-camera review request materials needed to litigate admissibility while maintaining secrecy. Tailor template language to the jurisdiction/court norms and to the specific sanitized vs substitute plan. Create a checklist of required annexes (e.g., exhibit register entries, proposed redaction rationale, discovery handling instructions, clearance/need-to-know statements). Include sign-off steps across legal, security, and discovery leadership so protective-order submissions can be finalized quickly once exhibit candidates stabilize. Output: a filing-ready protective order package workflow.<br><b>Resources needed:</b><br><ul><li>Protective-order counsel</li><li>Classified evidence safety lead</li><li>Security/clearance advisor</li><li>Discovery lead</li><li>Trial counsel</li><li>Secure drafting support</li></ul>",
      "start_date": "2026-07-24",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "6e3518a8-9769-4268-8590-0fad25c9fb32 FS",
      "parent": "68a7b93e-bcab-4c34-ae88-5556574c18d0"
    },
    {
      "id": "fbdab675-0059-4220-9c54-ea7b7bedb745",
      "text": "Validate equivalency coverage and pivot",
      "custom_tooltip": "<b>Validate equivalency coverage and pivot</b><br>Run a structured validation cycle to confirm that sanitized summaries and substitute packages preserve the targeted RICO element coverage at a defensible threshold. Score element coverage per candidate, verify documentation completeness (including chain-of-custody logs and manifests), and test pivot logic: when sanitized coverage drops below the threshold, the plan must automatically require substitute-proof activation. Produce at least one expert-reviewed mock exhibit package demonstrating coverage preservation and defensible foundation. Output: a signed validation record and an operational go/no-go status for each classified candidate.<br><b>Resources needed:</b><br><ul><li>Cleared evidence adjudication lead</li><li>Admissibility/precedent expert reviewer (cleared if required)</li><li>Protective-order counsel</li><li>Classified evidence custodian</li><li>Subject-matter expert(s)</li><li>Trial counsel</li><li>Secure register/tooling operator</li></ul>",
      "start_date": "2026-07-26",
      "duration": 2.0,
      "progress": 0,

      "text": "Classified inventory element mapping",
      "custom_tooltip": "<b>Classified inventory element mapping</b><br>Assemble an initial register of classified military-technology evidence candidates. For each item, capture category, sensitivity tier, custodians/locations, intended RICO element link(s), and what non-sensitive artifacts may already corroborate the same element facts. Produce a completeness check that every candidate has at least one declared element mapping and a retrieval readiness status for cleared handling.<br><b>Resources needed:</b><br><ul><li>Classified evidence manager</li><li>Cleared counsel</li><li>Cleared evidence custodian</li><li>Security clearance support staff</li><li>RICO proof-mapping lead</li><li>Case-management coordinator</li></ul>",

      "text": "Sanitized exhibit boundaries and foundations",
      "custom_tooltip": "<b>Sanitized exhibit boundaries and foundations</b><br>Define how sanitized summaries may describe each classified item without disclosing forbidden specifics. Create a boundary checklist (included/excluded facts, allowable characterization, witness/expert foundation requirements, and documentation needed for admissibility). Produce draft witness/expert foundation notes aligned to the targeted RICO elements and run a short cleared review loop to confirm what can be summarized and what requires substitution or withholding.<br><b>Resources needed:</b><br><ul><li>Classified evidence safety and admissibility lead</li><li>Classified protective-order counsel</li><li>Cleared subject-matter experts (for foundation)</li><li>Trial counsel</li><li>Disclosure compliance officer</li><li>Document production specialist</li></ul>",

      "id": "6e6075eb-2cc5-49f2-9cb6-c6745e2451c7",
      "text": "Substitute-proof equivalency package design",
      "custom_tooltip": "<b>Substitute-proof equivalency package design</b><br>Design non-sensitive substitute-proof packages that preserve evidentiary value for essential element facts. Specify equivalency coverage rules (element-to-proof mapping, required non-sensitive corroborators, and immutable documentation expectations), plus chain-of-custody requirements for any substitute extracts. Create a template for the substitute packet (supporting records, metadata/hashes where applicable, and testimony foundation outlines) and conduct an adversarial-style deficiency check against common equivalency failures.<br><b>Resources needed:</b><br><ul><li>Substitution and equivalency counsel</li><li>Forensic documentation lead</li><li>Forensic accounting or technical analyst (as applicable)</li><li>Evidence custodian (non-sensitive extracts)</li><li>Chain-of-custody/logging specialist</li><li>Cleared trial team advisor</li></ul>",

    {
      "id": "4375bca0-8c89-4688-af1c-15bb0abab98b",
      "text": "Admissibility threshold rubric and pivot rules",
      "custom_tooltip": "<b>Admissibility threshold rubric and pivot rules</b><br>Create a quantified admissibility-preservation threshold rubric for sanitization versus substitution. Define measurable scoring dimensions (e.g., coverage of essential element sub-facts, probative-value loss bounds, corroboration strength, and suppression/taint exposure considerations) and a pivot rule that triggers when equivalency coverage falls below the threshold. Lock version-controlled logic and ensure the rubric is usable by the cleared workflow team under time pressure.<br><b>Resources needed:</b><br><ul><li>Evidentiary admissibility counsel</li><li>RICO proof-mapping lead</li><li>Classified protective-order counsel</li><li>Data/scoring analyst</li><li>Cleared evidence manager</li></ul>",

      "id": "1f583e6d-4b97-4070-8d00-582d61c5fa72",
      "text": "Prototype classified exhibit register",
      "custom_tooltip": "<b>Prototype classified exhibit register</b><br>Build and validate a prototype classified exhibit register that enforces element-to-proof mapping, sanitized/substitute coverage scoring, and pivot-rule activation logic. Use a minimum viable schema that ties each item to (a) element targets, (b) sanitized coverage score, (c) substitute coverage score, (d) recommended route (sanitized/substitute/in-camera), and (e) status/ownership for cleared review. Run prototype QA on a representative set and document how updates propagate if mappings change.<br><b>Resources needed:</b><br><ul><li>Classified exhibit register builder (technical lead)</li><li>Cleared workflow owner</li><li>RICO proof-mapping data steward</li><li>Security/compliance liaison</li><li>Prototype validation reviewer</li><li>Case-management system administrator</li></ul>",

      "text": "Classified Exhibit Register Schema",
      "custom_tooltip": "<b>Classified Exhibit Register Schema</b><br>Create the minimum viable schema for a classified exhibit register that supports admissibility-preservation decisions. Define required fields for: evidence item identifiers, element-to-proof mapping, sanitized coverage scoring, substitute coverage scoring, pivot-rule references, clearance/need-to-know status, chain-of-custody pointers, and protective-order routing flags. Establish versioning and change-control rules so element mappings can evolve without breaking scoring traceability.<br><b>Resources needed:</b><br><ul><li>Classified Evidence Safety &amp; Courtroom Admissibility Manager</li><li>Cleared evidence custodian/security specialist</li><li>Protective-order counsel (cleared as needed)</li><li>RICO proof-mapping/charging design lead</li><li>Spreadsheet/database tool owner (e.g., secure ops/data engineer)</li><li>Paralegal or evidence analyst for data entry QA</li></ul>",

      "id": "08db3ce8-0432-4698-a886-8bae05832ad8",
      "text": "Enforce Element Mapping Coverage",
      "custom_tooltip": "<b>Enforce Element Mapping Coverage</b><br>Populate the register prototype with the first set of classified exhibit candidates and validate that every item has complete element-to-proof mapping. Implement controlled logic that blocks or flags incomplete mappings (e.g., missing required element facts, missing intended RICO element alignment, or ambiguous ownership). Run edge-case checks for multi-purpose documents, partial redactions, and overlapping element coverage to ensure the mapping is operationally consistent for later sanitized/substitute drafting.<br><b>Resources needed:</b><br><ul><li>RICO proof-mapping &amp; charging design lead</li><li>Cleared evidence analyst</li><li>Classified Evidence Safety &amp; Courtroom Admissibility Manager</li><li>Forensic documentation specialist (evidence documentation QA)</li><li>Protective-order counsel (cleared review) </li></ul>",

      "id": "448b587a-b1bb-4795-9dc4-64d166ff5e30",
      "text": "Implement Coverage and Pivot Logic",
      "custom_tooltip": "<b>Implement Coverage and Pivot Logic</b><br>Implement the scoring and decision logic in the register for: sanitized coverage score, substitute coverage score, and pivot-rule activation. Define thresholds (from the quantified admissibility-preservation rubric) and encode pivot triggers so the system recommends when to switch from sanitized summaries to substitute-proof packages. Validate the logic using a representative test set and ensure outputs are reviewable (human-readable rationale fields, audit trail of scoring inputs, and links to underlying elements/proof artifacts).<br><b>Resources needed:</b><br><ul><li>Cleared evidence ad hoc data scientist/analyst (Python or tooling support)</li><li>Classified Evidence Safety &amp; Courtroom Admissibility Manager</li><li>Admissibility threshold/pivot rubric owner</li><li>Protective-order counsel (cleared as needed)</li><li>Evidence analyst for scoring QA</li></ul>",

    {
      "id": "ed438c43-b357-47a2-9d24-a61f6c748998",
      "text": "Prototype Validation on Candidate Exhibits",
      "custom_tooltip": "<b>Prototype Validation on Candidate Exhibits</b><br>Run a validation pass against a sample set of classified exhibit candidates using adversarial-style objection scenarios. Confirm that: element mapping is complete, scoring fields are consistent across similar exhibit types, pivot-rule outputs match expected legal strategy, and chain-of-custody references are present for each proof artifact. Produce a validation report listing pass/fail items, required fixes, and a short rework plan to bring the prototype to an operationally usable level.<br><b>Resources needed:</b><br><ul><li>Expert advisory classified evidence &amp; protective order counsel</li><li>National-security or cleared evidentiary admissibility advisor</li><li>Cleared evidence custodian/security specialist</li><li>RICO proof-mapping &amp; charging design lead</li><li>Evidence analyst for QA and remediation</li></ul>",

      "custom_tooltip": "<b>Define sanitized exhibit boundaries</b><br>Specify rules for what may and may not appear in sanitized summaries for each classified item. Include: allowed characterization language, prohibited specificity, required element-to-proof mapping fields, basis statement requirements, and witness/expert foundation needs so sanitized exhibits remain coherent and not misleading. Deliverable is a standardized boundary checklist and draft standards document used by all cleared drafters.<br><b>Resources needed:</b><br><ul><li>Classified evidence safety manager</li><li>Classified evidence and protective-order counsel</li><li>Cleared subject-matter experts</li><li>Trial/forensic evidence drafting lead</li><li>Security/classification officer</li></ul>",

      "text": "Create substitution equivalency requirements",
      "custom_tooltip": "<b>Create substitution equivalency requirements</b><br>Define the equivalency expectations for when sanitized summaries are insufficient, including substitute-proof categories, coverage requirements by RICO element, and rules for pivoting from sanitization to substitute proof. Specify chain-of-custody and documentation expectations for non-sensitive supporting materials needed to reach element-level coverage without disclosure of classified specifics.<br><b>Resources needed:</b><br><ul><li>Classified evidence safety manager</li><li>Prosecution evidence mapping lead</li><li>Classified evidence and protective-order counsel</li><li>Forensic/non-sensitive evidence custodian</li><li>Expert witness coordination lead</li></ul>",

      "text": "Design pivot rule and threshold rubric",
      "custom_tooltip": "<b>Design pivot rule and threshold rubric</b><br>Develop a quantified threshold rubric and pivot logic that determines whether sanitized summaries can proceed or whether substitute-proof packages must be used (or further redaction changes triggered). Include probative-value/coverage scoring dimensions, minimum essential-element coverage thresholds, allowable uncertainty ranges, version-controlled decision tree logic, and escalation criteria for threshold disputes.<br><b>Resources needed:</b><br><ul><li>RICO proof-mapping and charging design lead</li><li>Litigation admissibility counsel</li><li>Classified evidence and protective-order counsel</li><li>Quantitative analyst (for scoring model setup)</li><li>Cleared evidence reviewer</li></ul>",

      "custom_tooltip": "<b>Build classified exhibit register prototype</b><br>Implement a prototype exhibit register that enforces the element-to-proof mapping, sanitized boundary rules, substitution equivalency requirements, and pivot-rule logic for 100% of candidate classified items (prototype level). The register must include coverage scoring fields, content-boundary references, approval/sign-off statuses, and traceability links back to the proof map so each decision is auditable for defense and court purposes.<br><b>Resources needed:</b><br><ul><li>Cleared evidence register builder (admin)</li><li>Evidence data architect</li><li>Classified evidence safety manager</li><li>RICO proof-mapping lead</li><li>IT/security for access control</li></ul>",

      "id": "829b004b-5614-4439-a291-393f23c900f0",
      "text": "Review mock exhibits and finalize logic",
      "custom_tooltip": "<b>Review mock exhibits and finalize logic</b><br>Produce at least one expert-reviewed mock sanitized exhibit and its substitute-proof package to confirm the rubric and pivot rules preserve targeted element coverage. Run an adversarial-style objection pass focused on suppression/taint, misleading-summarization, and equivalency failures; incorporate findings into the threshold rubric, pivot logic, and register schema so the operational package is ready for pilot use.<br><b>Resources needed:</b><br><ul><li>Cleared draft team</li><li>Classified admissibility counsel</li><li>National-security evidence advisor (cleared, if required)</li><li>Trial/forensic foundation expert</li><li>Adversarial review facilitator</li></ul>",

      "text": "Inventory classified evidence candidates",
      "custom_tooltip": "<b>Inventory classified evidence candidates</b><br>Create an initial classified evidence register for all candidate items, including category, sensitivity tier, custodian/owner, and which RICO element(s) each item is intended to prove. Establish an intake and retrieval cadence with cleared custodians, and define escalation paths if classification tiering or element mapping is disputed. Deliverable is a complete first-pass inventory sufficient to start sanitization/substitution planning and protective-order drafting.<br><b>Resources needed:</b><br><ul><li>Classified evidence custodian</li><li>Cleared evidence safety and handling lead</li><li>RICO proof-mapping lead</li><li>Classified intake coordinator</li><li>Cleared counsel support</li></ul>",

      "custom_tooltip": "<b>Define sanitized exhibit boundaries and foundations</b><br>For each classified item, define what may be sanitized and what must be withheld, plus the required witness/expert foundation needed to introduce the sanitized summary without misleading the jury. Build consistent boundary rules (content inclusions/exclusions, permissible characterizations, and citation/element mapping requirements). Run short cleared review loops on representative samples to confirm defensibility before scaling.<br><b>Resources needed:</b><br><ul><li>Classified evidence safety lead</li><li>Protective-order and admissibility counsel</li><li>Trial/expert evidence foundation lead</li><li>Cleared subject-matter experts</li><li>Cleared redaction/sanitization reviewer</li></ul>",

      "id": "b9dc55a4-a18b-4003-84c6-bcb97ba410c7",
      "text": "Design substitute-proof equivalency packages",
      "custom_tooltip": "<b>Design substitute-proof equivalency packages</b><br>Develop substitute-proof packages for items that cannot be fully sanitized, specifying the non-sensitive corroboration sources, chain-of-custody documentation expectations, and the evidentiary-equivalency logic tied to each RICO element. Maintain parallel custody and audit trails (hash manifests, access logs, and immutable inventory references). Include an objection-driven rehearsal step to stress-test whether substitutes can preserve targeted probative value and element coverage.<br><b>Resources needed:</b><br><ul><li>Substitute-proof package architect</li><li>Forensic/document custodian</li><li>Cleared evidence documentation specialist</li><li>Admissibility counsel</li><li>Forensics or corroboration analyst</li></ul>",

      "text": "Build quantified admissibility threshold rubric",
      "custom_tooltip": "<b>Build quantified admissibility threshold rubric</b><br>Create a measurable admissibility-preservation rubric that links classified evidence handling decisions to a quantified probative-value-loss limit for essential RICO elements. Define a pivot rule that triggers when coverage/probative thresholds are not met, forcing a switch from sanitization to substitution, further in-camera support, or narrowed element targeting. Pilot the rubric on early candidates and lock it version-controlled for operational use.<br><b>Resources needed:</b><br><ul><li>Classified evidence handling manager</li><li>RICO proof-mapping lead</li><li>Protective-order/admissibility counsel</li><li>Cleared national-security litigation advisor</li><li>Data/decision-rule owner</li></ul>",

      "id": "8c38dcc0-3c82-4ded-85a4-458a5f324ba3",
      "text": "Create protective order draft checklist",
      "custom_tooltip": "<b>Create protective order draft checklist</b><br>Draft protective-order and limited in-camera review request checklists tailored to the classified exhibit candidates, including required supporting declarations, proposed procedures, access restrictions, and handling rules for substitutes/sanitized summaries. Coordinate early clearance and court-preference alignment, then produce a standardized submission package template that can be quickly adapted for each protective-order filing window.<br><b>Resources needed:</b><br><ul><li>Protective-order drafting counsel</li><li>Cleared evidence custodian</li><li>Discovery/procedure coordinator</li><li>Classification and security liaison</li><li>Trial counsel support</li></ul>",

      "text": "Draft protective-order checklists",
      "custom_tooltip": "<b>Draft protective-order checklists</b><br>Develop court-ready checklists for classified and highly sensitive evidence, including protective-order request requirements, limited in-camera review procedures, sealing standards, and handling/attestation fields. Ensure each checklist aligns with the intended admissibility route (e.g., sanitized summary, substitute proof, in-camera only) and includes a pre-filing document list (exhibits register references, declarations, and redaction/sanitization rationale).<br><b>Resources needed:</b><br><ul><li>Classified evidence handling lead</li><li>Protective-order counsel</li><li>Prosecution lead</li><li>Discovery counsel</li><li>Security/custodian liaison</li></ul>",

      "custom_tooltip": "<b>Tailor templates to court rules</b><br>Adapt the protective-order and in-camera review templates to the specific jurisdiction/court practices. Create a mapping from local/federal rule requirements to each checklist section, including page limits, filing formatting, witness/expert access language, and restrictions on dissemination and review. Produce a version-controlled set of finalized template paragraphs ready for immediate filing.<br><b>Resources needed:</b><br><ul><li>Protective-order counsel</li><li>Court rules specialist</li><li>Prosecution/paralegal support</li><li>Case management system administrator</li></ul>",

      "id": "a27ece27-e8aa-4bd9-9bcf-31a273fcd6fe",
      "text": "Run cleared early review cycles",
      "custom_tooltip": "<b>Run cleared early review cycles</b><br>Conduct at least two early review loops with cleared security and prosecution stakeholders for each protective-order request package. Capture required edits to access limitations, disclosure conditions, exhibit handling instructions, and any additional declaration language. Maintain a sign-off matrix (who approved what, and when) and ensure all edits preserve the protective order\u2019s operational intent without creating inconsistency with the classified exhibit register and equivalency thresholds.<br><b>Resources needed:</b><br><ul><li>Cleared evidence custodian</li><li>Security/classification officer</li><li>Lead prosecutor</li><li>Classified evidence manager</li><li>Protective-order counsel</li></ul>",

      "text": "Sign-off matrix and submission package",
      "custom_tooltip": "<b>Sign-off matrix and submission package</b><br>Assemble the complete submission package: protective order request, limited in-camera request (if applicable), exhibit references tied to the classified exhibit register, declarations and handling attestations, and a final sign-off matrix covering legal, security, and discovery leadership. Validate internal consistency (no mismatched exhibit identifiers, no missing element-to-proof references, and no contradictions with the sanitized/substitute/in-camera routing plan) before producing a filing-ready bundle.<br><b>Resources needed:</b><br><ul><li>Protective-order counsel</li><li>Classified evidence handling lead</li><li>Discovery leadership</li><li>Forensic/exhibit management support</li><li>Security/custodian liaison</li><li>Paralegal/document control</li></ul>",

      "id": "b541f015-48a1-4931-a809-a3b9deaf4672",
      "text": "Inventory classified evidence and mappings",
      "custom_tooltip": "<b>Inventory classified evidence and mappings</b><br>Identify every candidate classified item, assign a sensitivity tier, and map each item to the specific RICO element(s) it is intended to prove. Confirm ownership/custodian, document retrieval status, and intended proof role (core vs supporting vs peripheral). Output a master classified evidence register draft with element-to-proof linkages and retrieval prerequisites.<br><b>Resources needed:</b><br><ul><li>Classified evidence safety and admissibility manager</li><li>Cleared evidence custodian</li><li>Classification/security official</li><li>RICO proof-mapping lead</li><li>Cleared counsel (advisory)</li></ul>",

    {
      "id": "9b88a631-b385-4206-a98a-39c1e6f2a9eb",
      "text": "Define sanitized exhibit boundaries and foundations",
      "custom_tooltip": "<b>Define sanitized exhibit boundaries and foundations</b><br>Create standardized rules for what may be safely summarized, including content boundaries, characterization limits, and permitted omission language. For each sanitized summary, specify required witness/expert foundation and identify what corroboration must be unclassified or otherwise admissibility-preserving. Run an early cleared review loop to lock permissible summaries before drafting at scale.<br><b>Resources needed:</b><br><ul><li>Cleared counsel (protective order and admissibility)</li><li>Subject-matter expert (cleared if needed)</li><li>Witness/expert foundation coordinator</li><li>Classified evidence safety officer</li><li>RICO element-to-proof mapping lead</li></ul>",

    {
      "id": "13b0ebb7-20c8-4297-8135-e525f6263d18",
      "text": "Design substitute-proof packages and equivalency",
      "custom_tooltip": "<b>Design substitute-proof packages and equivalency</b><br>Develop substitute-proof packages that preserve evidentiary value without disclosing classified details. For each candidate, document the chain-of-custody for non-sensitive extracts, map substitutes to the same element sub-facts, and define documentary/physical corroboration requirements. Perform a first-pass equivalency check and run a mock defense objection review to identify where substitute proof coverage falls short.<br><b>Resources needed:</b><br><ul><li>Forensic/records analyst team</li><li>Cleared chain-of-custody lead</li><li>Expert witness coordinator</li><li>Cleared counsel (admissibility and substitution)</li><li>Classification/security liaison</li></ul>",

    {
      "id": "aafcdc35-4ed6-4e7b-8d6a-8dae05f40329",
      "text": "Set admissibility threshold rubric and pivot",
      "custom_tooltip": "<b>Set admissibility threshold rubric and pivot</b><br>Create a quantified admissibility-preservation threshold rubric and a pivot rule that dictates when to change approach (e.g., move from sanitized summary to substitute proof or request in-camera review). Define scoring dimensions, probative-loss tolerance for essential element facts, and decision triggers. Version-control the rubric and secure sign-off from cleared admissibility and security stakeholders.<br><b>Resources needed:</b><br><ul><li>Classified evidence admissibility manager</li><li>Admissibility counsel (cleared)</li><li>National-security evidence advisor (cleared)</li><li>Evidence custodian/security specialist</li><li>RICO proof-mapping lead</li></ul>",

    {
      "id": "3afd4d5c-298e-4b48-9b26-cb693c2b14d8",
      "text": "Build classified exhibit register prototype",
      "custom_tooltip": "<b>Build classified exhibit register prototype</b><br>Implement an operational exhibit register prototype that enforces: element-to-proof mapping for every classified candidate, sanitized coverage scoring, substitute coverage scoring, and pivot-rule activation logic. Include required fields for provenance, permitted disclosure boundaries, and protective-order linkage. Validate the prototype against a representative sample and finalize for use in follow-on protective-order and exhibit drafting work.<br><b>Resources needed:</b><br><ul><li>Cleared evidence documentation coordinator</li><li>Secure database/tooling lead</li><li>RICO proof-mapping lead</li><li>Cleared counsel reviewer</li><li>Classified evidence safety/security officer</li></ul>",

      "id": "b545f99c-ab61-463b-938f-274d753c53d7",
      "text": "Threat inputs intake questionnaire",
      "custom_tooltip": "<b>Threat inputs intake questionnaire</b><br>Create and administer a standardized threat-assessment intake for Gordon and the Mayor. Define required fields (risk level category, known adversaries, recent incident indicators, communication exposure, travel/venue factors, and timing sensitivity), specify where inputs must come from, and set review SLAs for returning completed forms. Deliverable is a filled intake pack for both witnesses plus a documented baseline version.<br><b>Resources needed:</b><br><ul><li>Witness protection program manager</li><li>Security lead</li><li>Prosecution liaison for witness handling</li><li>Threat assessment specialist</li><li>Secure case-management/templating tool owner</li></ul>",

      "id": "8f8b95f2-fa01-4e01-ab74-1605ba8ef1c3",
      "text": "Risk level categorization and scoring",
      "custom_tooltip": "<b>Risk level categorization and scoring</b><br>Convert threat inputs into consistent risk categories using a defined scoring rubric (e.g., likelihood, impact, proximity/visibility, and recurrence). Produce a short rationale for each score to support later defensibility and prevent arbitrary shifts. Output includes risk-tier assignments for Gordon and the Mayor and a record of the rubric inputs used.<br><b>Resources needed:</b><br><ul><li>Threat assessment specialist</li><li>Security lead</li><li>Witness protection program manager</li><li>Prosecution trial counsel liaison</li></ul>",

      "id": "076474ee-8b58-49a8-9f37-2da726f41271",
      "text": "Protection posture feasibility linkage",
      "custom_tooltip": "<b>Protection posture feasibility linkage</b><br>Translate risk tiers into preliminary protection posture options (in-place vs relocation, transport security intensity, press visibility constraints, and contact restrictions). Create a matrix that links each risk-tier outcome to feasible posture recommendations and required operational prerequisites. Deliverable is an initial posture recommendation memo tied to the credibility-documentation standards.<br><b>Resources needed:</b><br><ul><li>Security operations lead</li><li>Witness protection program manager</li><li>Communications/security interface coordinator</li><li>Legal counsel liaison</li></ul>",

      "id": "5af9f03a-8d55-4f5c-aa3e-3734f45e75f4",
      "text": "Adversarial documentation and optics review",
      "custom_tooltip": "<b>Adversarial documentation and optics review</b><br>Review the collected threat inputs, risk classifications, and posture implications using an adversarial optics rubric focused on non-coercion and non-coaching appearance. Identify what must be documented differently to reduce impeachment risk and confidentiality exposure. Deliverable is an updated, approved threat-intake and risk document version with noted remediation actions.<br><b>Resources needed:</b><br><ul><li>Trial counsel expert (impeachment/credibility optics)</li><li>Witness protection program manager</li><li>Security lead</li><li>Case documentation/records coordinator</li></ul>",

      "text": "Availability-to-corroboration timeline update",
      "custom_tooltip": "<b>Availability-to-corroboration timeline update</b><br>Update the witness availability-to-corroboration timeline model based on threat risk outputs (e.g., when interviews can safely occur, when disclosures must be prepared, and any constraints caused by protection actions). Ensure the timeline has explicit assumptions and versioned dates so downstream corroboration planning can gate properly. Deliverable is a revised timeline model section for both witnesses.<br><b>Resources needed:</b><br><ul><li>Witness protection scheduling coordinator</li><li>Witness credibility/documentation manager</li><li>RICO proof-mapping lead liaison</li><li>Secure case-management tool administrator</li></ul>",

      "text": "Define command structure and RACI",
      "custom_tooltip": "<b>Define command structure and RACI</b><br>Draft the interagency command structure for FBI, DOJ, and local prosecutors, including a clear RACI (Responsible/Accountable/Consulted/Informed) for subpoenas, protective orders, classified handling requests, evidence sharing, and grand-jury sequencing. Identify named primary owners and alternates for each function and confirm escalation backstops for deadlocks.<br><b>Resources needed:</b><br><ul><li>Interagency command lead</li><li>DOJ liaison</li><li>FBI task force supervisor liaison</li><li>Local prosecutor designee</li><li>Policy/operations analyst</li><li>Legal counsel for governance model</li></ul>",

      "id": "2efa95ad-e07c-4245-a20d-08c408515b4a",
      "text": "Create evidence sharing matrix",
      "custom_tooltip": "<b>Create evidence sharing matrix</b><br>Define an evidence-sharing matrix covering at least eight evidence categories with explicit rules for: need-to-know and clearance prerequisites, secrecy boundaries, timing conditions (when information may be shared), handling requirements, ownership, and documentation artifacts. Validate the taxonomy and field completeness with cleared and trial teams, then lock the matrix behind change control.<br><b>Resources needed:</b><br><ul><li>Evidence sharing matrix lead</li><li>E-discovery/records coordinator</li><li>Classified handling liaison (cleared)</li><li>Prosecution discovery lead</li><li>DOJ/FBI counsel</li><li>Case-management system owner</li></ul>",

      "text": "Set approval SLAs and templates",
      "custom_tooltip": "<b>Set approval SLAs and templates</b><br>Establish approval SLAs for key actions (subpoena issuance/expansion, protective-order requests, classified handling requests, and grand-jury sequencing). Pre-negotiate standardized intake templates and acceptance criteria so routing is predictable. Include turnaround-time expectations, minimum supporting documentation requirements, and defined owners/approvers for each action type.<br><b>Resources needed:</b><br><ul><li>Approval workflow lead</li><li>DOJ criminal counsel</li><li>FBI legal liaison</li><li>Local prosecutor representative</li><li>Operations scheduler</li><li>Document/template manager</li></ul>",

    {
      "id": "a0fbfd15-fd59-4aa3-a3e0-40bbe87837be",
      "text": "Design escalation ladder and dispute rules",
      "custom_tooltip": "<b>Design escalation ladder and dispute rules</b><br>Create a time-bound escalation ladder for interagency disputes across legal, secrecy/classification, and operational constraints. Define severity levels, escalation triggers, decision owners at each rung, and required records to preserve. Run a tabletop red-team using likely conflict scenarios to ensure the ladder is workable within the staged 3\u20136 month pre-charge timeline.<br><b>Resources needed:</b><br><ul><li>Interagency dispute resolution lead</li><li>Appellate-minded prosecutor reviewer</li><li>DOJ/FBI counsel</li><li>Classification/security counsel (cleared)</li><li>Red-team facilitator</li><li>SLA analyst</li></ul>",

    {
      "id": "951d96ce-7e86-4873-a0dd-1092083d96eb",
      "text": "Validate charter via red-team tabletop",
      "custom_tooltip": "<b>Validate charter via red-team tabletop</b><br>Conduct structured tabletop red-team sessions that simulate high-risk decision points: subpoena expansion, protective-order filing, classified handling interlocks, and grand-jury sequencing. Capture gaps in governance, evidence-sharing, and SLA performance; assign targeted remediation owners; and produce a signed interagency command charter with the finalized RACI, evidence matrix, SLAs, and escalation ladder.<br><b>Resources needed:</b><br><ul><li>Interagency command lead</li><li>Charter sign-off approvers (DOJ, FBI, local)</li><li>Trial counsel</li><li>Classified evidence handler (cleared)</li><li>Facilitator</li><li>Action-log/scribe</li></ul>",

      "custom_tooltip": "<b>Inventory classified evidence candidates</b><br>Compile a preliminary classified evidence register for all candidate items, including category, sensitivity tier, custodian/owner, and intended mapping to specific RICO elements. Establish a standard intake template, record initial access/status, and define an escalation SLA for missing retrievals or disputed tier/mapping determinations so sanitization and substitution work can start without rework.<br><b>Resources needed:</b><br><ul><li>Classified evidence safety &amp; courtroom admissibility manager</li><li>Cleared evidence custodian or retrieval coordinator</li><li>Classification/security liaison</li><li>Lead prosecutor or RICO proof-mapping lead</li><li>Cleared counsel for evidence handling</li></ul>",

    {
      "id": "4feb1045-80f0-4ad9-be83-55bea6d15aab",
      "text": "Draft sanitized exhibit boundaries",
      "custom_tooltip": "<b>Draft sanitized exhibit boundaries</b><br>Define what can be safely disclosed for each candidate item by writing sanitized-summary boundary rules (include/exclude lines), permissible characterization language, and required witness/expert foundation elements. For each sanitized exhibit candidate, document an element-to-proof mapping, create coverage scoring inputs (what element facts are addressed), and run cleared review loops to confirm that summaries remain accurate without revealing prohibited details.<br><b>Resources needed:</b><br><ul><li>Cleared counsel for classified handling</li><li>Trial counsel / RICO element mapping attorney</li><li>Cleared subject-matter experts</li><li>Classified exhibit drafting team</li><li>Security/CTI review support</li></ul>",

    {
      "id": "5a711e5a-4f36-4ab8-84f8-1b2170335319",
      "text": "Create substitute-proof equivalency packages",
      "custom_tooltip": "<b>Create substitute-proof equivalency packages</b><br>Design substitute-proof packages for any classified item that cannot be fully sanitized, ensuring equivalency through non-sensitive corroboration and rigorous documentation. For each substitute package, document the element-to-proof alignment, establish required non-sensitive corroborators, define chain-of-custody and immutable evidence-log requirements, and perform an adversarial-style objection pass to catch foundation, relevance, or disclosure weaknesses early.<br><b>Resources needed:</b><br><ul><li>Cleared evidence safety manager</li><li>Forensic/corroboration analysts</li><li>Chain-of-custody and evidence-log specialist</li><li>Cleared trial counsel</li><li>RICO proof-mapping lead</li></ul>",

    {

      "text": "Build admissibility threshold and pivot",

      "text": "Sanitized exhibit boundaries and foundations",
      "custom_tooltip": "<b>Sanitized exhibit boundaries and foundations</b><br>Define per-item sanitized summary rules (content boundaries, characterization limits, permitted inferences, and basis statements) and the required witness/expert foundation for each sanitized exhibit. Run short cleared review loops to confirm what may be summarized and ensure each sanitized summary aligns with element-to-proof coverage without creating misleading omissions.<br><b>Resources needed:</b><br><ul><li>Classified evidence &amp; protective-order counsel</li><li>Cleared trial counsel</li><li>Subject-matter experts (cleared as required)</li><li>Evidence analyst</li><li>Court-admissibility reviewer</li></ul>",

      "id": "cc8c3e29-80e9-400b-86df-9b23dff6a805",
      "text": "Substitute-proof packages and equivalency",
      "custom_tooltip": "<b>Substitute-proof packages and equivalency</b><br>Design substitute-proof packages for classified items using non-sensitive corroboration pathways. For each substitute candidate, document chain-of-custody for non-sensitive materials, set up an element-to-proof equivalency checklist, and prepare the expert testimony foundation needed to support admissibility despite substitutions. Maintain parallel documentation so protective-order and disclosure requests can be finalized concurrently.<br><b>Resources needed:</b><br><ul><li>Cleared evidence custodian</li><li>Chain-of-custody documentation lead</li><li>Forensic/expert team (as required)</li><li>Evidence analyst</li><li>Admissibility counsel</li></ul>",

      "id": "b4db753e-ec76-4e06-bb83-6cf905457016",
      "text": "Admissibility threshold rubric and pivot rule",
      "custom_tooltip": "<b>Admissibility threshold rubric and pivot rule</b><br>Develop a quantified admissibility-preservation threshold rubric (probative-value loss constraints, essential-element coverage expectations, and sensitivity-dependent limitations). Implement pivot-rule logic that triggers re-scoping actions (e.g., adjust sanitization scope, expand substitutes, or seek in-camera handling) when coverage falls below the defined threshold. Lock the rubric behind version control and require cleared sign-off before broader use.<br><b>Resources needed:</b><br><ul><li>Classified evidence admissibility manager</li><li>Protective-order counsel</li><li>RICO proof-mapping lead</li><li>Data/analytics support (for scoring logic)</li><li>Cleared litigation reviewer</li></ul>",

      "text": "Classified exhibit register prototype",
      "custom_tooltip": "<b>Classified exhibit register prototype</b><br>Build and validate a classified exhibit register prototype that enforces mandatory fields: item identity, element mapping, sanitized coverage score, substitute coverage score, pivot-rule references, and protective-process status. Validate against a representative sample of candidate exhibits using mock submissions and cleared objections, then produce a prototype exhibit package ready for final expert and courtroom rehearsal.<br><b>Resources needed:</b><br><ul><li>Classified evidence register builder</li><li>Protected data engineer (access controls)</li><li>Cleared evidence analyst</li><li>Protective-order counsel</li><li>Expert reviewer (cleared as required)</li></ul>",

      "id": "5ba07b32-f728-4572-8747-dcd203bf9869",
      "text": "Define jury bias domain model",
      "custom_tooltip": "<b>Define jury bias domain model</b><br>Develop a usable, Gotham-specific bias taxonomy that links factors like celebrity sympathy, institutional trust skepticism, and Batman mythology effects to measurable juror attitudes. Specify assumptions, uncertainty ranges, how new monitoring data updates the model, and how outputs will drive voir dire and transfer triggers. Deliverable includes a version-controlled domain model and mapping to downstream decisions.<br><b>Resources needed:</b><br><ul><li>Public/jury-risk strategy counsel</li><li>Appellate specialist</li><li>Jury research consultant</li><li>Trial counsel</li><li>Project coordinator</li></ul>",

    {
      "id": "eb2819ee-81bf-495c-83b2-f54f8f5e64a1",
      "text": "Draft legally safe voir dire outlines",
      "custom_tooltip": "<b>Draft legally safe voir dire outlines</b><br>Translate the bias domain model into neutral, non-leading voir dire question outlines and follow-up probes. Ensure questions are legally defensible, limited to discovering bias (not arguments), and aligned to each bias domain. Provide an approved question bank structure plus a quick-adoption appendix for changes in venire composition. Deliverable includes a draft voir dire package with rationale per question set.<br><b>Resources needed:</b><br><ul><li>Trial counsel</li><li>Appellate specialist</li><li>Jury-risk strategy counsel</li><li>Note taker / documentation lead</li></ul>",

    {
      "id": "ed7fc18a-b204-4049-bfc3-a568143f8343",
      "text": "Create publicity measurement data plan",
      "custom_tooltip": "<b>Create publicity measurement data plan</b><br>Define the weekly and event-driven pretrial publicity measurement plan. Specify metrics (volume, sentiment proxies, rumor escalation indicators), authorized data sources, cadence, spike-review rules (e.g., within 24\u201348 hours of key events), and thresholds that trigger manual review or bias-domain updates. Deliverable includes a measurement playbook and dashboard specification.<br><b>Resources needed:</b><br><ul><li>Publicity monitoring lead</li><li>Data analyst</li><li>Communications officer</li><li>Legal oversight counsel</li><li>Tooling/support engineer</li></ul>",

      "id": "e27563ee-1ce6-476b-a959-43290f691949",
      "text": "Build transfer trigger rule engine",
      "custom_tooltip": "<b>Build transfer trigger rule engine</b><br>Implement a quantified rule engine that outputs recommendations for transfer or expanded jury actions when publicity/jury-bias indicators exceed defined thresholds. Document legal rationale for each parameter, include versioning and uncertainty handling, and define required record-creation artifacts upon trigger activation. Deliverable includes the rule logic, test cases, and an approval-ready record checklist.<br><b>Resources needed:</b><br><ul><li>Appellate specialist</li><li>Trial counsel</li><li>Jury-risk strategy counsel</li><li>Data analyst</li><li>Record-keeping coordinator</li></ul>",

      "text": "Validate and finalize jury-risk package",
      "custom_tooltip": "<b>Validate and finalize jury-risk package</b><br>Run structured expert validation against the drafted domain model, voir dire outlines, measurement plan, and transfer trigger logic. Capture gaps into an issue log, perform at least one iteration cycle, and produce the final signed package with a court-ready record-preservation checklist. Deliverable includes the finalized Gotham jury-risk package and validation sign-off notes.<br><b>Resources needed:</b><br><ul><li>Appellate specialist</li><li>Trial counsel</li><li>Jury research consultant</li><li>Publicity monitoring lead</li><li>Project coordinator</li></ul>",

      "id": "b7397992-ecc4-4ce8-ad10-b11b5b464dcb",
      "text": "Admissibility elements mapping workshop",
      "custom_tooltip": "<b>Admissibility elements mapping workshop</b><br>Align on the exact RICO elements and predicate-specific elements that each classified evidence candidate is intended to prove, including what component facts must survive admissibility scrutiny. Produce an element-to-proof mapping template that all classified items must reference, with clear ownership for any disputed element interpretations.<br><b>Resources needed:</b><br><ul><li>Classified evidence admissibility counsel</li><li>Lead prosecutor</li><li>RICO proof-mapping lead</li><li>Cleared evidence custodian</li><li>Cleared subject-matter experts</li></ul>",

      "text": "Classified evidence register and element links",
      "custom_tooltip": "<b>Classified evidence register and element links</b><br>Create and populate a secure classified exhibit register prototype for 100% of candidate classified items, capturing: item identifier, sensitivity tier, intended element mappings, current handling status, and placeholders for sanitized/substitute outputs. Enforce a controlled change process so element mappings can be updated without losing auditability.<br><b>Resources needed:</b><br><ul><li>Cleared evidence custodian</li><li>Classified evidence safety officer</li><li>Case-management analyst</li><li>RICO proof-mapping lead</li><li>Security-cleared data steward</li></ul>",

      "text": "Sanitized and substitute equivalency design",
      "custom_tooltip": "<b>Sanitized and substitute equivalency design</b><br>For each classified item, define boundaries for what may be summarized (sanitized summary) and what must be replaced (substitute proof), ensuring each output is tied back to the mapped RICO elements. Build a quantified equivalency/coverage check for essential element facts and document the admissibility-preservation rationale and pivot triggers when coverage degrades beyond an agreed threshold.<br><b>Resources needed:</b><br><ul><li>Classified evidence admissibility counsel</li><li>Cleared intelligence/classification specialists</li><li>Forensic/evidence foundation experts</li><li>Lead prosecutor</li><li>RICO proof-mapping lead</li></ul>",

      "id": "808585f0-f1c8-4cb1-8e03-a23d2137b456",
      "text": "Protective order and in-camera workflow",
      "custom_tooltip": "<b>Protective order and in-camera workflow</b><br>Draft protective-order and limited in-camera review request checklists and templates tailored to the anticipated classified candidates. Include review sequencing (what goes to court first), sign-off owners, and record-creation expectations. Prepare a submission-ready packet outline that links each protected exhibit to its sanitized/substitute package and pivot rationale.<br><b>Resources needed:</b><br><ul><li>Protective-order counsel (cleared)</li><li>Classified evidence custodian</li><li>Lead discovery manager</li><li>Security clearance officer</li><li>Court liaison/paralegal</li></ul>",

      "id": "85959a76-0901-4827-9237-a459c3953bc3",
      "text": "Expert mock exhibit validation pass",
      "custom_tooltip": "<b>Expert mock exhibit validation pass</b><br>Run at least one adversarial-style mock exhibit package review (sanitized + substitute) focusing on element coverage, witness/expert foundation sufficiency, and compliance with pivot/threshold rules. Capture gaps, assign rapid rework ownership with turnaround SLAs, and finalize the \u201capproved prototype\u201d state for operational use within the pre-charge timeline.<br><b>Resources needed:</b><br><ul><li>Adversarial admissibility reviewer</li><li>Cleared counsel</li><li>Expert witness foundation specialist</li><li>Lead prosecutor</li><li>Evidence custodian</li></ul>",

    {
      "id": "c65e86f4-bc25-47b4-93b7-6e539b9cdbab",
      "text": "Create evidence-sharing matrix starter kit",
      "custom_tooltip": "<b>Create evidence-sharing matrix starter kit</b><br>Define a baseline matrix template and taxonomy for evidence sharing across FBI/DOJ/local prosecutors. Establish required columns (category, handling level, clearance/need-to-know prerequisites, secrecy boundary, owners, documentation artifacts, and release conditions) and provide example mappings for at least a few representative evidence types. Deliver a v1 schema ready for iterative population.<br><b>Resources needed:</b><br><ul><li>Interagency evidence-sharing lead</li><li>Prosecutor evidence counsel</li><li>Federal liaison (FBI/DOJ)</li><li>Classification/security officer</li><li>Case management system owner</li><li>Records/metadata specialist</li></ul>",

    {
      "id": "4be06db2-f532-447e-92e5-8a6367db9f45",
      "text": "Map evidence categories to rules",
      "custom_tooltip": "<b>Map evidence categories to rules</b><br>Translate the team\u2019s evidence categories into concrete sharing rules by secrecy boundary and clearance level. For each category, specify: who can receive it, what prerequisites apply, permitted purposes, documentation requirements, and timing gates (e.g., pre- vs post-protective order). Validate terminology consistency across agencies and ensure the mapping aligns with protective-order and classified-handling assumptions.<br><b>Resources needed:</b><br><ul><li>Classification and security officer</li><li>DOJ/FBI liaison counsel</li><li>Local prosecutor representative</li><li>Discovery/records lead</li><li>Protective-order drafting counsel</li></ul>",

    {
      "id": "8c45f054-71cd-4c9f-95b4-c7dd36b4685f",
      "text": "Validate matrix with sample evidence items",
      "custom_tooltip": "<b>Validate matrix with sample evidence items</b><br>Populate the matrix using representative sample evidence items (including at least one non-sensitive, one privileged-taint-sensitive, and one classified/highly sensitive category). Run completeness and consistency checks (all categories have routing and release conditions; no gaps in prerequisites; ownership identified). Conduct a controlled tabletop walkthrough of 3-5 sharing scenarios (e.g., subpoena prep, protective-order request, cleared collaboration, derivative sharing restrictions).<br><b>Resources needed:</b><br><ul><li>Evidence-sharing matrix owner</li><li>Forensic accounting/records representative</li><li>Classified evidence custodian (cleared)</li><li>Trial counsel representative</li><li>Tabletop facilitator</li></ul>",

      "id": "9da8c8a2-8deb-4bc0-81e9-ce08072e25d0",
      "text": "Obtain sign-off and lock change control",
      "custom_tooltip": "<b>Obtain sign-off and lock change control</b><br>Secure formal sign-off from each workstream leader (FBI, DOJ, local prosecutors, classification/security, and discovery leadership). Publish the finalized matrix under version control with a change-control process (who can request changes, required impact assessment fields, and approval SLAs). Produce a short operational user guide describing how teams should apply routing rules during the pre-charge timeline.<br><b>Resources needed:</b><br><ul><li>Lead prosecutor</li><li>DOJ/FBI liaison leadership</li><li>Local prosecutor lead</li><li>Classification/security leadership</li><li>Change-control owner</li><li>Training/ops coordinator</li></ul>",

    {
      "id": "36620a4d-cbb6-41e8-b9b5-802d1cdc7a09",
      "text": "Define secrecy-and-sharing evidence taxonomy",
      "custom_tooltip": "<b>Define secrecy-and-sharing evidence taxonomy</b><br>Create a single, agreed evidence-category taxonomy for all interagency workstreams, mapping each category to required handling constraints and permissible sharing conditions. Define (1) evidence category labels, (2) secrecy boundary tags, (3) need-to-know rules, (4) clearance prerequisites, (5) storage/transfer requirements, and (6) baseline documentation expectations for any sharing action. Deliverable is a version-controlled taxonomy sheet plus a one-page rules summary for operational use.<br><b>Resources needed:</b><br><ul><li>Lead interagency coordinator</li><li>Evidence management lead</li><li>Classification/security officer</li><li>DOJ/FBI liaison counsel</li><li>Case-management system admin</li></ul>",
