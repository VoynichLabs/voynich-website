    {
      "id": "82e34a16-8911-4bad-bd4d-5e5ff5f0d5d5",
      "text": "Map categories to access and routing rules",
      "custom_tooltip": "<b>Map categories to access and routing rules</b><br>For each evidence category, specify the end-to-end routing rules: who may request it, who may approve release, which roles may view it, and what systems can be used for storage and transmission. Include a clearance/authorization matrix, role-based access requirements, and explicit \u201cdo not share\u201d conditions. Produce an evidence-handling routing table that integrates approval steps and escalation entry points for disputes or boundary conflicts.<br><b>Resources needed:</b><br><ul><li>Interagency operations lead</li><li>Security clearance officer</li><li>Privilege and discovery counsel</li><li>Systems/IT access administrator</li><li>Forensic evidence custodian</li></ul>",

    {
      "id": "f684904a-b423-47fc-a72f-57fa265e0546",
      "text": "Build evidence-sharing decision matrix",
      "custom_tooltip": "<b>Build evidence-sharing decision matrix</b><br>Create the evidence-sharing matrix that operationalizes the taxonomy and routing rules into a concrete decision framework. For each evidence category, define trigger events (e.g., subpoena preparation, protective order drafting, charging review), permissible sharing scope (internal-only, interagency-limited, cleared-only), required artifacts (e.g., logs, approval records), and SLA targets. Include a change-control section describing how updates propagate and how conflicting interpretations are resolved.<br><b>Resources needed:</b><br><ul><li>Evidence-sharing matrix owner</li><li>Interagency counsel liaison</li><li>Case-management workflow specialist</li><li>Classification/security advisor</li><li>Project manager</li></ul>",

    {

      "text": "Validate matrix with tabletop and sign-off",
      "custom_tooltip": "<b>Validate matrix with tabletop and sign-off</b><br>Run scenario-based tabletop testing to confirm the matrix prevents improper disclosure while avoiding operational deadlocks. Use representative scenarios covering: subpoena drafts, protective order requests, classified evidence summaries, and limited need-to-know sharing for investigation leads. Capture gaps, ambiguity, and SLA shortcomings; revise the matrix accordingly. Obtain formal sign-off from DOJ, FBI, local prosecution leadership, and classification/security stakeholders.<br><b>Resources needed:</b><br><ul><li>Trial counsel representative</li><li>DOJ/FBI liaison leadership</li><li>Classification/security counsel and officer</li><li>Trial publicity/compliance representative</li><li>Facilitator/project manager</li></ul>",

      "custom_tooltip": "<b>Publish version-controlled sharing playbook</b><br>Package the final evidence-sharing matrix, taxonomy, routing rules, and dispute-escalation steps into a version-controlled playbook suitable for execution during the pre-charge timeline. Include: (1) quick-reference flowcharts, (2) required documentation checklists, (3) audit/log expectations for every sharing action, (4) escalation contacts and time limits, and (5) onboarding guidance for new team members and cross-agency staff.<br><b>Resources needed:</b><br><ul><li>Knowledge management / legal ops coordinator</li><li>Interagency coordinator</li><li>Case-management documentation owner</li><li>Security/classification representative</li><li>Training/onboarding lead</li></ul>",

      "text": "Define interagency command RACI roles",
      "custom_tooltip": "<b>Define interagency command RACI roles</b><br>Draft the interagency command structure spanning FBI, DOJ, and local prosecutors. Specify functional roles (e.g., lead authority, subpoena routing, protective orders, classified handling, evidence sharing), deputies/alternates, and accountability (RACI). Validate terminology alignment across offices and run a short sign-off workshop to lock responsibilities and ownership for downstream operational actions.<br><b>Resources needed:</b><br><ul><li>Interagency command lead</li><li>DOJ liaison counsel</li><li>FBI task force supervisor</li><li>Local prosecutor designee</li><li>Operations/planning coordinator</li></ul>",

      "text": "Establish lead authority and ownership",
      "custom_tooltip": "<b>Establish lead authority and ownership</b><br>Create a decision-ownership matrix that assigns a single named owner and approver (plus fallback) for each high-risk action type: subpoena issuance/expansion, protective order requests, classified handling requests, and grand jury sequencing where applicable. Run a tabletop red-team focused on decision deadlocks and secrecy conflicts to ensure there are no ambiguities in who can approve what and how disputes are resolved.<br><b>Resources needed:</b><br><ul><li>Interagency command lead</li><li>Federal prosecutor (criminal division experience)</li><li>Classified handling liaison</li><li>Local prosecutor leadership</li><li>Administrative case coordinator</li></ul>",

      "text": "Draft approval SLAs for key actions",
      "custom_tooltip": "<b>Draft approval SLAs for key actions</b><br>Define measurable approval SLAs for time-sensitive actions: subpoenas, protective orders, classified evidence handling requests, and grand jury sequencing steps. Pre-negotiate standardized templates and minimum documentation requirements for each action type. Validate routing paths and turnaround-time assumptions through two tabletop walkthroughs with representatives from each agency and incorporate a controlled change process for any redlines.<br><b>Resources needed:</b><br><ul><li>DOJ liaison</li><li>FBI legal/compliance representative</li><li>Local prosecutor discovery lead</li><li>Evidentiary/records coordinator</li><li>Legal operations analyst</li></ul>",

      "id": "f01fcab8-8830-4909-a3e2-7912a3a7d937",
      "text": "Define evidence-sharing rules and gates",
      "custom_tooltip": "<b>Define evidence-sharing rules and gates</b><br>Define evidence-sharing rules by category using a unified taxonomy, mapped to secrecy boundary levels and need-to-know/clearance prerequisites. Specify what can be shared, with whom, when, and under what documentation requirements. Validate the rules with cleared counsel and classification/security officials, then lock them behind change control so they do not drift during execution.<br><b>Resources needed:</b><br><ul><li>Evidence-sharing coordinator</li><li>Classification/security officer</li><li>Cleared counsel</li><li>Interagency information security representative</li><li>Case management system owner</li></ul>",

      "custom_tooltip": "<b>Build evidence-sharing matrix and validate</b><br>Create and validate an evidence-sharing matrix covering at least eight evidence categories. Include required matrix fields such as evidence category, routing owner, clearance requirement, secrecy boundary handling, documentation artifacts, and release conditions. Perform a structured validation sequence (definitions, completeness checks, sample-to-matrix tests, and final sign-off). Produce a signed matrix plus an escalation ladder reference for matrix-related disputes.<br><b>Resources needed:</b><br><ul><li>Evidence-sharing matrix owner</li><li>Interagency representatives for each evidence category</li><li>Cleared evidence handler (security)</li><li>Case-management/tooling support</li><li>Legal reviewer for defensibility</li></ul>",

      "custom_tooltip": "<b>Evidence sharing matrix and rules</b><br>Create an evidence-sharing matrix that defines categories of information and when they may be shared across agencies. Specify secrecy boundary handling, need-to-know rules, clearance prerequisites, labeling/segregation expectations, and documentation artifacts required for each evidence category. Validate the taxonomy and routing logic with cleared counsel/security officials and lock it behind change control with an owner and review SLA.<br><b>Resources needed:</b><br><ul><li>Evidence sharing matrix owner</li><li>Classified handling/security counsel</li><li>Federal discovery/evidence coordinator</li><li>FBI/DOJ evidence custodians</li><li>Local prosecutor discovery lead</li><li>Classification-aware document specialist</li></ul>",

      "text": "Approval SLAs for sensitive actions",
      "custom_tooltip": "<b>Approval SLAs for sensitive actions</b><br>Define approval service-level agreements (SLAs) and acceptance criteria for subpoenas, protective orders, classified handling requests, and grand jury sequencing. Include routing paths, required supporting documentation, turnaround-time targets, escalation triggers, and fallback approvers. Pre-negotiate standardized templates and run tabletop walkthroughs with representatives to confirm the SLAs are executable under a 3\u20136 month pre-charge timeline.<br><b>Resources needed:</b><br><ul><li>DOJ/FBI liaison experts</li><li>Lead prosecutor</li><li>Protective order drafting counsel</li><li>Grand jury sequencing lead</li><li>Discovery workflow coordinator</li></ul>",

      "text": "Escalation ladder with time limits",
      "custom_tooltip": "<b>Escalation ladder with time limits</b><br>Create an escalation ladder that resolves interagency disputes over legal standards, secrecy boundaries, and timing conflicts without indefinite delay. Define the escalation sequence (who to contact next), time limits per step, dispute-resolution standards, and documentation requirements for auditability. Validate the ladder through a structured red-team tabletop focused on worst-case timing and classification/secrecy conflicts.<br><b>Resources needed:</b><br><ul><li>Interagency command &amp; federal liaison lead</li><li>Appellate-minded criminal counsel reviewer</li><li>Classified handling counsel</li><li>FBI supervision liaison</li><li>Case management/document controller</li></ul>",

      "text": "Tabletop validation and signed charter",
      "custom_tooltip": "<b>Tabletop validation and signed charter</b><br>Conduct tabletop red-team validation sessions across the critical decision points (subpoena expansion, protective order needs, classified handling interlocks, grand jury sequencing). Capture gaps, assign owners, and produce a corrected versioned charter/SLAs/matrix package. Finalize with named sign-offs and confirm every high-risk step has an approval owner and time limit.<br><b>Resources needed:</b><br><ul><li>Lead prosecutor (sign-off authority)</li><li>Interagency command charter owner</li><li>DOJ/FBI liaison representatives</li><li>Local prosecutor leadership</li><li>Classified handling representative</li><li>Facilitator and action-log coordinator</li></ul>",

      "text": "Draft venue and jury risk gate",
      "custom_tooltip": "<b>Draft venue and jury risk gate</b><br>Define a formal venue/jury-risk decision gate for Gotham, including: scope of what triggers review (pretrial publicity spikes, witness-protection visibility events, classified proceeding headlines); decision record requirements; and the specific options available (stay posture, expanded voir dire plan, transfer/venue action readiness). Output is a gate specification document that the rest of the package must reference so thresholds and record-creation stay consistent across offices.<br><b>Resources needed:</b><br><ul><li>Trial/publicity strategy counsel</li><li>Criminal appellate specialist</li><li>Prosecutor lead</li><li>Jury-psychology or jury-research advisor</li><li>Case-management coordinator</li></ul>",

      "id": "43aed0e3-bfac-4e7c-ac14-4c33e40bac2a",
      "text": "Build publicity metrics and monitoring cadence",
      "custom_tooltip": "<b>Build publicity metrics and monitoring cadence</b><br>Create a weekly publicity measurement plan with defined metrics and data sources. Include a baseline measurement method plus event-driven spike checks (e.g., 24\u201348 hour reviews after major filings, protection-related media events, and classified proceeding coverage). Specify sentiment/volume proxies, rumor escalation indicators, and a manual escalation rule when tools are delayed or data quality drops. Deliverables include a measurement dashboard template (logic + fields) and an operating cadence calendar.<br><b>Resources needed:</b><br><ul><li>Publicity metrics analyst</li><li>Communications officer liaison</li><li>Trial publicity strategist</li><li>Data tooling support (Python/analytics or equivalent)</li><li>Prosecutor approval owner</li></ul>",

      "text": "Define bias domain model and voir dire outline",
      "custom_tooltip": "<b>Define bias domain model and voir dire outline</b><br>Develop a Gotham-specific bias domain model tied to celebrity sympathy, institutional trust skepticism, and Batman/mythology effects. Convert the model into a legally safe voir dire question outline: neutral phrasing, non-argumentative structure, and mapping of each question to its bias domain. Include a change-control approach for updating questions if monitoring data or panel assumptions shift, while preserving record defensibility.<br><b>Resources needed:</b><br><ul><li>Jury/voir dire counsel</li><li>Criminal appellate specialist</li><li>Jury research advisor</li><li>Trial counsel</li><li>Legal editor for question safety review</li></ul>",

    {
      "id": "0924db1c-aa6a-4c6f-87d7-94a18b323493",
      "text": "Set transfer trigger thresholds and record checklist",
      "custom_tooltip": "<b>Set transfer trigger thresholds and record checklist</b><br>Create quantified transfer/expanded-jury trigger thresholds and a rule engine definition for when the team recommends action. Include required documentation artifacts for appellate preservation (what must be recorded, where, timestamps/approvers, and how each trigger decision links to monitored metrics). Deliverables include the threshold table, the rule logic description, and a court-ready record-creation checklist that can be executed within the defined time window after a trigger activates.<br><b>Resources needed:</b><br><ul><li>Criminal appellate specialist</li><li>Trial publicity strategy counsel</li><li>Operations lead for record-keeping</li><li>Prosecutor decision owner</li><li>Documentation/control officer</li></ul>",

      "text": "Validate package via expert review tabletop",
      "custom_tooltip": "<b>Validate package via expert review tabletop</b><br>Run structured expert tabletop scenarios across anticipated calendar windows (filings, hearings, witness-protection visibility, classified-related headlines). Validate that: thresholds are legally defensible; voir dire and record-creation checklists are actionable; and the workflow supports rapid execution without missing required artifacts. Produce a finalized venue/jury-risk package with an issues log, resolved deviations, and sign-offs for all key components.<br><b>Resources needed:</b><br><ul><li>Criminal appellate specialist</li><li>Trial publicity strategy counsel</li><li>Prosecutor lead</li><li>Jury research advisor</li><li>Facilitator/project coordinator</li></ul>",

      "custom_tooltip": "<b>Define jury bias domain model</b><br>Create an operational domain model translating Gotham-specific influences (celebrity sympathy, institutional trust skepticism, and Batman mythology effects) into measurable bias domains. Include assumptions, confidence levels, update triggers, and link each domain to later outputs such as voir dire topics and transfer/expanded-jury thresholds.<br><b>Resources needed:</b><br><ul><li>Public jury legitimacy &amp; pretrial publicity controller</li><li>Jury/Trial strategy counsel</li><li>Jury research consultant (optional)</li><li>Criminal appellate specialist (reviewer)</li><li>Comms/publicity strategist (reviewer)</li></ul>",

      "text": "Implement transfer trigger rule engine",
      "custom_tooltip": "<b>Implement transfer trigger rule engine</b><br>Create a quantified, legally defensible rule engine that recommends transfer/expanded-jury actions when bias/publicity thresholds are exceeded. Document the parameter values, decision logic, and evidence required to support activation. Run structured test cases to confirm the thresholds are usable under real-time operational pressure and preserve an appellate-ready record.<br><b>Resources needed:</b><br><ul><li>Criminal appellate specialist</li><li>Jury/Trial strategy counsel</li><li>Publicity measurement analyst</li><li>Trial court recording clerk (process design support, optional)</li></ul>",

      "id": "7481d9e4-1810-4974-afeb-2ac130e07b02",
      "text": "Establish bias domain model taxonomy",
      "custom_tooltip": "<b>Establish bias domain model taxonomy</b><br>Define a structured jury-bias taxonomy specific to a high-profile, celebrity-adjacent Gotham prosecution context. Capture the main bias domains (e.g., celebrity sympathy, institutional trust skepticism, mythology/symbolic associations, media narrative persistence) and define observable indicators that can be measured via publicity proxies and voir dire responses. Produce a one-page taxonomy with inclusion/exclusion boundaries and assumptions, plus a versioned change-log policy for updating the model as new data arrives.<br><b>Resources needed:</b><br><ul><li>Trial publicity &amp; jury-bias strategist</li><li>Criminal appellate counsel</li><li>Data/analytics lead</li><li>Communications officer</li><li>Project lead</li></ul>",

      "id": "25aee716-0faf-4313-bd8a-58b63edff0fe",
      "text": "Map bias domains to evidence disclosures",
      "custom_tooltip": "<b>Map bias domains to evidence disclosures</b><br>Translate each bias domain into a practical linkage to case-process events and disclosure categories that could drive bias amplification. Specify which operational actions (public filings timing, witness protection visibility, classified/hearing publicity boundaries) are most likely to trigger each bias domain and why. Deliver a crosswalk table that maps bias domains to event types and the corresponding mitigation levers, so later voir dire and publicity monitoring decisions reference the same bias framework.<br><b>Resources needed:</b><br><ul><li>Trial counsel</li><li>Publicity &amp; bias strategist</li><li>Prosecution lead</li><li>Communications officer</li><li>Evidence-handling lead</li></ul>",

    {
      "id": "6e55f72d-c088-4705-8c4a-1fc4271639a4",
      "text": "Validate taxonomy with expert workshops",
      "custom_tooltip": "<b>Validate taxonomy with expert workshops</b><br>Run structured expert review sessions to test whether the bias taxonomy is legally and operationally usable. Use a short set of hypothetical Gotham-relevant scenarios (neutral/non-neutral messaging, witness protection visibility timing, rumor escalation) and ask experts to score expected bias impact per domain. Capture disagreements, reconcile via a documented tie-break process, and finalize a v1 taxonomy with clear uncertainty notes and update triggers.<br><b>Resources needed:</b><br><ul><li>Jury science consultant or jury-bias strategist</li><li>Criminal appellate specialist</li><li>PR/legal counsel</li><li>Trial team representatives</li><li>Facilitator/project manager</li></ul>",

      "custom_tooltip": "<b>Define measurement proxies and update triggers</b><br>Define which measurable proxies (publicity volume, sentiment proxies, rumor escalation indicators, and voir dire response patterns) correspond to each bias domain. Specify cadence (e.g., weekly plus event-driven spikes) and rules for when new data is significant enough to update the model. Produce an operational playbook section: how the monitoring team feeds data into the taxonomy, who approves updates, and how changes propagate to voir dire and transfer/expanded-jury trigger logic.<br><b>Resources needed:</b><br><ul><li>Analytics lead</li><li>Publicity monitoring coordinator</li><li>Communications officer</li><li>Appellate counsel</li><li>Project lead</li></ul>",

      "custom_tooltip": "<b>Create evidence-path inventory scaffold</b><br>Build the evidence-path scaffold in a structured template: for each predicate target, create placeholders for at least three independent evidence paths and fields for source type, linkage to element sub-facts, independence assumptions, and current availability status. Ensure the scaffold supports later admissibility routing and corroboration scoring.<br><b>Resources needed:</b><br><ul><li>Forensic accounting support</li><li>Evidence lead</li><li>RICO proof-mapping analyst</li><li>Case-management system admin</li></ul>",

      "custom_tooltip": "<b>Populate paths from known sources</b><br>Populate each predicate\u2019s evidence paths using known investigative sources (documents, financial records, digital/communications indicators, and witness accounts). For each path, record: the specific claimed linkage to element sub-facts, the evidence location/custodian, and what would be required to make the path operational (e.g., retrieval, export, interview readiness).<br><b>Resources needed:</b><br><ul><li>Forensic investigators</li><li>E-discovery/evidence processing lead</li><li>Financial link analyst</li><li>Witness coordinator</li><li>RICO proof-mapping analyst</li></ul>",

      "text": "Run source verification sprints",
      "custom_tooltip": "<b>Run source verification sprints</b><br>Run short verification sprints to confirm existence and linkage for each candidate node in the evidence paths, including metadata integrity expectations and record-to-event matching. Mark gaps explicitly (missing records, unconfirmed linkage, weak source identity) and trigger follow-up collection requests rather than deferring discovery of missing evidence until gating.<br><b>Resources needed:</b><br><ul><li>Forensic investigators</li><li>E-discovery lead</li><li>Document retrieval coordinator</li><li>RICO proof-mapping analyst</li><li>Chain-of-custody/log owner</li></ul>",

      "text": "Complete independence and readiness flags",
      "custom_tooltip": "<b>Complete independence and readiness flags</b><br>Apply standardized independence/readiness flags to each evidence path node and path (independence rubric status, corroboration readiness, and preliminary admissibility routing tags). Produce a \u201cpredicate evidence-path inventory\u201d draft that is ready for the next step: scoring corroboration status and independence classification for every path.<br><b>Resources needed:</b><br><ul><li>RICO proof-mapping analyst</li><li>Litigation admissibility counsel (review-only)</li><li>Lead prosecutor</li><li>Independence rubric owner</li></ul>",

      "custom_tooltip": "<b>Draft legally safe voir dire</b><br>Translate the bias domains into a legally defensible voir dire outline and question bank. Ensure neutrality (no argumentative or leading phrasing), map each question to a bias domain, and include an appendix of approved variations for rapid adaptation if panel composition changes. Run an early legal redline review and produce a finalized, court-ready version.<br><b>Resources needed:</b><br><ul><li>Trial counsel</li><li>Criminal appellate counsel</li><li>Jury research/strategy counsel</li><li>Legal drafting assistant</li></ul>",

      "id": "ca491730-5a3f-46e0-8743-a1acf1f4377f",
      "text": "Create pretrial publicity measurement plan",
      "custom_tooltip": "<b>Create pretrial publicity measurement plan</b><br>Define a monitoring program with weekly cadence plus event-driven spike checks. Specify the metrics (coverage volume, sentiment proxies, rumor escalation indicators), identify authorized data sources, and establish escalation rules for manual review if thresholds are crossed despite tool/data latency. Output includes dashboard specifications and a record-creation checklist for later appellate preservation.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>Trial publicity/metrics specialist</li><li>Data analyst</li><li>Legal records custodian</li></ul>",

      "id": "ffe94271-d614-4683-a7ba-905b44ef108f",
      "text": "Build bias-trigger transfer rule engine",
      "custom_tooltip": "<b>Build bias-trigger transfer rule engine</b><br>Implement a threshold-based decision rule engine that recommends transfer/expanded jury actions when quantified publicity and bias indicators exceed defined cutoffs. Include parameter definitions, default conservative settings, and documented legal rationale for each threshold. Validate with structured test cases and confirm defensibility with trial/publicity and criminal appellate counsel.<br><b>Resources needed:</b><br><ul><li>Trial publicity/metrics specialist</li><li>Criminal appellate counsel</li><li>Trial counsel</li><li>Data analyst</li><li>Systems analyst (for rule engine/dashboard integration)</li></ul>",

      "text": "Create appellate preservation record checklist",
      "custom_tooltip": "<b>Create appellate preservation record checklist</b><br>Produce a court-ready checklist that ensures every publicity/bias trigger decision results in the required contemporaneous record artifacts. Define the minimal required items (timestamps, who approved what, what metrics were observed, and what counsel actions followed). Include a workflow for rapid activation (within required time windows) and a midstream consistency audit plan.<br><b>Resources needed:</b><br><ul><li>Criminal appellate counsel</li><li>Trial counsel</li><li>Paralegal/legal ops support</li><li>Record management specialist</li></ul>",

      "id": "508581b6-6c1e-4055-b755-680ddd9d73f9",
      "text": "Create anti-impeachment standards",
      "custom_tooltip": "<b>Create anti-impeachment standards</b><br>Define non-coercive witness documentation rules for Commissioner Gordon and the Mayor. Specify required interview/contact logging fields, permissible phrasing boundaries, and record-retention expectations that support credibility and oppose impeachment/managed-testimony narratives. Include a change-log process and version control so updates do not undermine defensibility.<br><b>Resources needed:</b><br><ul><li>Trial counsel</li><li>Witness protection credibility manager</li><li>FBI/DOJ liaison</li><li>Security lead</li><li>Documentation specialist</li><li>Legal analyst</li></ul>",

    {
      "id": "f108403c-bc56-4ecd-a99e-595f99d51d7b",
      "text": "Develop witness credibility rubric",
      "custom_tooltip": "<b>Develop witness credibility rubric</b><br>Draft a non-coaching credibility rubric that governs all witness interactions. Provide acceptance criteria for safe questioning, prohibited influence practices, conditions for documentation after each contact, and adjudication notes for exceptions (e.g., safety-driven posture changes). Ensure the rubric aligns with planned corroboration gating in the RICO proof map.<br><b>Resources needed:</b><br><ul><li>Trial counsel</li><li>Witness protection program manager</li><li>Impeachment/credibility litigation expert</li><li>RICO proof-mapping design lead</li><li>Prosecution team coordinator</li></ul>",

    {
      "id": "0eeb1138-81f3-4954-bcfb-24afbce267d7",
      "text": "Implement availability-to-corroboration timeline",
      "custom_tooltip": "<b>Implement availability-to-corroboration timeline</b><br>Build a practical scheduling model that ties witness protection actions to when corroboration must be available for disclosure and testimony. Create a timeline template linking interview windows, document needs, disclosure checkpoints, and expected corroboration readiness. Validate the model through tabletop shifts (e.g., delayed interview dates) to confirm deadlines remain achievable without compromising admissibility or witness safety.<br><b>Resources needed:</b><br><ul><li>Witness protection coordinator</li><li>Trial calendar manager</li><li>Prosecution disclosure lead</li><li>Scheduling assistant</li><li>RICO proof-mapping design lead</li></ul>",

    {
      "id": "024a7b19-8558-478b-9b90-c7f487eeb318",
      "text": "Run impeachment optics review checklist",
      "custom_tooltip": "<b>Run impeachment optics review checklist</b><br>Create and execute an adversarial-style review checklist to score documentation and procedures for coercion optics and credibility threats. Perform at least one simulation using hypothetical contact/interview events, then produce a short remediation plan for any gaps (missing log fields, inconsistent timestamps, unclear boundaries). Capture lessons learned in the rubric/standards update workflow.<br><b>Resources needed:</b><br><ul><li>Impeachment/credibility litigation expert</li><li>Trial counsel</li><li>Witness protection credibility manager</li><li>Security lead</li><li>Case-management tool admin</li></ul>",

      "id": "bf01e20b-0fb0-4360-887a-30a3e202d6d7",
      "text": "Finalize signed witness credibility package",
      "custom_tooltip": "<b>Finalize signed witness credibility package</b><br>Consolidate the rubric, standards, timeline model, and optics checklist into a single signed witness credibility documentation package. Obtain approvals from the prosecution lead, witness protection leadership, and relevant FBI/DOJ/security representatives. Deliver a final \u201coperational use\u201d guide: where forms live, required fields, who owns updates, and what triggers immediate re-documentation.<br><b>Resources needed:</b><br><ul><li>Lead prosecutor</li><li>Witness protection credibility manager</li><li>Security lead</li><li>FBI/DOJ liaison</li><li>Document controller</li><li>Legal counsel</li></ul>",

      "text": "Define pretrial event scenarios",
      "custom_tooltip": "<b>Define pretrial event scenarios</b><br>Select the specific pre-charge and pretrial calendar events that drive publicity and secrecy risk (e.g., initial filings, hearings, witness-protection visibility moments, classified proceeding touchpoints). For each scenario, document assumptions (who speaks, what is known, what must remain sealed/classified, and expected defense/press pressure points) to ensure consistent tabletop inputs.<br><b>Resources needed:</b><br><ul><li>Public-jury legitimacy controller</li><li>Trial/publicity strategy counsel</li><li>Communications officer</li><li>PR counsel</li><li>Classified evidence/protective order liaison</li></ul>",

      "text": "Run messaging and leak table-top",
      "custom_tooltip": "<b>Run messaging and leak table-top</b><br>Execute structured table-top exercises using the approved holding-statements library, jury-contamination-safe language rules, and the leak monitoring escalation SOP. Stress-test each workflow by introducing controlled \u201crumor/misstatement\u201d prompts and evaluate whether drafts remain neutral, whether prohibited phrases are avoided, and whether escalation timing/ownership functions as intended.<br><b>Resources needed:</b><br><ul><li>PR/legal counsel</li><li>Comms officer</li><li>Leak monitoring incident commander</li><li>Trial/publicity strategy counsel</li><li>Security/classification liaison</li><li>Prosecution representative</li></ul>",

      "id": "0ddf89a4-7686-42b3-9e9f-fb3549436b67",
      "text": "Score outcomes and identify guardrail gaps",
      "custom_tooltip": "<b>Score outcomes and identify guardrail gaps</b><br>Create a scoring log for each scenario covering: compliance with approved language taxonomy, jury-contamination risk level, leakage exposure risk, correctness of routing/approver workflow, audit/documentation completeness, and time-to-escalate vs. SLAs. Convert findings into a prioritized guardrail weakness list (must-fix vs. can-defer) with owner assignment and target turnaround times.<br><b>Resources needed:</b><br><ul><li>Public-jury legitimacy controller</li><li>Legal operations lead</li><li>Communications officer</li><li>Case management system owner</li><li>Trial counsel representative</li></ul>",

      "text": "Revise guardrails and re-sign",
      "custom_tooltip": "<b>Revise guardrails and re-sign</b><br>Apply one focused iteration cycle to update the guardrail package (holding statements, prohibited phrase list, approval workflow rules, and leak escalation decision tree) based on tabletop results. Perform a final internal verification pass for consistency across scenarios, then route for expedited PR/legal/security sign-off to produce the next version of the signed communications control package.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>PR counsel</li><li>Trial/publicity strategy counsel</li><li>Security/classification liaison</li><li>Document controller/change-log owner</li></ul>",

      "id": "bb37e883-a333-47eb-9a23-4a6f8bb1c061",
      "text": "Guardrail policy language taxonomy",
      "custom_tooltip": "<b>Guardrail policy language taxonomy</b><br>Create the authoritative public messaging taxonomy defining what is allowed, allowed with conditions, and prohibited. Include rule-of-law framing requirements, neutral/process-focused language principles, and explicit boundaries for operational details, evidence specifics, witness credibility commentary, and classified-adjacent references. Deliverable is a version-controlled policy document with prohibited/allowed example phrases and change-control rules.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>Public communications counsel</li><li>Lead prosecutor</li><li>Classification/security liaison</li><li>Interagency liaison</li></ul>",

    {
      "id": "56485b6a-fb6e-4308-a6d4-764a20db7993",
      "text": "Approved holding statements library",
      "custom_tooltip": "<b>Approved holding statements library</b><br>Draft a templated holding-statements library mapped to the key pre-charge event types: initial investigative developments, subpoenas/discovery actions, witness protection visibility steps, protective-order/classified proceedings, and any court-request hearings. Each template must remain jury-contamination-safe, avoid guilt conclusions, and exclude operational/evidentiary specifics. Include insertion fields for permitted non-sensitive facts (time/place/confirming procedural status) and keep a \u201cno-op/limited disclosure\u201d branch when sensitive items are implicated.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>PR counsel</li><li>Trial/publicity risk strategist</li><li>Protective order/classified evidence counsel</li><li>Evidence handling lead</li></ul>",

      "id": "6f988e94-5939-4eb9-9bbf-6a355afa4e50",
      "text": "Prohibited phrases and approved alternatives",
      "custom_tooltip": "<b>Prohibited phrases and approved alternatives</b><br>Produce a prohibited-phrase list and approved alternatives derived from the guardrail taxonomy and jury-risk considerations. Validate wording against scenario inputs (e.g., rumored evidence details, witness credibility insinuations, classified-proceeding chatter, and mention of witness cooperation) using legal review passes. Deliver a quick-reference lookup (matrix) that can be used during real-time approvals to prevent drift across agencies.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>Public communications counsel</li><li>Jury-risk / publicity specialist</li><li>Lead prosecutor designee</li></ul>",

    {
      "id": "1cdbad84-7ec6-47f8-9d87-25e66313d405",
      "text": "Message approval workflow and SLAs",
      "custom_tooltip": "<b>Message approval workflow and SLAs</b><br>Implement a message-approval workflow with named approvers and backup alternates, including explicit SLAs by message type (filings, protection steps, classified-related notices, general holds). Define mandatory audit/documentation fields (draft version, approval timestamp, approver identity, and required references to the holding template). Enforce a single intake channel and require all agency communications to route through the workflow except for pre-approved boilerplate that is explicitly whitelisted.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>Legal counsel</li><li>Lead prosecutor oversight</li><li>Case-management/workflow administrator</li></ul>",

    {
      "id": "ff7c30e4-c7b6-46b0-b8de-d79774aaadf5",
      "text": "Leak monitoring plan and escalation SOP",
      "custom_tooltip": "<b>Leak monitoring plan and escalation SOP</b><br>Create the leak monitoring plan specifying channels to monitor, monitoring cadence, severity rubric, escalation triggers, and a response decision tree (who does what, in what time window). Integrate with the message-approval workflow so escalations automatically select pre-approved neutral holding language. Deliverables include a secure dashboard/ticket taxonomy template and a runbook for incident command during high-profile rumor spikes.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>Security/classification liaison</li><li>PR crisis communications specialist</li><li>Workflow/tooling owner</li></ul>",

      "id": "95fbd46a-c3c1-4412-8e21-8acd496b71d9",
      "text": "Design message-approval workflow",
      "custom_tooltip": "<b>Design message-approval workflow</b><br>Define the end-to-end public communications approval process: single intake channel, drafting ownership, named approvers with backups, required approvals by event type (filings, classified proceedings, witness protection visibility), and audit/documentation requirements. Establish timebox SLAs per event category and enforce that all external statements flow through the workflow to prevent ad-hoc bypasses.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>Lead prosecutor (approver)</li><li>PR counsel</li><li>Communications law/risk counsel</li><li>Interagency liaison (as needed)</li><li>Case-management/ticketing administrator</li></ul>",

      "text": "Set approval SLAs and routing",
      "custom_tooltip": "<b>Set approval SLAs and routing</b><br>Create an SLA table that specifies response time targets for each message type and complexity tier, along with routing rules that determine which approvers must sign off (and in what sequence). Include escalation steps when an approver is unavailable and define contingency procedures for urgent pre-charge milestones without relaxing jury-contamination-safe language guardrails.<br><b>Resources needed:</b><br><ul><li>Lead prosecutor</li><li>Deputy prosecutor</li><li>PR counsel</li><li>Comms director or crisis comms lead</li><li>Ticketing workflow owner</li></ul>",

      "custom_tooltip": "<b>Build holding statement library v1</b><br>Produce a v1 library of pre-approved holding statements mapped to the key event types in the staged timeline (e.g., initial filing/motion events, protective order hearings, classified proceedings status updates, witness protection visibility notifications). Parameterize only non-sensitive fields and require that each template reference the corresponding prohibited-phrase rules and documentation requirements for auditability.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>PR counsel</li><li>Lead prosecutor (content approval)</li><li>Legal research support (as needed)</li></ul>",

      "custom_tooltip": "<b>Pilot workflow with simulated events</b><br>Run a tabletop simulation for the highest-risk event categories to verify the workflow operates under time pressure: draft intake, checklist gating, approver routing, audit log completion, and final publication readiness. Score the pilot for compliance with neutral language constraints, turnaround time against SLAs, and completeness of required documentation artifacts.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>PR counsel</li><li>Lead prosecutor or designee</li><li>Comms law/risk counsel</li><li>Ticketing administrator</li></ul>",

      "id": "cedbc50b-c361-4dcb-99ba-98e9c863c32f",
      "text": "Finalize signed communications package",
      "custom_tooltip": "<b>Finalize signed communications package</b><br>Consolidate the workflow design, SLA table, routing rules, holding statement library v1, and documentation/audit requirements into a version-controlled, sign-off-ready communications control package. Obtain final approvals from prosecution leadership, PR/legal counsel, and any required interagency stakeholders, then publish the operational checklist and enforcement guidance for all personnel who may request messaging.<br><b>Resources needed:</b><br><ul><li>Lead prosecutor</li><li>PR counsel</li><li>Communications law/risk counsel</li><li>Interagency liaison (as needed)</li><li>Document controller/version manager</li></ul>",

    {
      "id": "8c9a6824-f724-4024-8977-2da388fad50a",
      "text": "Create holding-statements event library",
      "custom_tooltip": "<b>Create holding-statements event library</b><br>Define a template-driven library of approved public holding statements mapped to event archetypes (e.g., filings, hearings, protective-order proceedings, classified proceeding status updates, and witness-protection visibility). Include parameter slots for safe facts (dates, procedural posture, general status) while prohibiting guilt conclusions and operational details. Produce v1 coverage for the event types expected in the 3\u20136 month pre-charge timeline.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>PR counsel</li><li>Lead prosecutor spokesperson coordinator</li><li>Trial counsel (approval reviewer)</li><li>Case team legal liaison</li></ul>",

    {
      "id": "e4439d0f-9736-465b-8a70-7fccba3d3820",
      "text": "Add approval checklists and triggers",
      "custom_tooltip": "<b>Add approval checklists and triggers</b><br>For each holding-statement template, create a matching approval checklist and objective trigger logic that determines when the template can be used as-is vs when edits/extra review are required (e.g., sealed filings, classified-context hearings, protective-order hearings). Define required inputs (what must be known) and explicit safe/unsafe fields (what must never be inserted). Ensure the workflow supports both fast response during news cycles and defensible neutrality for jury contamination risk.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>PR/legal counsel</li><li>Operations lead for communications workflow</li><li>Jury risk counsel</li><li>Interagency communications point person</li></ul>",

    {
      "id": "40eb933a-f791-4728-9d5c-f8c03848c88d",
      "text": "Define jury-safe language alternatives",
      "custom_tooltip": "<b>Define jury-safe language alternatives</b><br>Create a controlled set of approved alternative phrasings for common media queries and potential off-limits topics. Build a prohibited-phrase list and corresponding safe replacements tuned to the holding-statement templates (e.g., alternatives that avoid certainty, witness-credibility commentary, and evidence-detail specificity). Validate the replacements against representative mock scenarios to confirm they remain process-focused and do not imply uncharged guilt.<br><b>Resources needed:</b><br><ul><li>Jury risk / trial publicity strategist</li><li>PR counsel</li><li>Lead prosecutor legal reviewer</li><li>Communications officer</li><li>Appellate specialist (as needed)</li></ul>",

    },
    {
      "id": "60adbe8a-9521-4982-9d74-794bb65d14e5",
      "text": "Run scenario tabletop and adjust v1",
      "custom_tooltip": "<b>Run scenario tabletop and adjust v1</b><br>Conduct time-boxed messaging and leak-contamination tabletop simulations for the top anticipated event types during the pre-charge window. Stress-test the event library for failure modes such as inconsistent phrasing across agencies, inadvertent inclusion of operational/classified-adjacent details, and drift from neutral procedural framing. Record findings in a change-log and update the library to produce v1.1 with locked wording for approval-ready use.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>PR counsel</li><li>Lead prosecutor coordinator</li><li>Interagency comms representative</li><li>Evidence handling lead (consult-only)</li></ul>",

    },
    {
      "id": "eb877673-b653-48a9-acfa-4cb2649ee81f",
      "text": "Finalize v1 approvals and publish SOP",
      "custom_tooltip": "<b>Finalize v1 approvals and publish SOP</b><br>Obtain final sign-off for the holding-statements library and its usage rules from the named approval authorities. Publish the communications-ready package (templates, parameter rules, approval checklist, prohibited phrases, and trigger logic) into the designated secure workflow tool. Ensure version control, auditability (who approved what and when), and clear instructions for rapid insertion of templates during live news events.<br><b>Resources needed:</b><br><ul><li>Lead prosecutor</li><li>PR/legal counsel</li><li>Interagency command comms liaison</li><li>Communications officer</li><li>Workflow/tooling owner</li></ul>",

    {
      "id": "c433cdc6-eb07-4eba-85b7-1632db11a6d3",
      "text": "Staffed message approval workflow",
      "custom_tooltip": "<b>Staffed message approval workflow</b><br>Define a single, staffed workflow for all public-facing statements tied to RICO case milestones. Establish named approvers and backups, a single intake/queue for drafts, and explicit SLAs per event type (filing, hearing, protective order, classified-related proceeding, witness protection visibility). Include routing rules that prevent bypassing approvals and require the correct versioned template/holding statement for each statement category.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>Lead prosecutor public affairs liaison</li><li>PR counsel</li><li>Trial/courtroom publicity counsel</li><li>Interagency coordination representative</li></ul>",
      "start_date": "2027-04-18",

    {
      "id": "dcc5cd1e-1590-492a-a05b-00183d9b7660",
      "text": "Create message templates and inserts",
      "custom_tooltip": "<b>Create message templates and inserts</b><br>Build an approved library of holding statements mapped to event archetypes, then convert it into parameterized templates that can be safely reused. Specify allowed insert fields (e.g., time/location, procedural status, confirmation that an investigation is underway) and prohibited insert types (evidence details, guilt conclusions, operational methods). Ensure each template references the correct guardrail language set and produces an auditable linkage from statement to event type and supporting internal record.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>PR counsel</li><li>Trial/publicity risk counsel</li><li>Content editor</li><li>Case-management coordinator</li></ul>",
      "start_date": "2027-04-19",

    },
    {
      "id": "4f8dccb2-7329-4b06-95be-9031132cf1cb",
      "text": "Add audit and documentation requirements",
      "custom_tooltip": "<b>Add audit and documentation requirements</b><br>Define the audit record for each approved statement, including draft timestamp, approval chain, template/version used, event trigger classification, and the final release timestamp/channel. Specify mandatory fields for exception handling (e.g., emergency media request) and how deviations are recorded. Implement a consistent documentation rule so the team can later reconstruct what was said, who approved it, and why it was jury-contamination-safe and secrecy-compliant.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>Legal counsel</li><li>Systems administrator</li><li>Security/audit lead</li><li>Document controller</li></ul>",

    },
    {
      "id": "a8329f60-5757-4198-be28-227a179b4790",
      "text": "Pilot workflow with key scenarios",
      "custom_tooltip": "<b>Pilot workflow with key scenarios</b><br>Run a controlled tabletop/pilot of the workflow for several high-risk event scenarios (initial filing, protective-order-related hearing, classified proceeding update, and witness-protection visibility moment). Use example statements to verify routing, SLAs, template selection, prohibited-phrase handling, and escalation when an approver is unavailable. Capture gaps (e.g., missing event archetypes, unclear routing rules) and produce a short remediation backlog for final sign-off.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>Lead prosecutor approver</li><li>PR counsel</li><li>Trial/publicity counsel</li><li>Interagency representative</li><li>Facilitator</li></ul>",

    {
      "id": "15d1c4b4-8cfb-4c62-aff2-a37597b95d2e",
      "text": "Finalize and sign communications package",
      "custom_tooltip": "<b>Finalize and sign communications package</b><br>Consolidate the workflow specification, templates, audit requirements, and exception/escalation procedures into a version-controlled communications control package. Obtain final sign-off from required stakeholders (prosecutor leadership, PR/legal counsel, and any required secrecy/jury-risk approval roles). Publish the package to the secure repository with a controlled-change process and a clear effective date for operational use during the staged pre-charge timeline.<br><b>Resources needed:</b><br><ul><li>Lead prosecutor</li><li>PR counsel</li><li>Trial/publicity counsel</li><li>Case security officer</li><li>Document controller</li></ul>",

      "id": "3c47c69e-065f-4f69-b0c4-cb692c0ef140",
      "text": "Publish messaging guardrail policy",
      "custom_tooltip": "<b>Publish messaging guardrail policy</b><br>Create an authoritative public communications guardrail policy that governs all pre-charge communications. Include rule-of-law framing requirements, prohibitions on guilt conclusions and operational detail, classified/secrecy compatibility rules, and fairness/jury-contamination constraints. Define ownership, change control, and minimum review/approval triggers for any deviation.<br><b>Resources needed:</b><br><ul><li>Prosecution lead</li><li>Communications officer</li><li>PR counsel</li><li>Criminal trial/publicity counsel</li><li>Classification and security liaison</li></ul>",

      "id": "818add4e-56d1-4b74-89aa-9ce2820fbe56",
      "text": "Build holding statements event library",
      "custom_tooltip": "<b>Build holding statements event library</b><br>Develop a version-controlled library of approved holding statements mapped to the planned event types (e.g., filings, hearings, protective-order/classified proceedings status updates, witness protection visibility steps). For each event type, provide compliant wording variants (standard, limited-disclosure, sealed/attended-without-detail) and insert rules for parameters that can be safely customized.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>PR counsel</li><li>Prosecution attorney(s)</li><li>Records/operations liaison</li></ul>",

      "custom_tooltip": "<b>Define prohibited phrases and safe alternatives</b><br>Create jury-contamination-safe language rules, including a prohibited-phrase list and corresponding approved alternatives. Validate the language against likely scenarios (media inquiry about evidence specifics, witness protection logistics, classified hearing rumors) and ensure the rules reduce both evidentiary prejudice and impeachment/coercion optics risk.<br><b>Resources needed:</b><br><ul><li>Trial counsel</li><li>Appellate publicity specialist</li><li>Communications officer</li><li>PR counsel</li></ul>",

      "text": "Implement approval workflow and audit trail",
      "custom_tooltip": "<b>Implement approval workflow and audit trail</b><br>Design and implement a message-approval workflow with named approvers, backups, SLAs per event category, and required audit/documentation fields (timestamp, approver, version, event trigger). Ensure all public statements route through the workflow and that emergency/exception handling still preserves record integrity.<br><b>Resources needed:</b><br><ul><li>Project coordinator</li><li>Prosecution management approver(s)</li><li>Communications officer</li><li>PR counsel</li><li>Secure workflow tool administrator</li></ul>",

    {
      "id": "ff7a108f-5661-45c2-b3b5-89c6a3a6b6d2",
      "text": "Pilot leak monitoring and SOP",
      "custom_tooltip": "<b>Pilot leak monitoring and SOP</b><br>Create and pilot a leak monitoring plan and escalation SOP aligned to the guardrail policy. Define monitoring channels, cadence, severity rubric, escalation triggers, response decision tree, and responsibilities (who declares an incident, who approves corrective messaging, who halts/discloses nothing). Run a tabletop for key scenarios to correct guardrail weaknesses and ensure operational readiness.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>Security liaison</li><li>PR counsel</li><li>Case operations lead</li><li>Monitoring/SOC tooling support</li></ul>",

      "id": "16beddbe-16ba-4051-9c49-e905ebd3d56e",
      "text": "Define monitoring channels and sources",
      "custom_tooltip": "<b>Define monitoring channels and sources</b><br>Create an authoritative list of external and internal channels to monitor (local media, national outlets, social platforms, rumor forums, internal staff communications). Define who can report what, how items are categorized, and what is considered in-scope versus out-of-scope.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>PR counsel</li><li>Crisis communications lead</li><li>Information security liaison</li><li>Legal team liaison</li></ul>",

      "id": "caf15fb1-7669-4bab-b243-9a8e7daafb91",
      "text": "Set cadence, severity rubric, escalation triggers",
      "custom_tooltip": "<b>Set cadence, severity rubric, escalation triggers</b><br>Establish weekly cadence plus event-driven rapid checks (e.g., filings, witness-protection visibility events, classified proceedings). Define a severity rubric (likelihood x impact) and quantifiable escalation triggers (time thresholds, keyword/risk categories, rumor confirmation signals). Produce a one-page escalation ladder with decision owners and backup approvers.<br><b>Resources needed:</b><br><ul><li>Crisis communications lead</li><li>Trial publicity/jury-risk strategist</li><li>Lead prosecutor (approver)</li><li>Operations lead</li><li>Monitoring analyst</li></ul>",

      "id": "1e5f1403-9dc8-4eac-bdf5-3995aabd8bb8",
      "text": "Build secure dashboard and ticket taxonomy",
      "custom_tooltip": "<b>Build secure dashboard and ticket taxonomy</b><br>Implement a secure monitoring dashboard template and a ticketing-based workflow (incident tickets, rumor tickets, evidence-secrecy tickets). Define required ticket fields (timestamp, channel, summary, severity, potential jury-contamination risk, classified-evidence exposure risk, assigned owner, resolution outcome) and role-based access controls.<br><b>Resources needed:</b><br><ul><li>Communications operations staff</li><li>Case management/tooling owner</li><li>Information security liaison</li><li>Data analyst</li><li>Legal recordkeeping representative</li></ul>",

      "text": "Run tabletop scenarios and calibrate SOP",
      "custom_tooltip": "<b>Run tabletop scenarios and calibrate SOP</b><br>Conduct a tabletop exercise for key event scenarios (initial public filing, witness-protection visibility, classified-hearing rumor). Test the dashboard, ticket workflow, rubric scoring, escalation ladder, and response decision tree. Record gaps, update guardrails, and finalize operational thresholds with a limited change-control process.<br><b>Resources needed:</b><br><ul><li>PR counsel</li><li>Lead prosecutor or delegate</li><li>Crisis communications lead</li><li>Trial counsel team member</li><li>Jury-risk strategist</li></ul>",

      "text": "Finalize signed leak monitoring SOP",
      "custom_tooltip": "<b>Finalize signed leak monitoring SOP</b><br>Produce the final, signed communications control package section for leak monitoring: channel list, cadence, severity rubric, escalation triggers, response decision tree, documentation requirements, and audit trail expectations. Ensure alignment with jury-risk posture and classified evidence handling restrictions, and confirm the SOP is ready for the staged pre-charge timeline.<br><b>Resources needed:</b><br><ul><li>Lead prosecutor (sign-off)</li><li>PR counsel (sign-off)</li><li>Security/classification liaison (sign-off where needed)</li><li>Communications officer</li><li>Trial publicity/jury-risk strategist</li></ul>",

      "id": "a7a2bc00-3882-4bee-82ba-d533cde45a12",
      "text": "Define event scenarios and acceptance",
      "custom_tooltip": "<b>Define event scenarios and acceptance</b><br>Select and scope the key event scenarios to rehearse (e.g., initial filing, visible witness protection steps, classified proceeding status updates, rumored leaks). Define measurable acceptance criteria for each scenario, including jury-contamination safety, secrecy/classified-scope compliance, and response-time targets. Produce a short scenario script package with roles, inputs, and expected outputs.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>PR counsel</li><li>Trial/publicity strategy counsel</li><li>Evidence handling lead</li><li>Workflow/ops lead</li><li>Notetaker/document controller</li></ul>",

    {
      "id": "13d6ef8e-49eb-42d2-9a66-195dad2a5fe4",
      "text": "Run messaging and leak tabletop",
      "custom_tooltip": "<b>Run messaging and leak tabletop</b><br>Conduct time-boxed tabletop simulations using the pre-defined scenario scripts. Exercise the message-approval workflow end-to-end and apply the prohibited-phrase/neutral-language rules. Simulate leak/rummor detection through the monitoring plan and trigger the escalation decision tree to verify assignment of owners, escalation timing, and decision consistency.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>Leak monitoring owner</li><li>On-call incident commander</li><li>Prosecutor leadership representative</li><li>PR/legal counsel</li><li>Security/classification liaison</li><li>Facilitator</li></ul>",
      "start_date": "2027-05-10",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "a7a2bc00-3882-4bee-82ba-d533cde45a12 FS",
      "parent": "ad90cd07-05c3-416b-b2ac-4fe44e345ecc"
    },
    {
      "id": "f2374df3-e5ba-4ec5-9b10-96e61baeed6c",
      "text": "Identify guardrail gaps and fixes",
      "custom_tooltip": "<b>Identify guardrail gaps and fixes</b><br>Capture all observed failures and near-misses from the tabletop into a structured change log (problem statement, affected guardrail, severity, root cause, proposed fix, and required approver). Prioritize changes that reduce jury contamination or classified disclosure risk first. Produce corrected versions of any affected holding statements, prohibited-phrase rules, escalation thresholds, and ticketing templates.<br><b>Resources needed:</b><br><ul><li>PR counsel</li><li>Comms lead</li><li>Legal review lead</li><li>Security/classification liaison</li><li>Documentation controller</li><li>Approver roster (named approvers)</li></ul>",
      "start_date": "2027-05-12",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "13d6ef8e-49eb-42d2-9a66-195dad2a5fe4 FS",
      "parent": "ad90cd07-05c3-416b-b2ac-4fe44e345ecc"
    },
    {
      "id": "45ee9058-cef6-41a7-9b94-b5fcfb01a642",
      "text": "Finalize revised guardrails package",
      "custom_tooltip": "<b>Finalize revised guardrails package</b><br>Consolidate the updated materials into a cohesive, versioned communications control package, ensuring that all templates, checklists, and SOP steps reference the same updated rules and escalation thresholds. Include a brief operational runbook for spokespersons and responders, plus an audit trail summary of what changed and why.<br><b>Resources needed:</b><br><ul><li>Document controller</li><li>Communications officer</li><li>PR/legal counsel</li><li>Security/classification liaison</li><li>Systems/workflow administrator</li></ul>",
      "start_date": "2027-05-14",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "ad90cd07-05c3-416b-b2ac-4fe44e345ecc FF, f2374df3-e5ba-4ec5-9b10-96e61baeed6c FS",
      "parent": "ad90cd07-05c3-416b-b2ac-4fe44e345ecc"
    },
    {
      "id": "ff385d68-8f73-4b32-beba-270509ddd397",
      "text": "Validate communications guardrails with PR/legal counsel and finalize the signed communications control package",
      "custom_tooltip": "<b>Validate communications guardrails with PR/legal counsel and finalize the signed communications control package</b>",
      "progress": 0,
      "open": true,
      "meta": "d4d020e9-38e5-4895-a97b-b9b7321a42e9 FF, ad90cd07-05c3-416b-b2ac-4fe44e345ecc FS",
      "parent": "d4d020e9-38e5-4895-a97b-b9b7321a42e9",
      "type": "project"
    },
    {
      "id": "7cb4b18d-b9d3-4673-9e6d-49de0d301140",
      "text": "Schedule PR/legal validation session",
      "custom_tooltip": "<b>Schedule PR/legal validation session</b><br>Coordinate calendars and confirm attendance from all required approvers (PR/legal counsel, evidence-handling lead, interagency coordination lead). Provide the exact versioned deliverables for review and specify the decision deadline for final sign-off.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>PR counsel</li><li>Legal counsel</li><li>Evidence-handling lead</li><li>Interagency liaison</li><li>Administrative coordinator</li></ul>",
      "start_date": "2027-05-16",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "ff385d68-8f73-4b32-beba-270509ddd397 SS",
      "parent": "ff385d68-8f73-4b32-beba-270509ddd397"
    },
    {
      "id": "feef3a38-6599-4fa7-959f-31069285dd43",
      "text": "Run single consolidated redline",
      "custom_tooltip": "<b>Run single consolidated redline</b><br>Collect all review comments into one tracked change set using a single redline workflow. Categorize feedback as material/non-material, map each comment to the impacted section, and route each category to the appropriate reviewer for resolution.<br><b>Resources needed:</b><br><ul><li>Communications officer</li><li>PR counsel</li><li>Legal drafter/editor</li><li>Document control clerk</li><li>Workflow/ticketing system</li></ul>",
      "start_date": "2027-05-18",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "7cb4b18d-b9d3-4673-9e6d-49de0d301140 FS",
      "parent": "ff385d68-8f73-4b32-beba-270509ddd397"
    },
    {
      "id": "a57bf210-de79-4d09-9f44-e76d260be286",
      "text": "Resolve conflicting comments by owner",
      "custom_tooltip": "<b>Resolve conflicting comments by owner</b><br>Apply a pre-assigned decision owner and conflict-resolution rule for disagreements. Ensure disagreements affecting classified/sensitive handling or jury-contamination risk trigger a fast escalation path with timeboxed outcomes.<br><b>Resources needed:</b><br><ul><li>Decision owner (prosecution leadership)</li><li>PR/legal counsel reps</li><li>Classified evidence counsel/advisor</li><li>Jury-risk/venue counsel advisor</li><li>Security/classification liaison</li></ul>",
      "start_date": "2027-05-20",
      "duration": 2.0,
      "progress": 0,
      "open": true,
      "meta": "feef3a38-6599-4fa7-959f-31069285dd43 FS",
      "parent": "ff385d68-8f73-4b32-beba-270509ddd397"
    },
    {
      "id": "eace1894-c710-4af6-b66b-007cf2fb9dee",
      "text": "Finalize signed communications control package",
      "custom_tooltip": "<b>Finalize signed communications control package</b><br>Produce the final communications control documents in their operational form (approved holding statements policy, jury-neutral language rules, leak monitoring escalation SOP, ticketing/approval workflow references). Obtain final signatures and distribute read-only copies to authorized operational stakeholders with version control.<br><b>Resources needed:</b><br><ul><li>Lead prosecutor or delegated signatory</li><li>PR/legal counsel signatory</li><li>Document control system</li><li>Authorized distribution recipients</li></ul>",
      "start_date": "2027-05-22",
      "duration": 2.0,

    function zoomFit() {
        const tasks = gantt.getTaskByTime();
        if (tasks.length > 0) {
            const firstTask = tasks[0];
            const lastTask = tasks[tasks.length - 1];
            gantt.showDate(firstTask.start_date);
            
            // Calculate total duration in days
            const startDate = new Date(firstTask.start_date);
            const endDate = new Date(lastTask.end_date);
            const durationDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
            
            // Choose appropriate scale based on duration
            if (durationDays > 3650) { // More than 10 years
                gantt.config.scale_unit = "year";
                gantt.config.step = 10;
                gantt.config.subscales = [
                    {unit: "year", step: 1, date: "%Y"}
                ];
            } else if (durationDays > 365) { // More than 1 year
                gantt.config.scale_unit = "year";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "month", step: 1, date: "%M"}
                ];
            } else if (durationDays > 30) { // More than 1 month
                gantt.config.scale_unit = "month";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else if (durationDays > 7) { // More than 1 week
                gantt.config.scale_unit = "week";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else {
                gantt.config.scale_unit = "day";
                gantt.config.step = 1;
                gantt.config.subscales = [];
            }
            gantt.render();
        }
    }

    function zoomIn() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "year" && currentStep === 10) {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "day";
            gantt.config.step = 1;
            gantt.config.subscales = [];
        }
        gantt.render();
    }

    function zoomOut() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "day") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 10;
            gantt.config.subscales = [
                {unit: "year", step: 1, date: "%Y"}
            ];
        }
        gantt.render();
    }

    function downloadCSV() {
        if (GANTT_DATA_CSV === null) {
            return;
        }
        const blob = new Blob([GANTT_DATA_CSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', GANTT_FILENAME_CSV);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Gantt Initialization
    gantt.config.readonly = true;
    gantt.config.date_format = "%Y-%m-%d";
    gantt.config.scale_unit = "month";
    gantt.config.step = 1;
    gantt.config.subscales = [
        {unit: "day", step: 1, date: "%d"}
    ];

    gantt.config.columns = [
        {name:"text", label:"Task name", width:"*", tree:true},
        // {name:"start_date", label:"Start time", align: "center"},
        // {name:"duration", label:"Duration", align: "center"}
    ];

    gantt.templates.task_class = function(start, end, task) {
        if (task.type === "project") {
            return "project-task";
        }
        return "";
    };

    gantt.templates.tooltip_text = function(start, end, task) {
        return task.custom_tooltip || "No tooltip";
    };
    
	gantt.plugins({
		tooltip: true
	});
	gantt.attachEvent("onGanttReady", function(){
		var tooltips = gantt.ext.tooltips;
		tooltips.tooltip.setViewport(gantt.$task_data);
	});
    gantt.init("gantt_container");
    gantt.parse(GANTT_DATA_DHTMLX);

    // Hide the export to CSV button if there is no CSV data
    if (GANTT_DATA_CSV === null) {
        document.getElementById('exportToCSVButton').style.display = 'none';
    }

    document.getElementById('zoomFitButton').addEventListener('click', zoomFit);
    document.getElementById('zoomInButton').addEventListener('click', zoomIn);
    document.getElementById('zoomOutButton').addEventListener('click', zoomOut);
    document.getElementById('exportToCSVButton').addEventListener('click', downloadCSV);
</script>
