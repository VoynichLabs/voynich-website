      "custom_tooltip": "<b>Run admissibility spot-checks on dependencies</b><br>Perform early admissibility/authentication spot-checks for each killer dependency and its top fallback route. Validate chain-of-custody/hash verification, timestamp integrity, and provenance constraints for digital/ARGUS artifacts; validate witness corroboration availability and documentation discipline for testimony-driven dependencies. Produce a results log showing pass/fail/needs-fix status per dependency, and feed approved outcomes back into the dependency matrix with a controlled change-control note.<br><b>Resources needed:</b><br><ul><li>Evidence/admissibility counsel</li><li>Digital forensics and hashing workflow lead</li><li>Cross-agency timeline manager</li><li>Witness reliability/protective custody planner</li><li>Independent crypto/reversing consultant (as needed)</li></ul>",

      "custom_tooltip": "<b>Version-control matrix with proof-gate rules</b><br>Implement governance for the dependency matrix: define &#x27;proof-gate&#x27; acceptance criteria for when a dependency is promotable from draft to chargeable, how discrepancies are recorded, and what triggers rework (e.g., hash/timestamp mismatch, missing corroborator category, suppressed testimony scenario). Establish SLAs for remediation before narrative lock-in and produce a standardized &#x27;dependency change packet&#x27; template that documents rationale, affected overt acts, and updated fallback mappings.<br><b>Resources needed:</b><br><ul><li>Project manager / program coordinator</li><li>RICO case theory and charging lead</li><li>Digital forensics and evidence integrity lead</li><li>Inter-agency evidence logistics coordinator</li><li>Court-prep / motions strategy counsel</li></ul>",

      "custom_tooltip": "<b>Define corroboration-first dependency matrix</b><br>Build a dependency matrix that identifies which evidence classes are \u201ckiller\u201d for each overt act and predicate/enterprise element, including explicit fallback routes (substitution/stipulation-ready alternatives) when any evidence class is unavailable or excluded. Include a versioned evidence sufficiency rule set that blocks narrative lock-in until must-prove dependencies meet defined availability and admissibility assumptions.<br><b>Resources needed:</b><br><ul><li>Federal RICO and predicate strategy counsel</li><li>RICO case theory and charging lead</li><li>Digital forensics lead</li><li>Cross-agency timeline index manager</li><li>Evidence/admissibility counsel</li></ul>",

      "text": "Run weekly proof-gate re-mapping",
      "custom_tooltip": "<b>Run weekly proof-gate re-mapping</b><br>Establish and execute a recurring proof-gate loop: reconcile each overt-act mapping against the unified evidence timeline (timestamps, evidence IDs, and provenance flags), verify chain-of-custody/hash integrity status for ARGUS artifact sets, and confirm identity-linking prerequisites for any Platypus Man \u2194 Zane Goliath narrative elements. When a gate fails, trigger an explicit re-map of the affected overt act and its corroborator set with an auditable change log.<br><b>Resources needed:</b><br><ul><li>Cross-agency case operations lead</li><li>Digital forensics lead</li><li>Evidence logging coordinator</li><li>Hartford PD lead investigator</li><li>FBI/DEA proof leads</li><li>RICO case theory and charging lead</li></ul>",

      "text": "Produce incident-level mapping packages",
      "custom_tooltip": "<b>Produce incident-level mapping packages</b><br>Deliver courtroom-ready incident-level mapping packages that include: (a) the overt-act narrative placeholder, (b) must-prove vs support vs reserve ARGUS artifact list, (c) per-incident corroborator category definitions, (d) timestamp integrity notes and allowable error bounds for that packet, and (e) exhibit dependency pointers to what must be authenticated/introduced first. Ensure each package is consistent with the dependency matrix and the unified evidence logging conventions.<br><b>Resources needed:</b><br><ul><li>AUSAs (final packet reviewer)</li><li>ARGUS attribution and capture coordinator</li><li>Digital forensics lead</li><li>Evidence logging and timeline index manager</li><li>Legal tech/document production support</li></ul>",

      "id": "a5ebe75c-fcc5-4074-a79f-d11cefaf3a3f",
      "text": "Key provenance protocol and artifacts",
      "custom_tooltip": "<b>Key provenance protocol and artifacts</b><br>Define the technical/procedural key provenance protocol for ARGUS decryptability. Enumerate required artifact classes, where keys are expected to reside (e.g., KMS/HSM/enclaves/removable media/service accounts), and who has administrative/control authority for each step. Document the lawful access pathway per key action (order/authority/subpoena/compel step) and identify owners responsible for each provenance claim. Deliver a complete key-location inventory and authority matrix mapped to must-prove artifact classes.<br><b>Resources needed:</b><br><ul><li>Digital forensics lead</li><li>ARGUS evidence attribution coordinator</li><li>Federal evidence/admissibility counsel</li><li>Crypto/crypto-reversing consultant</li><li>Classification/protective-order liaison (if applicable)</li></ul>",

      "id": "61f04848-2015-43ce-8216-f190f48e7a16",
      "text": "Decryptability decision tree with thresholds",
      "custom_tooltip": "<b>Decryptability decision tree with thresholds</b><br>Create a court-defensible decryptability decision tree that specifies quantitative success thresholds per artifact class (e.g., &gt;=95% within 14 days) and clear contingency routes if decryptability is partial (e.g., fallback evidence classes and what narrative elements must be marked non-authoritative). Include failure-mode taxonomy (missing key, wrong key, corrupted container, partial indexes) and required remediation steps (reimage/recontact/compel where lawful). Produce a versioned, sign-off-ready decryptability gate specification aligned to execution timing and evidence admissibility constraints.<br><b>Resources needed:</b><br><ul><li>Digital forensics lead</li><li>RICO case theory and charging lead</li><li>Federal RICO/predicate strategy counsel</li><li>Evidence/admissibility counsel</li><li>Case operations lead</li></ul>",

      "id": "d1d522f6-d68c-448d-913c-e608d69c7de5",
      "text": "Lawful access workflow validation plan",
      "custom_tooltip": "<b>Lawful access workflow validation plan</b><br>Develop the lawful access workflow validation plan describing how each decryption or key-handling action will be enabled and logged for courtroom scrutiny. Specify documentation requirements for every step (authority records, requester identity, time windows, scope limitations, and audit trails). Include an explicit review lane for any step that intersects classified systems, protective orders, or restricted key material handling. Deliver a step-by-step workflow map plus a checklist that can be used pre-execution to confirm that every planned decryption action is supported by a valid court order/authority.<br><b>Resources needed:</b><br><ul><li>Federal evidence/admissibility counsel</li><li>ARGUS evidence attribution coordinator</li><li>Digital forensics lead</li><li>Protected-handling/classification liaison (if applicable)</li></ul>",

      "id": "3fe14f5f-805c-4831-955d-1e90fa00ad11",
      "text": "Decryptability harness and integrity gates",
      "custom_tooltip": "<b>Decryptability harness and integrity gates</b><br>Implement and validate a decryptability harness using representative synthetic artifact sets and representative container/log formats. Specify the simulation pipeline (Python cryptography/pytest), the expected decryptability rate measurement method, and the required integrity checks (primary/secondary hash verification pre/post imaging). Enforce deterministic reimage/quarantine logic when hashes or decryptability outcomes fail. Deliver a reproducible harness report with method reliability language suitable for Daubert-style internal review and a written mapping from harness outputs to evidence admissibility readiness.<br><b>Resources needed:</b><br><ul><li>Digital forensics lead</li><li>Forensic/crypto engineer</li><li>Digital evidence integrity assurance tooling support</li><li>Software/test engineer (optional)</li><li>Independent crypto/reversing consultant (second-method validation)</li></ul>",

      "text": "Court-ready decryptability plan deliverable",
      "custom_tooltip": "<b>Court-ready decryptability plan deliverable</b><br>Compile the final court-ready ARGUS Decryptability &amp; Key Provenance Plan. Ensure it enumerates key locations and legal pathways for 100% of must-prove artifact classes, states per-class quantified decryptability targets and timelines, and specifies the fallback evidence routing plan for decryptability below defined thresholds (e.g., &lt;85%). Include contingency activation criteria, named sign-off authorities (digital forensics lead and evidence/admissibility counsel), and an appendix of artifact-class definitions and failure-mode remedies. Perform a final internal legal/forensic sufficiency review to confirm no blocking must-fix items remain.<br><b>Resources needed:</b><br><ul><li>Digital forensics lead</li><li>Federal evidence/admissibility counsel</li><li>RICO case theory and charging lead</li><li>ARGUS evidence attribution coordinator</li><li>Independent crypto/reversing consultant (review/attestation)</li></ul>",

      "text": "Capture strategy workshop and evidence targets",
      "custom_tooltip": "<b>Capture strategy workshop and evidence targets</b><br>Run a structured workshop to define the ARGUS attribution artifacts that will be captured for each overt-act/predicate candidate, including required vs supportive vs reserve artifact classes. Produce a single evidence target list with scope, minimization rules, and explicit mapping to the desired enterprise control/continuity elements. Deliverable is a capture-coverage checklist owned by the attribution coordinator and reviewed by prosecutors and digital forensics.<br><b>Resources needed:</b><br><ul><li>ARGUS Evidence Attribution &amp; Capture Coordinator</li><li>Lead AUSA (RICO/predicate strategy)</li><li>Digital forensics lead</li><li>Evidence/admissibility counsel</li><li>Investigators (FBI/DEA and Hartford PD representatives)</li></ul>",

      "text": "Define ARGUS capture procedures and minimization",
      "custom_tooltip": "<b>Define ARGUS capture procedures and minimization</b><br>Translate attribution artifacts into operational procedures: specific operator logs, configuration/decision trails, coordination outputs, and any associated volatile data collection steps. Include tool-specific capture steps, handling of encrypted/locked artifacts, minimization/exclusion rules, and documentation requirements that support authentication (provenance, identity of source artifacts, and integrity checks). Deliver a procedure pack with role assignments and an on-site operator checklist.<br><b>Resources needed:</b><br><ul><li>Digital forensics lead</li><li>ARGUS Evidence Attribution &amp; Capture Coordinator</li><li>On-site evidence technicians</li><li>Warrant-scope attorney</li><li>Chain-of-custody documentation lead</li></ul>",

      "text": "Warrant scope mapping and scope drift control",
      "custom_tooltip": "<b>Warrant scope mapping and scope drift control</b><br>Create a warrant-scope-to-capture mapping that ties each must-prove artifact class to a particular facility target area/collection method, plus minimization steps. Add a controlled scope-drift mechanism (single change-control gate) that records any additions/edits, explains rationale, and triggers re-review for suppression/admissibility risk. Deliver a versioned mapping workbook and a final locked checklist for execution.<br><b>Resources needed:</b><br><ul><li>Warrant-scope attorney</li><li>ARGUS Evidence Attribution &amp; Capture Coordinator</li><li>Prosecutor review team</li><li>Cross-agency evidence logistics coordinator</li><li>Document control/versioning owner</li></ul>",

      "id": "2265b9e7-0b60-4d93-b163-4726381db844",
      "text": "Capture rehearsal and missing-data fallback",
      "custom_tooltip": "<b>Capture rehearsal and missing-data fallback</b><br>Conduct a tabletop and lab rehearsal using representative synthetic or sample ARGUS log/container formats to validate that each planned artifact is capture-able and attributable. Identify gaps (e.g., missing volatile logs, inconsistent schemas, encryption boundary failures) and formalize contingency/fallback collection and evidentiary routing paths. Deliver a rehearsed playbook that specifies what to do when a required artifact is missing or partially captured, including how that impacts predicate/continuity mapping.<br><b>Resources needed:</b><br><ul><li>Digital forensics lead</li><li>Independent crypto/reversing consultant (as needed)</li><li>Investigators (ARGUS/predicate incident owners)</li><li>RICO case theory lead</li><li>Evidence/admissibility counsel</li></ul>",

      "text": "Proof-gate readiness checklist for capture",
      "custom_tooltip": "<b>Proof-gate readiness checklist for capture</b><br>Define the pre-execution proof gates for the attribution/capture process: required artifact availability criteria, hash/integrity readiness preconditions, timestamp provenance readiness, and documentation completeness checks. Produce a sign-off checklist that must pass before execution proceeds, including owners and SLAs for any must-fix items. Deliver an execution go/no-go packet aligned to the unified evidence logging and event mapping schema.<br><b>Resources needed:</b><br><ul><li>Cross-agency timeline index manager</li><li>Chain-of-custody hashing workflow owner</li><li>Digital forensics lead</li><li>Lead AUSA</li><li>Evidence/admissibility counsel</li></ul>",

      "custom_tooltip": "<b>Define attribution evidence capture targets</b><br>Create a definitive list of ARGUS attribution artifacts to be captured for incident-level linkage, specifying for each artifact class: purpose (operator logs, configuration/decision trails, coordination outputs), required authentication elements (hash-verified, provenance/source validation), and whether it is must-prove, support, or reserve. Output a capture-coverage checklist that will drive warrant particularity mapping and execution-day collection steps.<br><b>Resources needed:</b><br><ul><li>ARGUS Evidence Attribution &amp; Capture Coordinator</li><li>Digital forensics lead</li><li>RICO case theory/charging lead</li><li>Prosecutor (RICO/predicate strategy)</li><li>Evidence handling documentation specialist</li></ul>",

      "text": "Conduct capture-proof schema and rehearsal",
      "custom_tooltip": "<b>Conduct capture-proof schema and rehearsal</b><br>Develop a capture-to-proof mapping template that forces every collected artifact to be classified into the event mapping schema and to reference its overt-act/predicate contribution and corroborator category. Run a tabletop rehearsal using representative synthetic or historical log sets to detect missing-data failure modes (encryption gaps, schema drift, volatile-log loss) and document re-scoping recommendations before execution.<br><b>Resources needed:</b><br><ul><li>Digital forensics lead</li><li>Schema/timeline integration manager</li><li>Prosecutor (predicate mapping)</li><li>Forensic methodology expert</li><li>Case operations coordinator</li></ul>",

      "text": "Finalize attribution capture decision controls",
      "custom_tooltip": "<b>Finalize attribution capture decision controls</b><br>Lock execution controls that govern how teams decide to continue, reimage, quarantine, or switch to fallback evidence classes. Include change-control rules for artifact reclassification, versioned schema alignment steps, and sign-off checkpoints linking the capture strategy to ARGUS integrity gates (hash/timestamp) and predicate/continuity readiness.<br><b>Resources needed:</b><br><ul><li>ARGUS Evidence Attribution &amp; Capture Coordinator</li><li>Digital forensics lead</li><li>Admissibility/Daubert counsel</li><li>Cross-agency proof-gate chair</li><li>Evidence governance/quality assurance lead</li></ul>",

      "custom_tooltip": "<b>Validate schema via event mapping rehearsal</b><br>Run a pilot mapping rehearsal using 5\u201310 representative incidents to validate the schema\u2019s completeness and interpretability. Implement change-control rules and ensure each mapped incident packet references unified evidence IDs, contains corroborator-category tags, and satisfies authentication/timestamp requirements. Use schema validation tooling to catch missing fields and misclassifications before broader rollout.\nDeliverables: rehearsal report with schema gap list, corrected schema version, and sign-off checklist results.<br><b>Resources needed:</b><br><ul><li>ARGUS capture coordinator</li><li>Digital forensics lead</li><li>Timeline index manager</li><li>Data engineer (schema validation)</li><li>AUSAs for legal sufficiency review</li></ul>",

      "custom_tooltip": "<b>Produce Daubert-ready mapping and templates</b><br>Finalize courtroom-ready templates for incident-level ARGUS-to-overt-act mapping packages. Include standardized exhibit dependency language, authentication/provenance requirements per artifact class, and a repeatable procedure for generating the mapping packets from unified evidence logs/timeline index. Ensure the templates include explicit boundaries on expert testimony conclusions.\nDeliverables: final mapping package templates (with versioning), exhibit dependency statements, and an internal Daubert-style compliance checklist.<br><b>Resources needed:</b><br><ul><li>Evidence/admissibility counsel</li><li>Digital forensics and AI evidence expert</li><li>RICO charging lead</li><li>AUSA drafting team</li><li>Document/template specialist</li></ul>",

      "text": "Create chain-of-custody hashing SOP",
      "custom_tooltip": "<b>Create chain-of-custody hashing SOP</b><br>Define court-defensible hashing and evidence-integrity procedures for all ARGUS artifact sets, including approved algorithms/parameters, evidence ID conventions, required documentation fields, tool versioning rules, and dual-verification workflow. Produce a single SOP that supports imaging, transfer, verification, quarantine, and reimage decisions with named owners and sign-off points.<br><b>Resources needed:</b><br><ul><li>Digital forensics lead</li><li>Evidence integrity assurance coordinator</li><li>Forensic lab technician</li><li>Prosecutor/evidence counsel reviewer</li></ul>",

      "text": "Define timestamp integrity rules",
      "custom_tooltip": "<b>Define timestamp integrity rules</b><br>Establish court-defensible timestamp integrity standards, including clock-domain definitions, timezone normalization, allowable skew/error bounds, reconciliation logic, and deterministic timestamp vocabulary. Produce a single rules document that specifies what counts as authoritative time sources and how discrepancies are classified (minor vs disqualifying) for downstream event mapping, overt-act anchoring, and expert testimony boundaries.<br><b>Resources needed:</b><br><ul><li>Cross-agency timeline index manager</li><li>Digital forensics lead</li><li>AI evidence attribution specialist</li><li>Evidence/admissibility counsel</li><li>Operations coordinator (FBI/DEA/Hartford PD)</li></ul>",

      "custom_tooltip": "<b>Build reconciliation and discrepancy handling</b><br>Implement the procedures and decision tree for reconciling multiple timestamp sources across ARGUS logs, seized device/tool logs, interview recordings, and agency evidence records. Define discrepancy handling workflows (recording, escalation, remediation requirements), including when to trigger re-imaging/re-hashing vs when to apply controlled reconciliation. Deliver an auditable discrepancy protocol tied to evidence identifiers and master timeline entries.<br><b>Resources needed:</b><br><ul><li>Cross-agency timeline index manager</li><li>Digital forensics lead</li><li>Forensic examiner</li><li>Case operations coordinator</li><li>Paralegal/documentation support</li></ul>",

      "custom_tooltip": "<b>Define contamination-minimized entry checklist</b><br>Create a stepwise, admissibility-first entry/search checklist for the undisclosed facility that pairs each target location with minimization constraints, safety pre-reads, and documentation requirements. Include evidence-handling controls (team separation, tool separation), volatile-log capture ordering, sealing/labeling steps, and explicit stop/containment triggers. Deliverable: a runbook-style checklist usable by the on-site lead and reviewers during execution.<br><b>Resources needed:</b><br><ul><li>ARGUS Evidence Attribution &amp; Capture Coordinator</li><li>Digital forensics lead</li><li>Warrant-scope attorney</li><li>EHS/hazmat officer</li><li>Asset seizure operations lead</li><li>Evidence handling supervisor</li></ul>",

      "text": "Pre-plan evidentiary priority and sequencing",
      "custom_tooltip": "<b>Pre-plan evidentiary priority and sequencing</b><br>Establish a fixed on-site evidence priority order that ensures ARGUS control points/data stores are imaged/captured before broader corporate or propulsion-adjacent items, while accounting for safety quarantines and access restrictions. Define decision triggers for staging (when to switch from volatile to imaging, when to move to physical seizures), plus contingency paths if a target is inaccessible or wiped/locked. Deliverable: a sequencing matrix with timeboxes and named decision owners.<br><b>Resources needed:</b><br><ul><li>Asset Seizure Governance &amp; Custody Transition Lead</li><li>Digital forensics lead</li><li>Cross-agency logistics coordinator</li><li>EHS/hazmat officer</li><li>On-site operations lead</li></ul>",

      "id": "b4af3799-baef-443e-864b-fb18687e277a",
      "text": "Create quarantine and reimage trigger rules",
      "custom_tooltip": "<b>Create quarantine and reimage trigger rules</b><br>Define deterministic quarantine and reimage decision rules for imaging integrity deviations during on-site capture (e.g., hash mismatch, tool error states, incomplete capture, inability to obtain required volatile logs, or chain-of-custody documentation gaps). Specify who authorizes quarantine, what documentation must be generated, and how to resume without contaminating or overwriting evidentiary sets. Deliverable: a one-page trigger sheet plus SOP paragraphs for the full runbook.<br><b>Resources needed:</b><br><ul><li>Digital forensics lead</li><li>Chain-of-custody hashing workflow owner</li><li>Prosecutor evidence lead</li><li>Evidence custody officer</li></ul>",

      "text": "Execute on-site capture rehearsal and approvals",
      "custom_tooltip": "<b>Execute on-site capture rehearsal and approvals</b><br>Run a tabletop rehearsal and a lab/desk pre-flight with the execution team to validate the entry checklist, sequencing matrix, and quarantine/reimage workflow against representative artifacts. Confirm readiness of validated forensic tooling, spare media, hash verification steps, and required logs at capture time. Obtain final sign-off from warrant-scope counsel and the forensics integrity owner before operational use. Deliverable: rehearsal report with identified gaps closed or accepted via change control.<br><b>Resources needed:</b><br><ul><li>ARGUS Evidence Attribution &amp; Capture Coordinator</li><li>Digital forensics lead</li><li>Warrant-scope attorney</li><li>EHS/hazmat officer</li><li>On-site operations lead</li><li>Evidence custody/logging lead</li></ul>",

      "custom_tooltip": "<b>Set evidence priority sequencing rules</b><br>Finalize a timeboxed priority playbook that sequences seizures to minimize admissibility and chain-of-custody risk (ARGUS control points/data stores first, then corporate systems, then propulsion-linked items). Include explicit decision triggers for when operational findings (hazmat/quarantine/access limits) override or pause the sequence, and specify required documentation for any deviation.<br><b>Resources needed:</b><br><ul><li>Asset seizure governance lead</li><li>EHS/hazmat liaison</li><li>Forensics imaging lead</li><li>Seizure operations lead</li><li>Evidence documentation/custody specialist</li></ul>",

      "custom_tooltip": "<b>Prepare on-site imaging integrity gates</b><br>Define the practical on-site workflow for capturing volatile evidence first, then running staged imaging integrity checks. Specify required tool readiness (validated forensic imaging software, spare storage media, power/network contingencies), the exact sequencing of capture steps, and the pre-defined decision points that determine when quarantine/reimage triggers activate. Produce a day-of checklist that ties every gate to evidence IDs and documentation requirements.<br><b>Resources needed:</b><br><ul><li>Digital forensics lead</li><li>Forensic imaging technicians</li><li>Evidence integrity/documentation specialist</li><li>Network/power liaison</li><li>Digital media inventory/logging support</li></ul>",

      "text": "Capture volatile logs prior to imaging",
      "custom_tooltip": "<b>Capture volatile logs prior to imaging</b><br>Implement a step that secures volatile ARGUS-adjacent logs and time-critical artifacts before full imaging, including capturing operator-access/session data, system event fragments, and any live controller outputs that may be lost with shutdown/restart. Define how these volatile artifacts are labeled, hashed, and documented immediately upon capture, and ensure they are included in the same evidence ID namespace as subsequent full-disk or logical images.<br><b>Resources needed:</b><br><ul><li>Forensics lead</li><li>Log-capture operator</li><li>Digital forensic analyst</li><li>Chain-of-custody recorder</li></ul>",

      "id": "e9e45999-3534-446a-95f1-0f66fbc267d4",
      "text": "Run capture hash then independent verify",
      "custom_tooltip": "<b>Run capture hash then independent verify</b><br>Establish dual-hash verification for every ARGUS-relevant artifact set: compute a primary hash at capture (or immediately upon first acquisition) and a secondary independent hash after imaging completes (using a separate run/process). Lock in hashing algorithms and parameters for court defensibility, document tool versions, and require explicit \u201cpass/fail\u201d outcomes recorded with evidence IDs.<br><b>Resources needed:</b><br><ul><li>Forensic hashing specialist</li><li>Digital forensics lead</li><li>Tool/versions documentation support</li><li>Evidence integrity verifier</li></ul>",

      "id": "1cae30b7-be32-45d1-8c95-af4a311bd6b0",
      "text": "Quarantine and reimage on mismatches",
      "custom_tooltip": "<b>Quarantine and reimage on mismatches</b><br>Create and execute a deterministic mismatch protocol for chain-of-custody and imaging integrity deviations. Define quarantine steps, evidence labeling quarantine status, access restrictions during quarantine, and the reimage decision rule (what mismatches trigger reimage, what triggers expert review, and what can be resolved via supplemental capture). Ensure every mismatch event produces an auditable remediation log that can support suppression-admissibility challenges.<br><b>Resources needed:</b><br><ul><li>Evidence handling supervisor</li><li>Forensics integrity analyst</li><li>Quarantine/custody logistics coordinator</li><li>Legal/forensics liaison for rapid consult</li></ul>",

      "id": "bde0894b-f521-4129-8c34-048e365d0c56",
      "text": "Document integrity outcomes for court",
      "custom_tooltip": "<b>Document integrity outcomes for court</b><br>Compile the execution-time integrity record set required for courtroom authentication: imaging reports, tool logs, hash verification outputs, hash algorithm/parameter statements, discrepancy logs, and final disposition for each evidence artifact set. Ensure documentation uses the unified evidence ID and timestamp conventions, and run a final internal completeness check before packaging evidence for transport or lab intake.<br><b>Resources needed:</b><br><ul><li>Chain-of-custody documentation specialist</li><li>Forensics reporting officer</li><li>Timeline/index manager (for ID alignment)</li><li>Quality assurance reviewer</li></ul>",

      "custom_tooltip": "<b>Custody governance playbook and authority</b><br>Define decision authority and rules for who can approve seizure scope, holds, escrow/targeted retention, and custody transitions across three asset categories (ARGUS control points/data stores, Goliath Industries corporate systems, propulsion-linked property). Include escalation ladder, evidence handling boundaries, real-time change control rules to prevent ad-hoc scope expansion, and litigation-ready justification outline for business-disruption disputes.<br><b>Resources needed:</b><br><ul><li>Asset Seizure Governance &amp; Custody Transition Lead</li><li>Federal RICO and predicate strategy counsel</li><li>Asset seizure operations counsel</li><li>Digital forensics evidence integrity lead</li><li>Inter-agency evidence logistics coordinator</li></ul>",

      "text": "Evidentiary priority seizure sequencing",
      "custom_tooltip": "<b>Evidentiary priority seizure sequencing</b><br>Pre-approve and document a timeboxed seizure priority order so ARGUS control points/data stores are captured first, followed by broader corporate property, then propulsion-linked items. Validate sequencing against operational constraints (safety quarantines, access limitations, volatile evidence preservation) and define decision triggers for any deviations, including how deviations are documented for later suppression/admissibility defense.<br><b>Resources needed:</b><br><ul><li>Asset Seizure Governance &amp; Custody Transition Lead</li><li>Seizure operations lead(s)</li><li>EHS/hazmat lead</li><li>Digital forensics evidence integrity lead</li><li>U.S. Marshals / transport-custody support representative</li></ul>",

      "custom_tooltip": "<b>Custody hop logs and sealing templates</b><br>Create execution-ready custody transition templates: sealing/labeling requirements, evidence IDs, transport logs, custody hop fields, and audit logging expectations. Run an integration rehearsal with forensics, seizure ops, and transport/custody stakeholders to ensure required fields are complete and consistent with the unified evidence ID/timestamp conventions so every transfer has immediate documentation and accountability sign-off.<br><b>Resources needed:</b><br><ul><li>Asset Seizure Governance &amp; Custody Transition Lead</li><li>Inter-agency timeline index manager</li><li>Digital forensics evidence integrity lead</li><li>Evidence logistics/transport representative</li><li>Court exhibits/custody documentation coordinator</li></ul>",

      "custom_tooltip": "<b>Escrow and hold criteria for sensitive</b><br>Define execution-ready escrow/hold decision criteria for sensitive technical components, including triggers, documentation sets, and named approval authority. Pre-identify vetted escrow/containment options (partners/labs/storage) with standby availability and establish a fast-path approval SLA (24\u201348 hours) so sensitive items do not stall discovery, Daubert preparation, or substitution/redaction scheduling.<br><b>Resources needed:</b><br><ul><li>Asset seizure operations counsel</li><li>Forfeiture counsel (if required for interested-party workflow)</li><li>Digital forensics evidence integrity lead</li><li>Classification/protective-order liaison</li><li>Vetted lab/escrow partner point of contact</li></ul>",

      "text": "Set appointment and service sequencing matrix",
      "custom_tooltip": "<b>Set appointment and service sequencing matrix</b><br>Define the service/jurisdiction sequencing plan to prevent suppressible procedural defects. Build a matrix mapping each evidence type and investigative action (interviews, record collection, digital extractions, witness handling) to responsible agency, legal authority basis, custody/record ownership, and the correct service-of-process timing. Include contingency branches for late-breaking suppression/admissibility disputes (e.g., if a domain evidence bundle is challenged). Deliverables: decision matrix, authority/ownership chart, and two validated scenario walkthroughs.<br><b>Resources needed:</b><br><ul><li>Prosecution lead (AUSA)</li><li>FBI/DEA operations coordinator</li><li>Hartford PD liaison</li><li>Litigation/paralegal support</li><li>Evidence/record management lead</li></ul>",

      "id": "a00fd7f1-4a04-4b68-9c9b-f8a04b300adb",
      "text": "Create cross-agency proof gate checklist",
      "custom_tooltip": "<b>Create cross-agency proof gate checklist</b><br>Develop and operationalize the proof gate checklist(s) that determine when evidence bundles are sufficient to proceed with predicate mapping and narrative lock-in. Include acceptance criteria for ARGUS integrity, predicate mapping completeness, and identity stabilization gate status. Define sign-off roles and a remediation path for gate failures (e.g., reimage/rehash for integrity issues; supplementing corroboration for mapping gaps). Deliverables: gate checklist, sign-off roster/RACI, and remediation SLA rules.<br><b>Resources needed:</b><br><ul><li>Digital forensics evidence integrity lead</li><li>RICO case theory and charging lead</li><li>Identity linkage lead (Platypus Man)</li><li>Discovery/admissibility counsel</li><li>Inter-agency case operations lead</li></ul>",

      "custom_tooltip": "<b>Run proof-gate rehearsal and reconcile</b><br>Execute a rehearsal using representative evidence packets from FBI/DEA and Hartford PD to validate the unified logging and proof gate workflow end-to-end. Inject realistic issues (timestamp skews, missing metadata, inconsistent evidence_ids, partial corroboration) and confirm the reconciliation and remediation logic produces an audit-ready outcome. Deliverables: rehearsal report, discrepancy log with resolution outcomes, and final gate readiness confirmation for rollout.<br><b>Resources needed:</b><br><ul><li>Cross-agency evidence owners</li><li>Timeline index manager</li><li>Forensic lab/forensics QA lead</li><li>Prosecution legal reviewer</li><li>Training facilitator</li></ul>",

      "custom_tooltip": "<b>Standardize evidence tracking workflow training</b><br>Train investigative and evidence-handling staff on the unified evidence logging and proof gate process so later inputs remain compliant and consistent. Include a quick-reference guide for investigators, mandatory fields, how to tag corroborator categories, and how to submit discrepancy flags. Deliverables: training materials, attendance/compliance checklist, and a post-training audit plan.<br><b>Resources needed:</b><br><ul><li>Inter-agency operations coordinator</li><li>Evidence logistics coordinator</li><li>Prosecution training lead</li><li>Digital forensics documentation support</li><li>Discovery counsel</li></ul>",

      "custom_tooltip": "<b>Vehicle evidence bucket classification</b><br>Create an admissibility-first classification for all propulsion-linked vehicle materials. Define direct, redacted, substituted, and stipulation-ready buckets, along with the courtroom purpose and what each bucket can prove for specific predicate and continuity needs. Freeze first-pass buckets within a fixed window, route any newly discovered items into reserve, and capture the rationale for every bucket assignment for later motion practice.<br><b>Resources needed:</b><br><ul><li>Classified/R&amp;D evidence liaison</li><li>Federal RICO and predicate strategy counsel</li><li>Evidence attorney (admissibility focus)</li><li>Forensic/analyst lead for vehicle-related artifacts</li><li>Case theory lead</li><li>OPSEC risk controller</li></ul>",

      "text": "Protective order and cleared roster plan",
      "custom_tooltip": "<b>Protective order and cleared roster plan</b><br>Draft the protective-order intake requirements needed to support introducing vehicle-related evidence. Produce a cleared witness/subject-matter expert roster with clearance lead-time estimates, identify what topics require clearance, and define contingency paths when clearance is delayed (e.g., substitutions, stipulations, or anchoring via non-sensitive corroborators). Deliver a motion-window schedule that links protective-order deliverables to expected hearing dates.<br><b>Resources needed:</b><br><ul><li>Classified evidence/protective-order attorney</li><li>Witness reliability/planning lead</li><li>Security clearance coordinator</li><li>RICO lead counsel</li><li>Prosecution case manager</li><li>EHS/classification liaison</li></ul>",

      "text": "Redacted summaries and substitution packages",
      "custom_tooltip": "<b>Redacted summaries and substitution packages</b><br>Produce courtroom-ready redacted technical summaries and substitution packages that preserve overt-act and enterprise-nexus linkages without disclosing sensitive propulsion/vehicle details. For each vehicle exhibit, create: (a) an approved redaction approach, (b) an anchor mapping to observable instrumentality/control facts and chain-of-custody integrity, and (c) substitution/stipulation language where direct presentation is excluded. Run OPSEC compliance review and evidentiary sufficiency review cycles before locking drafts for court deadlines.<br><b>Resources needed:</b><br><ul><li>Classified evidence/protective-order liaison</li><li>Evidence attorney (redaction/substitution)</li><li>Technical analyst/engineer</li><li>Digital forensics lead (for chain-of-custody anchoring)</li><li>RICO predicate mapping lead</li><li>OPSEC review officer</li></ul>",

      "text": "Draft unified interview-and-logging playbook",
      "custom_tooltip": "<b>Draft unified interview-and-logging playbook</b><br>Create a single FBI/DEA\u2013Hartford PD interview and evidence-logging playbook specifying required capture fields, timestamp practices, evidence_id linking, corroborator category tags, and documentation rules. Include privilege/discovery-sensitive sections and define mandatory labeling for ARGUS-linked vs non-ARGUS predicate observations so all reporting stays schema-compatible with the unified timeline index and proof-gate workflow.<br><b>Resources needed:</b><br><ul><li>Case operations coordinator</li><li>Prosecution/discovery counsel</li><li>Investigator leads (FBI/DEA)</li><li>Hartford PD lead investigator</li><li>Evidence logging/timeline index owner</li><li>Paralegal/documentation specialist</li></ul>",

      "text": "Pilot playbook with cross-agency interviews",
      "custom_tooltip": "<b>Pilot playbook with cross-agency interviews</b><br>Run a pilot with a small set of representative interviews from FBI/DEA and Hartford PD using the drafted playbook. Capture outputs in the unified evidence-logging format, then perform a gap analysis: missing fields, timestamp normalization failures, inconsistent evidence_id usage, and corroborator-tag mismatches. Convert findings into prioritized fixes and produce a revised version ready for rollout.<br><b>Resources needed:</b><br><ul><li>Pilot interview team (FBI/DEA)</li><li>Pilot interview team (Hartford PD)</li><li>Digital evidence logging coordinator</li><li>Legal review liaison</li><li>Template/data QA reviewer</li></ul>",

    {

      "text": "Implement legal fast-review for sensitive entries",
      "custom_tooltip": "<b>Implement legal fast-review for sensitive entries</b><br>Set up an expedited review lane for playbook deviations and for any proposed logging language that may implicate privilege, work product, protected-witness logistics, or classified/vehicle content. Define what can be logged immediately versus what requires redaction or delayed entry. Ensure reviewed outputs remain consistent with the unified timeline schema and do not create discoverable contradictions.<br><b>Resources needed:</b><br><ul><li>Brady/discovery counsel</li><li>Protective order attorney liaison</li><li>Case operations coordinator</li><li>Evidence logging owner</li><li>Redaction/privilege log specialist</li></ul>",

      "custom_tooltip": "<b>Train teams and run compliance audit</b><br>Deliver training refreshers for all interviewers and documentation staff covering the unified playbook, evidence_id/evidence field requirements, timestamp vocabulary, and corroborator-category tagging. After training, conduct a compliance audit on subsequent interviews: verify schema completeness, deterministic timestamp reconciliation handling, and evidence-to-timeline traceability. Publish pass/fail remediation actions and lock the rollout checklist.<br><b>Resources needed:</b><br><ul><li>Training facilitator</li><li>Investigator leads (FBI/DEA and Hartford PD)</li><li>Timeline index manager</li><li>QA/audit reviewer</li><li>Case operations coordinator</li></ul>",

    {
      "id": "ca9f0c2c-4991-4751-bb74-b186f32e2132",
      "text": "Define Platypus linkage corroboration gates",
      "custom_tooltip": "<b>Define Platypus linkage corroboration gates</b><br>Create a gate-based identity linkage plan that requires corroboration-first validation before any Platypus Man \u2194 Zane Goliath claim is treated as final. Specify gate types (e.g., ARGUS-to-control, patrol-level observations, documentary ties), minimum corroborator count, independence requirements, and the exact evidence artifacts that satisfy each gate. Include explicit entry/exit criteria per gate and map each gate to master-timeline readiness status.<br><b>Resources needed:</b><br><ul><li>RICO case theory and charging lead</li><li>Cross-agency timeline index manager</li><li>Digital forensics lead</li><li>Hartford PD liaison</li><li>Discovery/Brady counsel</li></ul>",

      "id": "e4d6e8a9-4066-4841-98d6-dbe94ffca4a8",
      "text": "Map identity claims to evidence categories",
      "custom_tooltip": "<b>Map identity claims to evidence categories</b><br>Build a structured mapping of every identity claim element (who/what/when/where) to the allowable evidence categories that can corroborate it. For each claim element, define required vs supportive vs reserve evidence classes, specify which parts must be timestamp-anchored, and document the allowable expert conclusions (what can and cannot be inferred). Produce an identity mapping worksheet that references the unified evidence IDs and timeline index entries for traceability.<br><b>Resources needed:</b><br><ul><li>Identity linkage lead (Platypus contingency planner)</li><li>Digital forensics lead</li><li>Cross-agency evidence logging lead</li><li>AUSAs (RICO theory)</li><li>Evidence/admissibility counsel</li></ul>",

    {
      "id": "2d0ba385-e384-43a4-bb64-bfdd4ee532e6",
      "text": "Run cross-agency identity ledger alignment",
      "custom_tooltip": "<b>Run cross-agency identity ledger alignment</b><br>Implement the identity consistency ledger updates required to keep linkage claims synchronized with the unified master timeline. Record: what was told, who provided it, when it was provided, which evidence IDs/timestamps support it, and whether it satisfies the relevant corroboration gate. Add a discrepancy workflow that blocks narrative lock-in until each discrepancy is either resolved with additional corroboration or formally routed to a fallback route with documented rationale.<br><b>Resources needed:</b><br><ul><li>Identity consistency ledger owner</li><li>Cross-agency timeline index manager</li><li>FBI/DEA lead investigators</li><li>Hartford PD lead</li><li>Discovery/Brady counsel</li></ul>",

    {
      "id": "c8f8c8e3-d117-4ebc-8056-89ef44f85f60",
      "text": "Validate linkage under re-check triggers",
      "custom_tooltip": "<b>Validate linkage under re-check triggers</b><br>Create and execute a revalidation protocol that re-runs corroboration gates whenever new discovery arrives or any proof element changes (e.g., hash/timestamp reconciliation, witness statement correction, suppressed/inadmissible artifact classification). Define the triggers, revalidation scope, expected turnaround SLAs, and required documentation updates to the ledger. Conduct at least one proof-of-readiness rehearsal with simulated discrepancies to ensure the gate logic and ledger workflow remain stable.<br><b>Resources needed:</b><br><ul><li>Witness reliability and protective custody planner</li><li>Digital forensics lead</li><li>RICO case theory and charging lead</li><li>Discovery/Brady counsel</li><li>Cross-agency timeline index manager</li></ul>",

      "text": "Define identity ledger schema and fields",
      "custom_tooltip": "<b>Define identity ledger schema and fields</b><br>Specify the Identity Consistency Ledger schema including required keys (master timeline reference, standardized evidence IDs, claim type, source agency, witness/patrol category, and resolution status). Define allowable values for linkage assertions (e.g., preliminary vs corroborated vs finalized) and create versioning rules so the ledger can be updated without breaking traceability.<br><b>Resources needed:</b><br><ul><li>Identity linkage lead</li><li>Cross-agency timeline index manager</li><li>Discovery/Brady counsel</li><li>RICO case theory lead</li><li>Representative investigator(s) from FBI/DEA and Hartford PD</li></ul>",

      "text": "Establish evidence-to-claim mapping rules",
      "custom_tooltip": "<b>Establish evidence-to-claim mapping rules</b><br>Create operational rules for how each identity claim (Platypus Man \u2194 Zane Goliath) is linked to supporting evidence categories and to specific master-timeline entries. Define the minimum corroboration gates (at least two independent evidence categories), how to handle conflicts (discrepancy vs uncertainty), and what triggers revalidation and narrative re-lock.<br><b>Resources needed:</b><br><ul><li>Identity linkage lead</li><li>RICO case theory lead</li><li>Cross-agency proof-gate coordinator</li><li>Digital forensics lead (for evidence ID/hash expectations)</li><li>Prosecutor reviewing officer</li></ul>",

      "id": "762d5c27-d938-48d2-bdc9-92a0bac9bedd",
      "text": "Implement discrepancy and resolution workflow",
      "custom_tooltip": "<b>Implement discrepancy and resolution workflow</b><br>Define a discrepancy workflow that records what is inconsistent (timestamp, evidence ID, witness account), assigns an evidence owner, sets a remediation deadline, and blocks narrative finalization until resolution. Include an audit trail for changes (before/after values), plus escalation paths if resolution fails or evidence becomes suppressed/inadmissible.<br><b>Resources needed:</b><br><ul><li>Identity ledger owner</li><li>Evidence logging/timeline manager</li><li>Discovery/Brady counsel</li><li>Agency evidence custodians</li><li>Project manager (workflow governance)</li></ul>",

    {
      "id": "74112212-0c83-4133-8696-69e15fdd5cdc",
      "text": "Run integration rehearsal with sample cases",
      "custom_tooltip": "<b>Run integration rehearsal with sample cases</b><br>Perform a controlled integration rehearsal by populating the ledger with 3\u20135 representative identity linkage scenarios using synthetic or previously captured real excerpts. Validate that every ledger row maps deterministically to master timeline entries and unified evidence IDs, passes schema validation, and correctly enforces gate rules (including conflict handling and blocked-finalization behavior).<br><b>Resources needed:</b><br><ul><li>Identity linkage lead</li><li>Cross-agency timeline index manager</li><li>Prosecutor and legal sufficiency reviewer</li><li>Forensics liaison</li><li>Investigators to supply sample accounts</li></ul>",

      "id": "1893d545-625a-431c-b95d-aee9f20551be",
      "text": "Publish ledger governance and usage SOP",
      "custom_tooltip": "<b>Publish ledger governance and usage SOP</b><br>Produce the Identity Consistency Ledger governance SOP: who can add/edit entries, approval/sign-off roles, update cadence, retention/discovery documentation expectations, and change-control/version policy aligned with proof gates. Provide a short training package so FBI/DEA and Hartford PD teams can apply the rules consistently.<br><b>Resources needed:</b><br><ul><li>Identity linkage lead</li><li>Cross-agency operations coordinator</li><li>Discovery/Brady counsel</li><li>Project management/admin support</li><li>Training coordinator or case squad lead</li></ul>",

    {
      "id": "b678c454-2aff-47f9-aecf-ac980a5e2b73",
      "text": "Corroboration-first Platypus linkage workflow",
      "custom_tooltip": "<b>Corroboration-first Platypus linkage workflow</b><br>Define stage-gated identity linkage steps that require independent corroboration before any Platypus Man \u2194 Zane Goliath narrative claim is treated as final. Specify the minimum corroborator categories, the evidence categories each gate may draw from, entry/exit criteria per gate, and the remediation path when a gate fails (e.g., re-check timeline alignment, request additional corroborators, or route to fallback identity mapping). Produce a gate checklist that ties directly to evidence IDs and the unified master timeline so linkage claims remain audit-ready for discovery and suppression/admissibility review.<br><b>Resources needed:</b><br><ul><li>RICO case theory and charging lead</li><li>Identity linkage lead (Platypus contingency planner)</li><li>Cross-agency timeline index manager</li><li>FBI/DEA investigators and Hartford PD counterparts</li><li>Evidence/admissibility counsel</li></ul>",

    {
      "id": "aab30d84-b15e-4a6b-8653-2f99c3db2f2f",
      "text": "Identity consistency ledger schema and controls",
      "custom_tooltip": "<b>Identity consistency ledger schema and controls</b><br>Create the identity consistency ledger that records what was claimed, what evidence supports it, who provided it, when it was provided, and how it aligns with the unified evidence timeline index. Define ledger fields, evidence-id references, discrepancy logging rules (including severity/impact flags), resolution ownership, and change-control versioning. Implement blocking rules for narrative lock-in (e.g., no final linkage narrative language when discrepancies remain unresolved) and schedule periodic ledger integrity audits with cross-agency representatives.<br><b>Resources needed:</b><br><ul><li>Cross-agency timeline index manager</li><li>Brady/discovery counsel</li><li>RICO case theory and charging lead</li><li>Evidence logging/operations coordinator</li><li>Investigative leads from FBI/DEA and Hartford PD</li></ul>",

    {
      "id": "a8c37922-df93-415f-a9b3-4c7b6750111e",
      "text": "Witness selection and corroboration readiness gates",
      "custom_tooltip": "<b>Witness selection and corroboration readiness gates</b><br>Select witnesses using risk-tiering and corroboration-first criteria tied to predicate/continuity elements and identity linkage needs. For each witness candidate, document the corroborator category they contribute (at least two independent categories required), expected linkage strength, anticipated availability constraints, and readiness status. Include a short list of alternates and an evidence-dependency map so witness swaps do not break the identity workflow. Produce a pre-interview checklist that validates ARGUS integrity and master-timeline alignment before witness testimony is used to finalize identity linkage.<br><b>Resources needed:</b><br><ul><li>Witness reliability and protective custody planner</li><li>RICO case theory and charging lead</li><li>Discovery/Brady counsel</li><li>FBI/DEA and Hartford PD interview leads</li><li>Digital forensics lead (for ARGUS/timeline alignment inputs)</li></ul>",

    {
      "id": "0deb757e-5f43-4ee3-aa6e-4084cd3a474d",
      "text": "Protective custody testimony discipline for identity",
      "custom_tooltip": "<b>Protective custody testimony discipline for identity</b><br>Design witness preparation and protective custody routines that preserve identity consistency while compartmentalizing sensitive logistics. Define access controls and audit-able need-to-know boundaries for identity-relevant discussions, and integrate testimony readiness checkpoints with the identity ledger (e.g., when a witness statement changes, require ledger update and discrepancy triage). Implement drift/recantation early-warning response triggers that force revalidation of identity and timeline alignment before testimony is treated as final.<br><b>Resources needed:</b><br><ul><li>Witness protection / protective custody planning lead</li><li>Testimony readiness log template owner</li><li>Brady/discovery counsel</li><li>Protective custody operations support (as applicable)</li><li>Cross-agency timeline index manager</li></ul>",

      "id": "84807c7b-a0be-4342-9454-80b31ac9c9f4",
      "text": "Identity consistency ledger schema",
      "custom_tooltip": "<b>Identity consistency ledger schema</b><br>Design and implement a single identity consistency ledger tied to the unified evidence timeline index. Define ledger fields (claim, evidence IDs, witnesses/corroborators, clock domain/timestamp anchors, who was told what and when, resolution status, and discrepancy notes). Establish discrepancy handling rules (record, assign owner, set resolution deadline, and block narrative finalization until resolved) and run an integrity audit against sample incidents to ensure deterministic traceability across agencies.<br><b>Resources needed:</b><br><ul><li>Timeline index manager</li><li>Case operations coordinator</li><li>Digital evidence/forensics liaison</li><li>Discovery/Brady counsel</li><li>AUSAs responsible for narrative lock-in</li></ul>",
      "start_date": "2027-03-01",

      "progress": 0,

    {
      "id": "23cc4481-9c1e-423b-957f-43079f3d6097",
      "text": "Corroboration-first evidence mapping",
      "custom_tooltip": "<b>Corroboration-first evidence mapping</b><br>Select the identity-critical corroborators and map each to the relevant predicate/continuity element support, while keeping linkage claims within allowed evidentiary boundaries. Build a dependency mapping for what breaks if a corroborator category is suppressed or excluded, and define fallback corroborator categories and routing rules. Deliver incident-to-identity mapping packages with per-incident corroborator categories and explicit linkage confidence levels.<br><b>Resources needed:</b><br><ul><li>Identity linkage lead</li><li>RICO predicates/enterprise theory owner</li><li>Investigative analysts</li><li>Digital forensics liaison</li><li>Evidence/admissibility counsel</li></ul>",

    {
      "id": "3bba148a-8a77-4d30-9a6d-2b34bb95052e",
      "text": "Witness selection and reliability alignment",
      "custom_tooltip": "<b>Witness selection and reliability alignment</b><br>Create a witness tiering and selection process tied directly to identity linkage requirements and corroboration-first gates. Identify primary and alternate witnesses, define expected testimony topics that support identity without overreaching, and align protective custody/testimony readiness constraints to the linkage schedule. Produce a witness list with risk tier, corroborator category, and readiness gate status, plus a swap protocol for timely replacement.<br><b>Resources needed:</b><br><ul><li>Witness reliability and protective custody planner</li><li>Discovery/Brady counsel</li><li>RICO case theory lead</li><li>Witness security operations lead</li><li>AUSAs for testimony strategy</li></ul>",

    {
      "id": "92ccbd0e-b271-459e-b143-6e622f684c9b",
      "text": "Recantation drift response revalidation",
      "custom_tooltip": "<b>Recantation drift response revalidation</b><br>Implement early-warning protocols for witness recantation or memory drift and define deterministic revalidation steps before any identity linkage is treated as final at later motion/hearing stages. Specify when to re-contact witnesses, what consistency checks to run (timeline alignment, identity claim anchors, inducement/expectation documentation discipline), and how to update the identity ledger while maintaining discovery/record completeness. Deliver a tabletop-validated response playbook with escalation authority.<br><b>Resources needed:</b><br><ul><li>Witness reliability manager</li><li>Brady/discovery counsel</li><li>Identity linkage lead</li><li>Protective custody logistics lead</li><li>Cross-agency timeline index manager</li></ul>",

    {
      "id": "72835094-246d-4550-97c4-d9ce3be3e699",
      "text": "Design testimony readiness templates",
      "custom_tooltip": "<b>Design testimony readiness templates</b><br>Create standardized testimony readiness log templates for all protected and non-protected witnesses. Include mandatory fields that support admissibility, discovery, and credibility: interview dates, interviewers, topics covered, corroboration categories, identity-claim statements, prior statements/exposure, and inducement/expectation documentation ledger fields. Ensure the template is compatible with the unified evidence logging conventions and master timeline schema so every claim can be traced to timeline evidence identifiers.<br><b>Resources needed:</b><br><ul><li>Witness reliability and protective custody planner</li><li>Brady/discovery counsel</li><li>RICO case theory lead</li><li>Cross-agency timeline index manager</li><li>Legal documentation specialist</li></ul>",

    {
      "id": "474745c2-da25-4cd7-904e-a620894320f1",
      "text": "Align templates to evidence timelines",
      "custom_tooltip": "<b>Align templates to evidence timelines</b><br>Map each template field to the unified evidence timeline index and evidence_id/timestamp conventions. Define required cross-references from each testimony topic to (a) ARGUS event mappings, (b) predicate corroborators, and (c) the Platypus identity consistency ledger. Implement validation rules (completeness checks and required traceability links) so the log cannot be accepted without minimum proof-gate coverage for the witness\u2019s intended predicate/identity role.<br><b>Resources needed:</b><br><ul><li>Cross-agency timeline index manager</li><li>Digital forensics / evidence integrity liaison</li><li>ARGUS evidence attribution coordinator</li><li>Witness reliability planner</li><li>Workflow/tooling support (Airtable/Excel admin)</li></ul>",

    {
      "id": "f26d358f-275e-41f5-a68c-b7e4cc71eac7",
      "text": "Incorporate inducement and expectation ledger",
      "custom_tooltip": "<b>Incorporate inducement and expectation ledger</b><br>Specify a dedicated substructure within the testimony readiness template for inducement/expectation documentation. Define the ledger fields, update triggers, and documentation discipline for any changes discovered during interviews, follow-ups, protected-custody adjustments, or re-interviews. Add a versioning and disclosure-control note so inducement/expectation entries remain consistent with discovery obligations and are auditable for later Brady review.<br><b>Resources needed:</b><br><ul><li>Brady/discovery counsel</li><li>Witness reliability planner</li><li>Witness protection/planning lead</li><li>Prosecution team liaison</li><li>Paralegal/legal analyst</li></ul>",

    {
      "id": "44c27201-8a5e-41cd-9c40-fba2ec18679c",
      "text": "Pilot templates and run legal sufficiency review",
      "custom_tooltip": "<b>Pilot templates and run legal sufficiency review</b><br>Conduct an early pilot using a small set of witness scenarios (including at least one identity-critical and one predicate-critical witness). Populate the templates end-to-end and run an internal legal/forensic sufficiency review to confirm the logs support credibility challenges, corroboration-first gating, and admissibility readiness. Record gaps as must-fix items, update the templates through a controlled change process, and finalize for rollout once the pilot passes the required completeness and traceability checks.<br><b>Resources needed:</b><br><ul><li>Witness reliability planner</li><li>RICO case theory lead</li><li>Evidence/admissibility counsel</li><li>Digital forensics lead</li><li>Test witness liaison (mock interview coordinator)</li></ul>",

    {
      "id": "2399fa41-7b18-4bfb-9dfb-264a235d908f",
      "text": "Build Platypus linkage corroboration gates",
      "custom_tooltip": "<b>Build Platypus linkage corroboration gates</b><br>Define stage-gated identity linkage criteria between Platypus Man and Zane Goliath that require corroboration-first validation across at least two independent evidence categories. Specify entry/exit requirements per gate (minimum corroborator count, independence rules, master-timeline alignment checks), and define what triggers revalidation when discrepancies arise (identity evidence, timestamps, or corroborator category conflicts). Deliver a gate checklist plus a change-control rule for any gate definition updates that could affect narrative lock-in.<br><b>Resources needed:</b><br><ul><li>RICO case theory and charging lead</li><li>Cross-agency timeline index manager</li><li>Digital forensics evidence integrity lead</li><li>Investigators for corroborator categories</li><li>Discovery/Brady counsel</li></ul>",

    {
      "id": "76dbceee-7ddf-40d0-a829-109bc77a86bf",
      "text": "Create identity consistency ledger schema",
      "custom_tooltip": "<b>Create identity consistency ledger schema</b><br>Design the identity consistency ledger that records each claim about identity linkage (who said what, to whom, when, based on which evidence IDs) and ties every linkage assertion to the unified evidence timeline index. Include discrepancy logging (what conflicts, why it conflicts, assigned owner, resolution deadline), and define a hard narrative block condition: no narrative finalization while unresolved discrepancies exist for must-prove identity facts. Deliver templates and a reconciliation workflow aligned to the master timeline evidence logging conventions.<br><b>Resources needed:</b><br><ul><li>Cross-agency timeline index manager</li><li>Evidence logging lead</li><li>Discovery/Brady counsel</li><li>Investigators</li><li>Paralegal or documentation coordinator</li></ul>",

    {
      "id": "5908ff27-b16e-4c8c-8215-31421e8087de",
      "text": "Select witnesses with risk-tier rubric",
      "custom_tooltip": "<b>Select witnesses with risk-tier rubric</b><br>Develop and apply a witness selection rubric that tiers witnesses by risk and corroboration value specifically for predicate/continuity and Platypus identity linkage. Require pre-interview corroboration checks against unified timeline entries and ARGUS integrity gates, and maintain a short pre-approved alternate witness pool for rapid swaps without breaking identity linkage gates. Deliver the risk-tier rubric, the selection worksheet, and a witness-to-evidence mapping plan referencing corroborator categories and contingency alternates.<br><b>Resources needed:</b><br><ul><li>Witness reliability and protective custody planner</li><li>RICO case theory and charging lead</li><li>Prosecutors responsible for predicate proof</li><li>Investigators (FBI/DEA/Hartford PD)</li><li>Discovery/Brady counsel</li></ul>",

    {
      "id": "a58316c4-ce3f-460a-999e-8c81f3589608",
      "text": "Implement protective custody testimony readiness",
      "custom_tooltip": "<b>Implement protective custody testimony readiness</b><br>Design protective custody and testimony readiness controls that protect sensitive logistics while maintaining auditable, discovery-compliant documentation. Produce compartmentalized communications access rules (need-to-know, role-based access, auditability), a testimony readiness log structure, and procedures for documenting inducements/expectations and exposure notes. Include a proof-of-readiness review cadence and a response workflow for any drift/recantation risk to ensure identity linkage remains consistent with the ledger and master timeline.<br><b>Resources needed:</b><br><ul><li>Witness protection and protective custody lead</li><li>Witness reliability planner</li><li>Discovery/Brady counsel</li><li>Protective custody operations coordinator</li><li>Case squad documentation coordinator</li></ul>",

      "duration": 3.0,

      "open": true,
      "meta": "5908ff27-b16e-4c8c-8215-31421e8087de FS",

    {
      "id": "2e7b6697-25a7-4dd4-b48c-c51ba53a2a76",
      "text": "Run recantation drift revalidation protocol",
      "custom_tooltip": "<b>Run recantation drift revalidation protocol</b><br>Create and operationalize a recantation/drift early-warning and revalidation protocol for identity-linked testimony. Define triggers (timing windows, discrepancy thresholds, and exposure-related indicators), the required re-contact and confirmation steps, and the documentation outputs that must update the identity ledger and master timeline mapping. Include a tabletop rehearsal and sign-off checklist so the team can execute revalidation quickly without leaving unresolved identity discrepancies or creating discovery gaps.<br><b>Resources needed:</b><br><ul><li>Witness reliability and protective custody planner</li><li>Discovery/Brady counsel</li><li>Investigators</li><li>Cross-agency timeline index manager</li><li>Prosecutors</li></ul>",

      "id": "dbc55d4a-945a-4296-a9dd-ef7c7adfb561",
      "text": "Define vehicle evidence bucketing",
      "custom_tooltip": "<b>Define vehicle evidence bucketing</b><br>Create an initial, court-usable taxonomy for propulsion/vehicle-related items, separating them into direct, redacted, substituted, and stipulation-ready buckets. Specify what qualifies for each bucket, required supporting proof types (chain-of-custody, observable instrumentality/control, corroborator categories), and the rules for moving items between buckets without breaking overt-act/continuity dependencies.<br><b>Resources needed:</b><br><ul><li>Classified evidence liaison/protective-order attorney</li><li>RICO/predicate strategy lead</li><li>Digital forensics lead</li><li>Evidence handling lead (seizure/custody)</li><li>Vehicle/R&amp;D technical reviewer (cleared as needed)</li><li>Prosecutor (motions/admissibility lead)</li></ul>",

    {
      "id": "85f1758c-0ad1-4074-9555-0689cb8c3c7d",
      "text": "Build cleared roster and clearance lead-time",
      "custom_tooltip": "<b>Build cleared roster and clearance lead-time</b><br>Produce a cleared-witness/cleared-expert roster plan for vehicle-related topics, including expected clearance lead times, required testimony scopes per witness, and fallback substitutes for any role that cannot be cleared by the motion windows. Output a \u201cclearance readiness\u201d tracker that ties each vehicle evidence bucket to who can authenticate/summarize it and what can be substituted if clearance is delayed.<br><b>Resources needed:</b><br><ul><li>Protective order attorney</li><li>Witness security/protective custody planning lead</li><li>Discovery/Brady counsel</li><li>Prosecutor (admissibility lead)</li><li>Classified liaison (clearance coordinator)</li><li>Records/forensics liaison</li></ul>",

    {
      "id": "c4307653-e282-4a7e-962c-5198a8a13113",
      "text": "Draft redacted summaries and substitution packages",
      "custom_tooltip": "<b>Draft redacted summaries and substitution packages</b><br>Create redacted technical summaries and substitution packages anchored to observable instrumentality/control facts and hash-verified chain-of-custody references. For each bucket, draft: (a) what remains undisclosed, (b) the substitute/stipulation-ready anchor facts, (c) exhibit-to-overt-act mapping placeholders, and (d) a dependency note explaining what evidence must accompany the summary to preserve predicate/enterprise continuity coherence.<br><b>Resources needed:</b><br><ul><li>Classified evidence attorney</li><li>RICO/predicate strategy lead</li><li>AUSA (drafting and review)</li><li>Digital forensics lead</li><li>Technical reviewer (vehicle propulsion/R&amp;D context, cleared as needed)</li><li>OPSEC/public affairs risk reviewer</li></ul>",

    {
      "id": "9266c42e-8ff4-43d5-ac47-9a62587b5cd5",
      "text": "Validate exclusion-risk fallback decision tree",
      "custom_tooltip": "<b>Validate exclusion-risk fallback decision tree</b><br>Develop and stress-test an exclusion-risk decision matrix that specifies, for each vehicle evidence bucket, the required predicate/continuity function and the acceptable fallback route if the direct/redacted vehicle evidence is excluded or delayed. Run a short tabletop/motion-readiness rehearsal with prosecutors and forensics to confirm fallback substitutions preserve overt-act support and do not create new authentication/timestamp gaps.<br><b>Resources needed:</b><br><ul><li>Federal evidentiary counsel (Daubert/admissibility)</li><li>RICO/predicate strategy lead</li><li>Digital forensics lead</li><li>OPSEC risk controller</li><li>Prosecutor (motion strategy lead)</li><li>Independent review expert (as available)</li></ul>",

      "id": "96b32ae6-8f99-40b9-9d26-d0ce6e8465de",
      "text": "Protective order intake and clearance tracker",
      "custom_tooltip": "<b>Protective order intake and clearance tracker</b><br>Collect protective-order requirements and build a clearance lead-time tracker covering each witness/tech expert and testimony topic. Define owners for each clearance step (intake, submission, review, authorization), specify minimum necessary clearance scope to avoid over-classification, and produce a consolidated schedule aligned to motion and admissibility deliverable windows.<br><b>Resources needed:</b><br><ul><li>Classified evidence/protective-order attorney</li><li>Witness security/protective custody planner</li><li>RICO case lead</li><li>Classification/clearance liaison</li><li>Case operations coordinator</li><li>Document control/protective order support staff</li></ul>",

    {
      "id": "e5526e13-db64-405c-b9ce-f4f078e71fa7",
      "text": "Draft cleared witness roster and constraints",
      "custom_tooltip": "<b>Draft cleared witness roster and constraints</b><br>Translate the clearance tracker into a draft cleared witness roster, including what each witness can safely testify to under expected clearance status. Define constraints for identity/reference handling, redaction boundaries, and any substitution/backup testimony options if clearance is delayed or denied. Ensure the roster is cross-wired to the unified evidence/timeline index so testimony scopes map to overt acts and corroborator categories.<br><b>Resources needed:</b><br><ul><li>Witness reliability planner</li><li>Discovery/Brady counsel</li><li>Classified evidence/protective-order attorney</li><li>Cross-agency timeline/log manager</li><li>Lead investigators (FBI/DEA/Hartford PD)</li></ul>",

    {
      "id": "b7d1294f-5d78-4885-93dd-d8aee91869e5",
      "text": "Protective order submission package and iterations",
      "custom_tooltip": "<b>Protective order submission package and iterations</b><br>Prepare and submit the initial protective-order inputs required for introducing vehicle-related classified/experimental evidence. Coordinate iteration loops with counsel and classification liaison to resolve handling requirements, redaction/substitution mechanics, and any court-formatted procedures. Produce a versioned deliverable set with explicit change-control so later admissibility drafts do not contradict earlier protective-order positions.<br><b>Resources needed:</b><br><ul><li>Protective-order attorney</li><li>Classified evidence/protective-order liaison</li><li>Prosecuting attorney(s)</li><li>Document production specialist</li><li>OPSEC/public communications boundary controller</li></ul>",

    {
      "id": "c4d0e751-37d1-483f-bc43-899902033018",
      "text": "Substitution readiness for roster delays",
      "custom_tooltip": "<b>Substitution readiness for roster delays</b><br>Define and pre-approve substitution pathways when a witness cannot be cleared by the motion window. Identify which vehicle evidence elements can be preserved via stipulation-ready summaries, redacted testimony, or alternative observable chain-of-custody/control facts. Produce a go/no-go decision rule and owners for triggering substitution so predicate/continuity readiness is not blocked by clearance timing.<br><b>Resources needed:</b><br><ul><li>RICO/predicate strategy counsel</li><li>Classified evidence/protective-order attorney</li><li>Vehicle evidence admissibility liaison</li><li>Witness reliability planner</li><li>Forensic evidence lead</li><li>Case operations coordinator</li></ul>",

      "custom_tooltip": "<b>Draft redacted summaries and exhibits</b><br>Produce initial redacted technical summaries for each Direct-to-Redacted bucket item using an admissibility-first template. Every redacted statement must anchor to observable instrumentality/control facts and chain-of-custody support, with explicit placeholders for what is omitted and what substitute anchors will cover the overt-act/continuity link if details are excluded.<br><b>Resources needed:</b><br><ul><li>Classified/R&amp;D &amp; Experimental Vehicle Admissibility Pathway Liaison</li><li>Forensic/technical authors</li><li>Evidence/admissibility counsel</li><li>OPSEC/public affairs boundary reviewer</li><li>Paralegal support for exhibit formatting and redaction templates</li></ul>",

      "id": "03fe1f61-0c21-48b1-a9ce-4be9ab0d3cff",
      "text": "Create substitution and stipulation package",
      "custom_tooltip": "<b>Create substitution and stipulation package</b><br>Draft substitution-ready and stipulation-ready materials for each vehicle evidence item that cannot be introduced directly. Map each substitute to the specific predicate/continuity role it preserves, define expected witness testimony boundaries for each bucket, and package items in motion-friendly exhibit form.<br><b>Resources needed:</b><br><ul><li>Federal RICO &amp; Predicate Strategy Counsel</li><li>Classified evidence/protective order attorney</li><li>Classified/R&amp;D &amp; Experimental Vehicle Admissibility Pathway Liaison</li><li>Witness preparation lead</li><li>Exhibit management/paralegal support</li></ul>",

      "text": "Validate exclusion-risk fallback decision tree",
      "custom_tooltip": "<b>Validate exclusion-risk fallback decision tree</b><br>Build and test an exclusion-risk fallback decision tree that ties vehicle evidence buckets to predicate/enterprise continuity requirements. Run a readiness tabletop for likely exclusion scenarios to confirm the case narrative still has must-prove anchors, and secure approval on reclassification/authorizing ownership so late edits do not break coherence.<br><b>Resources needed:</b><br><ul><li>Federal RICO &amp; Predicate Strategy Counsel</li><li>Classified evidence/protective order attorney</li><li>Digital evidence/chain-of-custody lead</li><li>Forensic/technical reviewer</li><li>Prosecution case lead for sign-off</li></ul>",

      "custom_tooltip": "<b>Create evidence need-to-know compartments</b><br>Map what details must be limited for courtroom survivability: ARGUS capture methods, facility sequencing, propulsion/vehicle handling, and protected-witness logistics. Produce a share/no-share matrix anchored to specific evidence artifact types, and define the minimum authorized audiences for each compartment. Include a controlled change-control path for updates after new discoveries or legal rulings.<br><b>Resources needed:</b><br><ul><li>OPSEC risk controller</li><li>Public communications lead</li><li>Prosecution team liaison</li><li>Forensics lead</li><li>Witness protection lead</li><li>Classified evidence/protective-order liaison</li><li>Legal counsel (discovery/Brady-aware)</li></ul>",

      "custom_tooltip": "<b>Define confirmed-leak trigger matrix</b><br>Create a confirmed-leak trigger matrix with deterministic 24-hour actions and named decision authorities. Specify detection channels, severity levels, and the exact containment steps (freeze exposed compartments, pause sensitive debriefs, credential rotation, documentation of actions). Include a discovery consistency workflow so OPSEC-driven changes are logged for legal review and do not create Brady/pronouncement gaps.<br><b>Resources needed:</b><br><ul><li>OPSEC risk controller</li><li>Digital forensics lead</li><li>Witness protection lead</li><li>Evidence custody/ops lead</li><li>Brady/discovery counsel</li><li>IT/access control administrator</li><li>Case operations lead</li></ul>",

      "text": "Set repository access logging requirements",
      "custom_tooltip": "<b>Set repository access logging requirements</b><br>Define access logging/audit expectations for ARGUS systems and the unified timeline evidence repository: required log fields, retention period, evidence ID linkage, and required coverage for read/write/export/admin actions. Provide role-based permission rules (who can do what) and a validation test plan to ensure every stakeholder action appears in logs without schema drift across agencies.<br><b>Resources needed:</b><br><ul><li>Case operations timeline index manager</li><li>Digital forensics lead</li><li>IT/security architect</li><li>Evidence management lead</li><li>Cross-agency representatives (FBI/DEA/Hartford PD) </li><li>Legal counsel (privilege/discovery boundary)</li></ul>",

      "text": "Plan rapid containment and documentation",
      "custom_tooltip": "<b>Plan rapid containment and documentation</b><br>Draft execution-ready containment workflows that implement freeze/credential rotation/pause-sensitive-debrief steps with documentation discipline. Include runbooks, owner checklists, SLAs for each action, and templates for logging decisions and rationales to withstand legal review. Run a tabletop drill against a simulated confirmed leak to verify timing feasibility and log completeness.<br><b>Resources needed:</b><br><ul><li>OPSEC risk controller</li><li>Evidence custody/ops lead</li><li>IT/security administrator</li><li>Witness protection lead</li><li>Prosecution legal support</li><li>Digital forensics lead</li><li>Cross-agency operations coordinator</li></ul>",

      "text": "Publish milestone-aligned messaging guardrails",
      "custom_tooltip": "<b>Publish milestone-aligned messaging guardrails</b><br>Translate OPSEC decisions into public-facing communications guardrails tied to filing and court milestones. Provide a strict boundary checklist (no ARGUS/facility/vehicle methods, no protected-witness logistics or identifiers) and a single approval chain with time-boxed SLAs. Include rapid-response procedures for any leak signal: freeze drafts, route to designated reviewers, apply deterministic redactions, and re-approve within a fixed window.<br><b>Resources needed:</b><br><ul><li>Public communications lead</li><li>OPSEC risk controller</li><li>Prosecution spokesperson liaison</li><li>Legal counsel (court filing/public statements review)</li><li>Classified/protective-order liaison</li><li>Case operations lead</li><li>Court liaison</li></ul>",
