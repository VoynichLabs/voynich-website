      "text": "Enforce share rules with access controls",
      "custom_tooltip": "<b>Enforce share rules with access controls</b><br>Define the operational enforcement model for the compartment list by specifying: who can access each compartment, what systems/feeds are governed, and what audit artifacts are required to prove access discipline. Publish a companion access-control matrix (RBAC-style) and update the workflow guidance for requesting, granting, and revoking access. Ensure the compartment governance integrates with existing evidence repositories and logging expectations.<br><b>Resources needed:</b><br><ul><li>Digital forensics/data governance lead</li><li>System owners for evidence repositories</li><li>OPSEC Risk Controller</li><li>Cross-agency evidence logging coordinator</li><li>IT/security representative</li></ul>",

      "text": "Create need-to-know compartment lists",
      "custom_tooltip": "<b>Create need-to-know compartment lists</b><br>Run a sensitivity taxonomy workshop to inventory what must be compartmentalized across ARGUS capture methods, undisclosed facility sequencing, propulsion-linked vehicle handling, and protected-witness logistics. Convert that inventory into explicit need-to-know lists with clear share/no-share rules tied to concrete evidence artifact types. Obtain sign-off from OPSEC and legal owners, then establish a change-control path for updates without disrupting proof-gate and discovery workflows.<br><b>Resources needed:</b><br><ul><li>OPSEC risk controller</li><li>Public communications lead</li><li>Federal RICO prosecutor</li><li>Evidence/forensics lead</li><li>Classified evidence liaison</li><li>Witness protection planner</li><li>Discovery/Brady counsel</li></ul>",

    {
      "id": "784581a7-4d2a-461e-9664-58a8f3ecd440",
      "text": "Define confirmed-leak triggers matrix",
      "custom_tooltip": "<b>Define confirmed-leak triggers matrix</b><br>Develop a confirmed-leak trigger matrix that maps each leak indicator to deterministic 24-hour actions. Define decision authority for each action (e.g., freeze, credential rotation, pause debriefs, containment of repository access, notification chain) and specify evidence-log/discipline requirements so OPSEC-driven changes remain discoverable-compliant. Validate the matrix via scenario tabletop drills to confirm it is operationally executable and avoids false-positive paralysis.<br><b>Resources needed:</b><br><ul><li>OPSEC risk controller</li><li>Digital forensics lead</li><li>Evidence logistics/timeline index manager</li><li>Witness protection lead</li><li>Discovery/Brady counsel</li><li>Case squad lead</li><li>IT/access control owner</li></ul>",

    {
      "id": "a2888dcb-66ae-4755-b070-cfca9b20eeb9",
      "text": "Set access logging and audit requirements",
      "custom_tooltip": "<b>Set access logging and audit requirements</b><br>Define a single access logging standard for ARGUS evidence systems and the unified evidence timeline repositories, including required fields, retention expectations, evidence-ID linkages, and naming conventions. Align logging permissions with need-to-know compartment membership and define audit review cadence. Perform an integration test to ensure every stakeholder action (read/write/export) appears in logs, and resolve schema mismatches before broader rollout.<br><b>Resources needed:</b><br><ul><li>Digital forensics lead</li><li>Timeline index manager</li><li>IT/security administrator</li><li>OPSEC risk controller</li><li>Discovery/Brady counsel</li></ul>",

    {
      "id": "375c96f6-f39b-47f3-83fb-2609f227ac00",
      "text": "Draft rapid containment runbook",
      "custom_tooltip": "<b>Draft rapid containment runbook</b><br>Create a runbook for rapid containment actions during a confirmed trigger: freeze exposed compartments, rotate credentials, pause sensitive debriefs, and manage evidence/system access while preserving chain-of-custody integrity. Include named decision authorities, step-by-step checklists, communication/notification procedures, and documentation templates required for discovery consistency. Validate readiness with a tabletop drill and then lock the runbook for execution.<br><b>Resources needed:</b><br><ul><li>OPSEC risk controller</li><li>Evidence custody/seizure governance lead</li><li>Digital forensics lead</li><li>Witness protection lead</li><li>IT/security administrator</li><li>Federal RICO prosecutor</li><li>Discovery/Brady counsel</li></ul>",

      "text": "Milestone-linked public communications boundary",
      "custom_tooltip": "<b>Milestone-linked public communications boundary</b><br>Implement a filing-first public communications workflow tied to court milestones, using a strict boundary checklist that prohibits disclosure of ARGUS/facility/vehicle methods and protected-witness logistics. Define a single approval chain with time-boxed SLAs and require each draft to pass an OPSEC boundary checklist plus a quick classification sanity check. Prepare rapid-response handling for last-minute milestone changes, including deterministic redaction rules and pre-approved safe statements templates.<br><b>Resources needed:</b><br><ul><li>Public communications lead</li><li>Federal RICO prosecutor</li><li>OPSEC risk controller</li><li>Classified evidence liaison</li><li>Witness protection lead</li><li>Court liaison</li></ul>",

      "text": "Define access logging requirements",
      "custom_tooltip": "<b>Define access logging requirements</b><br>Create a single, standardized access logging requirement set for ARGUS evidence repositories and the unified master timeline index. Specify required log fields (who/what/when/where), event types (read/write/export/admin), retention period, evidence ID linkage, and timestamp normalization rules. Include responsibility assignments for each log source and define validation criteria to ensure logs are discovery-ready and audit-able.<br><b>Resources needed:</b><br><ul><li>Cross-agency evidence logging architect</li><li>Digital forensics lead</li><li>IT/security lead</li><li>AUSAs (discovery/privilege counsel as needed)</li><li>Timeline index manager</li></ul>",

      "id": "5623e232-cf3e-4583-8c2e-7d4802a72c7d",
      "text": "Implement repository audit instrumentation",
      "custom_tooltip": "<b>Implement repository audit instrumentation</b><br>Instrument ARGUS and timeline repositories to emit the required access events into a centralized, tamper-evident logging sink. Configure identity/role mappings, ensure export actions are logged, and add evidence_id/evidence_set propagation so each access can be traced to a specific artifact set. Validate end-to-end that every action by authorized users generates the expected log record with deterministic formatting.<br><b>Resources needed:</b><br><ul><li>IT/security engineer</li><li>Database/platform engineer</li><li>Evidence system owners</li><li>Digital forensics lead</li><li>Access control administrator</li></ul>",

    {
      "id": "9e8b899d-4356-41bf-aa12-1551bd8d7812",
      "text": "Run access logging integration tests",
      "custom_tooltip": "<b>Run access logging integration tests</b><br>Execute an integration test suite that simulates typical investigator and forensics actions across FBI/DEA/Hartford PD roles. Confirm: (1) each action generates a corresponding log entry, (2) timestamps reconcile to the defined vocabulary and skew bounds, (3) required fields are never blank, and (4) evidence_id linkage remains consistent across agencies and tools. Produce a pass/fail report and document any remediation steps and re-test triggers.<br><b>Resources needed:</b><br><ul><li>Test lead</li><li>Timeline index manager</li><li>Digital forensics lead</li><li>Representative users from each agency</li><li>Discovery/privilege counsel for review</li></ul>",

    {
      "id": "557ed8cb-2618-4d6a-b693-962e1816df1e",
      "text": "Establish discovery export and audits",
      "custom_tooltip": "<b>Establish discovery export and audits</b><br>Define how access logs will be packaged for discovery (format, redaction rules, and privilege handling). Create an audit workflow for periodic verification that logs remain complete and uncorrupted, including discrepancy handling (missing events, timestamp conflicts, or evidence_id propagation failures). Provide a runbook for responding to suspected OPSEC incidents that requires log freeze/retention actions without breaking evidentiary integrity.<br><b>Resources needed:</b><br><ul><li>Evidence custodian</li><li>Discovery/Brady counsel</li><li>Digital forensics lead</li><li>OPSEC/security lead</li><li>Case operations coordinator</li></ul>",

      "text": "Need-to-know compartment mapping",
      "custom_tooltip": "<b>Need-to-know compartment mapping</b><br>Define an OPSEC need-to-know compartment list covering ARGUS capture methods, facility entry/seizure sequencing, vehicle/propulsion handling details, and protected-witness logistics. For each compartment, specify concrete evidence/artifact types, allowed audience, share/no-share rules, and the owning team. Lock the initial list via legal/OPSEC review and establish a controlled change-management path for later updates.<br><b>Resources needed:</b><br><ul><li>Public communications/OPSEC lead</li><li>Prosecution representative (AUSA)</li><li>Digital forensics lead</li><li>Witness protection lead</li><li>Classified evidence/protective order liaison</li><li>OPSEC analyst</li><li>OPSEC-compliant document specialist</li></ul>",

      "id": "e2d1eac2-e630-4821-9643-37ccf7735b18",
      "text": "Confirmed-leak trigger matrix build",
      "custom_tooltip": "<b>Confirmed-leak trigger matrix build</b><br>Create a confirmed-leak trigger matrix that maps specific leak indicators (e.g., unauthorized access/export, social/media confirmation, third-party dissemination) to deterministic containment actions within 24 hours. Include decision authority, notification chain, escalation ladder, and what gets frozen/paused (systems, access, debriefs, drafts). Validate that each trigger outcome is actionable without ambiguity and that all actions can be documented for discovery consistency if needed.<br><b>Resources needed:</b><br><ul><li>OPSEC risk controller</li><li>Digital forensics lead</li><li>Witness protection planning lead</li><li>Brady/discovery counsel representative</li><li>Case operations security liaison</li><li>Audit/logging specialist</li></ul>",

      "id": "a91b8b9b-de30-45b5-87d2-2f534ca7b3f8",
      "text": "Access logging and audit requirements",
      "custom_tooltip": "<b>Access logging and audit requirements</b><br>Define and standardize access logging requirements for ARGUS repositories and the unified timeline/evidence index, including required fields (user/role, action type, evidence IDs, timestamps), retention expectations, and evidence of completeness. Implement role-based permissions and an integration test proving that stakeholder read/write/export actions are recorded correctly in logs. Publish audit expectations so containment actions are supportable and discovery-safe.<br><b>Resources needed:</b><br><ul><li>Digital forensics lead</li><li>Timeline/index manager</li><li>Evidence logging/data steward</li><li>IT/security engineer</li><li>Discovery/Brady counsel reviewer</li><li>Access-control administrator</li></ul>",

    {
      "id": "e9e10210-7d47-4859-af5e-9a47fdf2728c",
      "text": "Rapid containment workflow and runbook",
      "custom_tooltip": "<b>Rapid containment workflow and runbook</b><br>Develop the operational runbook for containment actions triggered by the matrix: freeze exposed compartments, rotate credentials/keys, pause sensitive debriefs, and coordinate restoration after clearance. Include step-by-step roles, timeboxing, checklists, required documentation artifacts, and SLAs for decision approvals. Conduct a tabletop drill with a simulated confirmed leak to confirm the workflow is achievable and that documentation discipline holds under time pressure.<br><b>Resources needed:</b><br><ul><li>OPSEC risk controller</li><li>Digital forensics lead</li><li>System administrator/security engineer</li><li>Witness protection lead</li><li>Prosecution operations lead</li><li>Legal/discovery counsel reviewer</li></ul>",

    {
      "id": "f97e7400-cf36-4531-9f4d-8ffccbd8a77e",
      "text": "Milestone-linked public messaging boundaries",
      "custom_tooltip": "<b>Milestone-linked public messaging boundaries</b><br>Implement the public communications workflow aligned to court milestone triggers (filing, hearings, protective order rulings, custody-related updates). Create a boundary checklist and deterministic redaction rules that prohibit disclosing ARGUS/facility/vehicle methods and protected-witness logistics. Set a single approval chain with named reviewers and SLAs, plus a rapid-response process (freeze/draft/route/approve within 24 hours). Prepare safe pre-drafted statements for common milestone types to reduce rework.<br><b>Resources needed:</b><br><ul><li>Public affairs communications officer</li><li>Prosecution spokesperson lead (AUSA)</li><li>OPSEC risk controller</li><li>Evidence/classified liaison</li><li>Witness protection lead</li><li>Legal counsel for boundary compliance</li></ul>",

      "text": "Milestone-based messaging calendar",
      "custom_tooltip": "<b>Milestone-based messaging calendar</b><br>Build a file-first public communications calendar keyed to confirmed court docket events (filings, hearings, sealing/protective-order rulings, and major evidentiary milestones). Define who owns each milestone input, the earliest/latest draft windows, and SLAs for review/approval so timing changes do not stall communications.<br><b>Resources needed:</b><br><ul><li>Public communications lead</li><li>Court docket/liaison coordinator</li><li>Prosecution point of contact</li><li>OPSEC risk controller</li></ul>",

      "text": "Public boundary checklist and reviews",
      "custom_tooltip": "<b>Public boundary checklist and reviews</b><br>Create and operationalize a strict boundary checklist that prevents disclosure of sensitive methods (ARGUS capture/attribution mechanics), facility sequencing details, propulsion/vehicle handling specifics, and any protected-witness logistics or identifiers. Implement a required checklist pass for every draft statement, plus an OPSEC classification sanity check before release.<br><b>Resources needed:</b><br><ul><li>OPSEC risk controller</li><li>Prosecution legal reviewer</li><li>Public affairs/comms editor</li><li>Classified-evidence/protective-order liaison</li></ul>",

      "id": "1aba8ae7-9e2e-4370-a4c5-d7f8cc0e3c95",

      "custom_tooltip": "<b>Approved safe statements by milestone</b><br>Draft and pre-approve a set of &#x27;safe&#x27; statement templates (e.g., case filing announcement, hearing confirmation, protective-order status update, and general evidentiary milestone acknowledgement) with deterministic language that stays within boundaries. Map each template to the exact milestone types to reduce last-minute drafting and redaction churn.<br><b>Resources needed:</b><br><ul><li>Public communications lead</li><li>Prosecution spokesperson coordinator</li><li>Legal reviewer</li><li>OPSEC risk controller</li></ul>",

    {
      "id": "d52a73b0-026a-4c41-a91c-79d0883c406b",
      "text": "Rapid-response leak prevention workflow",
      "custom_tooltip": "<b>Rapid-response leak prevention workflow</b><br>Define a rapid-response workflow for any perceived leak or misinformation signal. Include freeze-and-route steps for drafts, reassignment of decision authority within 24 hours, required re-checks against the boundary checklist, and documentation of what changed and why so communications actions remain discovery- and court-safe.<br><b>Resources needed:</b><br><ul><li>OPSEC risk controller</li><li>Prosecution legal reviewer</li><li>Public communications lead</li><li>Evidence/timeline manager liaison</li></ul>",

      "text": "Execution and compliance readiness audit",
      "custom_tooltip": "<b>Execution and compliance readiness audit</b><br>Run periodic compliance audits comparing released public statements to the boundary checklist requirements and milestone schedule. Track exceptions, corrective actions, and improvement items, and verify that communications procedures remain aligned with current court dates and protective-order constraints through the indictment-ready window.<br><b>Resources needed:</b><br><ul><li>Public communications lead</li><li>OPSEC risk controller</li><li>Prosecution legal reviewer</li><li>Court milestone liaison coordinator</li></ul>",

    function zoomFit() {
        const tasks = gantt.getTaskByTime();
        if (tasks.length > 0) {
            const firstTask = tasks[0];
            const lastTask = tasks[tasks.length - 1];
            gantt.showDate(firstTask.start_date);
            
            // Calculate total duration in days
            const startDate = new Date(firstTask.start_date);
            const endDate = new Date(lastTask.end_date);
            const durationDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
            
            // Choose appropriate scale based on duration
            if (durationDays > 3650) { // More than 10 years
                gantt.config.scale_unit = "year";
                gantt.config.step = 10;
                gantt.config.subscales = [
                    {unit: "year", step: 1, date: "%Y"}
                ];
            } else if (durationDays > 365) { // More than 1 year
                gantt.config.scale_unit = "year";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "month", step: 1, date: "%M"}
                ];
            } else if (durationDays > 30) { // More than 1 month
                gantt.config.scale_unit = "month";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else if (durationDays > 7) { // More than 1 week
                gantt.config.scale_unit = "week";
                gantt.config.step = 1;
                gantt.config.subscales = [
                    {unit: "day", step: 1, date: "%d"}
                ];
            } else {
                gantt.config.scale_unit = "day";
                gantt.config.step = 1;
                gantt.config.subscales = [];
            }
            gantt.render();
        }
    }

    function zoomIn() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "year" && currentStep === 10) {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "day";
            gantt.config.step = 1;
            gantt.config.subscales = [];
        }
        gantt.render();
    }

    function zoomOut() {
        const currentUnit = gantt.config.scale_unit;
        const currentStep = gantt.config.step;
        
        if (currentUnit === "day") {
            gantt.config.scale_unit = "week";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "week") {
            gantt.config.scale_unit = "month";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "day", step: 1, date: "%d"}
            ];
        } else if (currentUnit === "month") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 1;
            gantt.config.subscales = [
                {unit: "month", step: 1, date: "%M"}
            ];
        } else if (currentUnit === "year") {
            gantt.config.scale_unit = "year";
            gantt.config.step = 10;
            gantt.config.subscales = [
                {unit: "year", step: 1, date: "%Y"}
            ];
        }
        gantt.render();
    }

    function downloadCSV() {
        if (GANTT_DATA_CSV === null) {
            return;
        }
        const blob = new Blob([GANTT_DATA_CSV], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', GANTT_FILENAME_CSV);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Gantt Initialization
    gantt.config.readonly = true;
    gantt.config.date_format = "%Y-%m-%d";
    gantt.config.scale_unit = "month";
    gantt.config.step = 1;
    gantt.config.subscales = [
        {unit: "day", step: 1, date: "%d"}
    ];

    gantt.config.columns = [
        {name:"text", label:"Task name", width:"*", tree:true},
        // {name:"start_date", label:"Start time", align: "center"},
        // {name:"duration", label:"Duration", align: "center"}
    ];

    gantt.templates.task_class = function(start, end, task) {
        if (task.type === "project") {
            return "project-task";
        }
        return "";
    };

    gantt.templates.tooltip_text = function(start, end, task) {
        return task.custom_tooltip || "No tooltip";
    };
    
	gantt.plugins({
		tooltip: true
	});
	gantt.attachEvent("onGanttReady", function(){
		var tooltips = gantt.ext.tooltips;
		tooltips.tooltip.setViewport(gantt.$task_data);
	});
    gantt.init("gantt_container");
    gantt.parse(GANTT_DATA_DHTMLX);

    // Hide the export to CSV button if there is no CSV data
    if (GANTT_DATA_CSV === null) {
        document.getElementById('exportToCSVButton').style.display = 'none';
    }

    document.getElementById('zoomFitButton').addEventListener('click', zoomFit);
    document.getElementById('zoomInButton').addEventListener('click', zoomIn);
    document.getElementById('zoomOutButton').addEventListener('click', zoomOut);
    document.getElementById('exportToCSVButton').addEventListener('click', downloadCSV);
</script>
